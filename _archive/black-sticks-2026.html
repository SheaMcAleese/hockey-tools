<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0D0D">
<title>Black Sticks 2026</title>
<link rel="manifest" href="bs2026-manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230D0D0D' width='100' height='100'/><text y='70' x='15' font-size='60'>🏑</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0D0D0D;
  --gold: #D4AF37;
  --text: #F0EDE6;
  --panel: #1A1A1A;
  --panel-hover: #242424;
  --gold-dim: rgba(212, 175, 55, 0.15);
  --gold-glow: rgba(212, 175, 55, 0.3);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body {
  padding-bottom: calc(72px + var(--safe-bottom));
}

h1, h2, h3, h4 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }

/* ── Screens ── */
.screen { display: none; min-height: calc(100vh - 72px); min-height: calc(100dvh - 72px); padding: 20px 16px 32px; animation: fadeIn 0.25s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ── Bottom Nav ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--panel);
  border-top: 1px solid rgba(212,175,55,0.12);
  display: flex; justify-content: space-around; align-items: center;
  height: calc(72px + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 8px 12px; border: none; background: none;
  color: rgba(240,237,230,0.4); font-family: 'Inter', sans-serif;
  font-size: 10px; font-weight: 500; letter-spacing: 0.05em;
  cursor: pointer; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.nav-item.active { color: var(--gold); }
.nav-item svg { width: 22px; height: 22px; }
.nav-item.active svg { filter: drop-shadow(0 0 6px var(--gold-glow)); }

/* ── Home Screen ── */
.home-header { text-align: center; padding: 20px 0 8px; }
.home-logo { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--gold); letter-spacing: 0.2em; margin-bottom: 32px; }
.home-logo .fern { font-size: 22px; vertical-align: middle; margin-right: 6px; }

.countdown-block { text-align: center; margin: 20px 0 32px; }
.countdown-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 96px; line-height: 1;
  color: var(--gold);
  text-shadow: 0 0 40px var(--gold-glow);
}
.countdown-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; color: var(--gold);
  letter-spacing: 0.15em; margin-top: 4px;
}

.daily-question {
  font-size: 20px; font-weight: 300; line-height: 1.5;
  text-align: center; padding: 24px 8px;
  color: var(--text); opacity: 0.9;
  min-height: 100px;
}

.home-tiles {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-top: 24px;
}
.home-tile {
  background: var(--panel);
  border: 1px solid rgba(212,175,55,0.08);
  border-radius: 12px;
  padding: 24px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.home-tile:active { transform: scale(0.97); background: var(--panel-hover); }
.home-tile .tile-icon { font-size: 28px; margin-bottom: 8px; }
.home-tile .tile-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px; letter-spacing: 0.1em; color: var(--gold);
}

/* ── Habits Screen ── */
.habits-header { margin-bottom: 20px; }
.habits-header h1 { font-size: 32px; color: var(--gold); }
.habits-header p { font-size: 13px; color: rgba(240,237,230,0.5); margin-top: 4px; }

.habit-card {
  background: var(--panel);
  border: 1px solid rgba(212,175,55,0.08);
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: all 0.2s;
}
.habit-card.completed { border-color: rgba(212,175,55,0.25); }
.habit-top {
  display: flex; align-items: center; padding: 14px 16px;
  cursor: pointer; gap: 12px;
  -webkit-tap-highlight-color: transparent;
}
.habit-check {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid rgba(212,175,55,0.3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s; cursor: pointer;
}
.habit-check.checked {
  background: var(--gold); border-color: var(--gold);
}
.habit-check svg { width: 14px; height: 14px; opacity: 0; transition: opacity 0.2s; }
.habit-check.checked svg { opacity: 1; }
.habit-info { flex: 1; }
.habit-name { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 0.05em; color: var(--text); }
.habit-streak { font-size: 11px; color: var(--gold); margin-top: 2px; }
.habit-expand-icon {
  width: 20px; height: 20px; color: rgba(240,237,230,0.3);
  transition: transform 0.2s;
}
.habit-card.expanded .habit-expand-icon { transform: rotate(180deg); }
.habit-detail {
  display: none; padding: 0 16px 16px;
  font-size: 14px; line-height: 1.6;
  color: rgba(240,237,230,0.7);
}
.habit-card.expanded .habit-detail { display: block; }

/* ── Journal Screen ── */
.journal-header { margin-bottom: 20px; }
.journal-header h1 { font-size: 32px; color: var(--gold); }
.journal-date { font-size: 13px; color: rgba(240,237,230,0.5); margin-top: 4px; }

.rating-section {
  background: var(--panel); border-radius: 12px;
  padding: 20px; margin-bottom: 16px;
  border: 1px solid rgba(212,175,55,0.08);
}
.rating-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; color: var(--gold);
  margin-bottom: 12px; letter-spacing: 0.05em;
}
.rating-dots {
  display: flex; gap: 8px; justify-content: space-between;
}
.rating-dot {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid rgba(212,175,55,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
  color: rgba(240,237,230,0.4);
  -webkit-tap-highlight-color: transparent;
}
.rating-dot.selected {
  background: var(--gold); border-color: var(--gold);
  color: var(--bg); font-weight: 700;
}

.journal-prompts {
  display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
}
.prompt-btn {
  background: var(--panel); border: 1px solid rgba(212,175,55,0.15);
  border-radius: 20px; padding: 8px 14px;
  font-size: 12px; color: var(--gold);
  cursor: pointer; font-family: 'Inter', sans-serif;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.prompt-btn:active { background: var(--gold-dim); }

.journal-textarea {
  width: 100%; min-height: 200px;
  background: var(--panel); border: 1px solid rgba(212,175,55,0.08);
  border-radius: 12px; padding: 16px;
  color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 15px; line-height: 1.6;
  resize: vertical; outline: none;
  transition: border-color 0.2s;
}
.journal-textarea:focus { border-color: rgba(212,175,55,0.3); }
.journal-textarea::placeholder { color: rgba(240,237,230,0.25); }

.journal-actions {
  display: flex; gap: 10px; margin-top: 14px;
}
.btn {
  flex: 1; padding: 14px;
  border: none; border-radius: 10px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px; letter-spacing: 0.1em;
  cursor: pointer; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn-gold { background: var(--gold); color: var(--bg); }
.btn-gold:active { opacity: 0.85; transform: scale(0.98); }
.btn-outline { background: transparent; border: 1px solid rgba(212,175,55,0.3); color: var(--gold); }
.btn-outline:active { background: var(--gold-dim); }

.journal-history { margin-top: 32px; }
.journal-history h3 {
  font-size: 18px; color: var(--gold);
  margin-bottom: 12px; letter-spacing: 0.05em;
}
.history-entry {
  background: var(--panel); border-radius: 10px;
  padding: 14px 16px; margin-bottom: 8px;
  border: 1px solid rgba(212,175,55,0.06);
  cursor: pointer;
}
.history-date { font-size: 12px; color: var(--gold); font-weight: 500; }
.history-preview { font-size: 13px; color: rgba(240,237,230,0.5); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-rating { font-size: 11px; color: rgba(212,175,55,0.6); margin-top: 2px; }

/* ── Scouting Screen ── */
.scouting-header { margin-bottom: 20px; }
.scouting-header h1 { font-size: 32px; color: var(--gold); }

.opponent-card {
  background: var(--panel); border-radius: 12px;
  border: 1px solid rgba(212,175,55,0.08);
  margin-bottom: 12px; overflow: hidden;
  transition: all 0.2s;
}
.opponent-top {
  display: flex; align-items: center; padding: 18px 16px;
  cursor: pointer; gap: 14px;
  -webkit-tap-highlight-color: transparent;
}
.opponent-flag { font-size: 36px; }
.opponent-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 0.05em;
  color: var(--text);
}
.opponent-arrow {
  margin-left: auto; width: 20px; height: 20px;
  color: rgba(240,237,230,0.3); transition: transform 0.2s;
}
.opponent-card.expanded .opponent-arrow { transform: rotate(180deg); }
.opponent-detail { display: none; padding: 0 16px 20px; }
.opponent-card.expanded .opponent-detail { display: block; }

.intel-section { margin-bottom: 16px; }
.intel-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px; color: var(--gold);
  letter-spacing: 0.1em; margin-bottom: 6px;
}
.intel-text { font-size: 14px; line-height: 1.6; color: rgba(240,237,230,0.75); }

.scouting-note-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px; color: var(--gold);
  letter-spacing: 0.1em; margin-bottom: 6px; margin-top: 8px;
}
.scouting-note {
  width: 100%; min-height: 80px;
  background: rgba(212,175,55,0.05);
  border: 1px solid rgba(212,175,55,0.15);
  border-radius: 8px; padding: 12px;
  color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 14px; line-height: 1.5;
  resize: vertical; outline: none;
}
.scouting-note:focus { border-color: rgba(212,175,55,0.4); }
.scouting-note::placeholder { color: rgba(240,237,230,0.2); }

/* ── Legacy Screen ── */
.legacy-header { margin-bottom: 8px; }
.legacy-header h1 { font-size: 32px; color: var(--gold); }
.legacy-sub { font-size: 14px; color: rgba(240,237,230,0.5); font-style: italic; margin-top: 4px; margin-bottom: 20px; }

.legacy-featured {
  background: var(--panel);
  border: 1px solid rgba(212,175,55,0.15);
  border-radius: 14px;
  padding: 24px 20px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.legacy-featured::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.legacy-era {
  font-size: 11px; font-weight: 600; color: var(--gold);
  letter-spacing: 0.15em; text-transform: uppercase;
  margin-bottom: 8px;
}
.legacy-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px; color: var(--text);
  margin-bottom: 12px; line-height: 1.2;
}
.legacy-body {
  font-size: 15px; line-height: 1.7;
  color: rgba(240,237,230,0.75);
}
.legacy-nav-hint {
  text-align: center; font-size: 12px;
  color: rgba(240,237,230,0.3); margin-bottom: 16px;
}

.legacy-swipe-container {
  position: relative; overflow: hidden;
  touch-action: pan-y;
}

.legacy-grid { margin-top: 8px; }
.legacy-grid h3 {
  font-size: 18px; color: var(--gold);
  margin-bottom: 12px;
}
.legacy-mini {
  background: var(--panel); border-radius: 10px;
  padding: 14px 16px; margin-bottom: 8px;
  border: 1px solid rgba(212,175,55,0.06);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.legacy-mini:active { background: var(--panel-hover); }
.legacy-mini .lm-era { font-size: 10px; color: var(--gold); letter-spacing: 0.1em; font-weight: 600; }
.legacy-mini .lm-title { font-size: 14px; margin-top: 2px; color: var(--text); }

/* ── Legacy Modal ── */
.legacy-modal {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  padding: 20px;
  overflow-y: auto;
  animation: fadeIn 0.2s ease;
}
.legacy-modal.active { display: flex; align-items: center; justify-content: center; }
.legacy-modal-content {
  background: var(--panel);
  border: 1px solid rgba(212,175,55,0.15);
  border-radius: 14px;
  padding: 24px 20px;
  max-width: 400px; width: 100%;
  position: relative;
}
.legacy-modal-close {
  position: absolute; top: 12px; right: 12px;
  background: none; border: none; color: rgba(240,237,230,0.4);
  font-size: 24px; cursor: pointer; padding: 4px 8px;
}

/* ── Toast ── */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--gold); color: var(--bg);
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  z-index: 300; opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* ── Settings toggle ── */
.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0;
}
.settings-label { font-size: 14px; color: rgba(240,237,230,0.7); }
.toggle {
  width: 44px; height: 24px; border-radius: 12px;
  background: rgba(240,237,230,0.15);
  position: relative; cursor: pointer;
  transition: background 0.2s;
}
.toggle.on { background: var(--gold); }
.toggle::after {
  content: ''; position: absolute;
  width: 20px; height: 20px; border-radius: 50%;
  background: white; top: 2px; left: 2px;
  transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(20px); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.2); border-radius: 2px; }
</style>
</head>
<body>

<!-- ══════════ HOME SCREEN ══════════ -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <div class="home-logo"><span class="fern">🏑</span> BLACK STICKS</div>
  </div>
  <div class="countdown-block">
    <div class="countdown-number" id="countdown-days">---</div>
    <div class="countdown-label">DAYS TO THE WORLD CUP</div>

      <div class="tile-icon">⚡</div>

<!-- ══════════ HABITS SCREEN ══════════ -->
<div id="screen-habits" class="screen">

    <p id="habits-date"></p>
  </div>
  <div id="habits-list"></div>
</div>

<!-- ══════════ JOURNAL SCREEN ══════════ -->
<div id="screen-journal" class="screen">
  <div class="journal-header">
    <h1>JOURNAL</h1>
    <div class="journal-date" id="journal-date"></div>
  </div>
  <div class="rating-section">
    <div class="rating-label">RATE YOUR WEEK: <span id="rating-value">—</span>/10</div>
    <div class="rating-dots" id="rating-dots"></div>
  </div>
  <div class="journal-prompts">
    <button class="prompt-btn" onclick="insertPrompt('Today in training...')">Today in training...</button>
    <button class="prompt-btn" onclick="insertPrompt('Something I\'m working through...')">Something I'm working through...</button>

<div id="screen-scouting" class="screen">

    <h1>OPPOSITION INTEL</h1>

  <div id="scouting-cards"></div>
</div>

<!-- ══════════ LEGACY SCREEN ══════════ -->
<div id="screen-legacy" class="screen">
  <div class="legacy-header">
    <h1>BLACK STICKS LEGACY</h1>
  </div>
  <div class="legacy-sub">"You stand on the shoulders of what came before."</div>
  <div class="legacy-swipe-container" id="legacy-featured-container">
    <div class="legacy-featured" id="legacy-featured"></div>
  </div>
  <div class="legacy-nav-hint">← Swipe to browse all cards →</div>
  <div class="legacy-grid">
    <h3>ALL LEGACY CARDS</h3>
    <div id="legacy-list"></div>
  </div>
</div>

<!-- ══════════ LEGACY MODAL ══════════ -->
<div class="legacy-modal" id="legacy-modal">
  <div class="legacy-modal-content">
    <button class="legacy-modal-close" onclick="closeLegacyModal()">×</button>
    <div id="legacy-modal-body"></div>
  </div>
</div>

<!-- ══════════ TOAST ══════════ -->
<div class="toast" id="toast"></div>

<!-- ══════════ BOTTOM NAV ══════════ -->
<nav class="bottom-nav">
  <button class="nav-item active" data-screen="home" onclick="navigate('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10"/></svg>
    HOME
  </button>
  <button class="nav-item" data-screen="habits" onclick="navigate('habits')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    HABITS
  </button>
  <button class="nav-item" data-screen="journal" onclick="navigate('journal')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    JOURNAL
  </button>
  <button class="nav-item" data-screen="scouting" onclick="navigate('scouting')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    SCOUTING
  </button>
  <button class="nav-item" data-screen="legacy" onclick="navigate('legacy')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    LEGACY
  </button>
</nav>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════

const WORLD_CUP_DATE = new Date('2026-08-16T00:00:00');

const QUESTIONS = [
"What's the one thing you'll do today that your competitor won't?",
"The Dutch trained this morning. Did you match them?",
"Argentina prepared for YOU today. How did you prepare for them?",
"Champions do the unsexy work. What's yours today?",
"What would the 1976 team think of your effort today?",
"One technical detail. One mental rep. What are they?",
"How many times will you choose discomfort today?",

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dayOfYear() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  return Math.floor((now - start) / 86400000);
}

function formatDate(d) {
  return new Date(d || Date.now()).toLocaleDateString('en-NZ', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function store(key, val) { localStorage.setItem('bs2026_' + key, JSON.stringify(val)); }
function load(key, def) { try { const v = localStorage.getItem('bs2026_' + key); return v ? JSON.parse(v) : def; } catch(e) { return def; } }

// NAVIGATION
// ═══════════════════════════════════════

function navigate(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.screen === screen);
  });
  window.scrollTo(0, 0);
}

function getHabitData() {
  return load('habits_' + todayKey(), Array(HABITS.length).fill(false));
}

function getStreaks() {
  return load('streaks', Array(HABITS.length).fill(0));
}

function renderHabits() {
  const container = document.getElementById('habits-list');
  const checked = getHabitData();
  const streaks = getStreaks();
  document.getElementById('habits-date').textContent = formatDate();

  container.innerHTML = HABITS.map((h, i) => {
    const isChecked = checked[i];
    const streak = streaks[i];
    const streakText = streak > 0 ? `${streak}-day streak 🔥` : '';
    return `
    <div class="habit-card ${isChecked ? 'completed' : ''}" id="habit-${i}">
      <div class="habit-top">
        <div class="habit-check ${isChecked ? 'checked' : ''}" onclick="event.stopPropagation();toggleHabit(${i})">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0D0D0D" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>
        </div>
        <div class="habit-info" onclick="toggleHabitExpand(${i})">
          <div class="habit-name">${h.name}</div>
          ${streakText ? `<div class="habit-streak">${streakText}</div>` : ''}
        </div>
        <svg class="habit-expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="toggleHabitExpand(${i})"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="habit-detail">${h.desc}</div>
    </div>`;
  }).join('');
}

function toggleHabit(i) {
  const checked = getHabitData();
  checked[i] = !checked[i];
  store('habits_' + todayKey(), checked);
  updateStreaks(i, checked[i]);
  renderHabits();
}

function updateStreaks(i, completed) {
  const streaks = getStreaks();
  if (completed) {
    streaks[i] = (streaks[i] || 0) + 1;
  } else {
    streaks[i] = Math.max(0, (streaks[i] || 0) - 1);
  }
  store('streaks', streaks);
}

function toggleHabitExpand(i) {
  document.getElementById('habit-' + i).classList.toggle('expanded');
}

function initJournal() {
  document.getElementById('journal-date').textContent = formatDate();

  // Rating dots
  const dotsContainer = document.getElementById('rating-dots');
  dotsContainer.innerHTML = '';
  for (let r = 1; r <= 10; r++) {
    const dot = document.createElement('div');
    dot.className = 'rating-dot';
    dot.textContent = r;
    dot.onclick = () => setRating(r);
    dotsContainer.appendChild(dot);
  }

  // Load today's entry
  const entry = load('journal_' + todayKey(), null);
  if (entry) {
    document.getElementById('journal-text').value = entry.text || '';
    if (entry.rating) setRating(entry.rating, false);
  }

  renderJournalHistory();
}

let currentRating = 0;
function setRating(r, save = true) {
  currentRating = r;
  document.getElementById('rating-value').textContent = r;
  document.querySelectorAll('.rating-dot').forEach((d, i) => {
    d.classList.toggle('selected', i + 1 === r);
  });
  if (save) saveJournalSilent();
}

function insertPrompt(text) {
  const ta = document.getElementById('journal-text');
  if (ta.value && !ta.value.endsWith('\n')) ta.value += '\n\n';
  ta.value += text + ' ';
  ta.focus();
}

function saveJournalSilent() {
  const text = document.getElementById('journal-text').value;
  const entry = { text, rating: currentRating, date: todayKey() };
  store('journal_' + todayKey(), entry);
}

function saveJournal() {
  saveJournalSilent();
  showToast('Entry saved');
  renderJournalHistory();
}

function copyForTMA() {
  const text = document.getElementById('journal-text').value;
  const formatted = `DATE: ${formatDate()}\nWEEKLY SELF-RATING: ${currentRating || '—'}/10\nJOURNAL ENTRY:\n${text}`;
  navigator.clipboard.writeText(formatted).then(() => {
    showToast('Copied for TMA');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = formatted;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied for TMA');
  });
}

function renderJournalHistory() {
  const container = document.getElementById('journal-history');
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith('bs2026_journal_') && k !== 'bs2026_journal_' + todayKey()) {
      keys.push(k.replace('bs2026_journal_', ''));
    }
  }
  keys.sort().reverse();

  if (keys.length === 0) {
    container.innerHTML = '';
    return;
  }

  container.innerHTML = `<h3>PREVIOUS ENTRIES</h3>` + keys.slice(0, 20).map(k => {
    const entry = load('journal_' + k, {});
    const preview = (entry.text || '').substring(0, 80);
    return `<div class="history-entry" onclick="loadJournalEntry('${k}')">
      <div class="history-date">${formatDate(k)}</div>
      ${entry.rating ? `<div class="history-rating">Rating: ${entry.rating}/10</div>` : ''}
      <div class="history-preview">${preview || 'No entry text'}</div>
    </div>`;
  }).join('');
}

function loadJournalEntry(key) {
  const entry = load('journal_' + key, {});
  document.getElementById('journal-text').value = entry.text || '';
  if (entry.rating) setRating(entry.rating, false);
  document.getElementById('journal-date').textContent = formatDate(key);
  window.scrollTo(0, 0);
}

// Auto-save journal on typing
document.addEventListener('DOMContentLoaded', () => {
  const ta = document.getElementById('journal-text');
  let saveTimer;
  ta.addEventListener('input', () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveJournalSilent, 1000);
  });
});

  document.getElementById('legacy-featured').innerHTML = `
    <div class="legacy-era">${c.era}</div>
    <div class="legacy-title">${c.title}</div>
    <div class="legacy-body">${c.body}</div>
  `;
}

function openLegacyModal(idx) {
  const c = LEGACY_CARDS[idx];
  document.getElementById('legacy-modal-body').innerHTML = `
    <div class="legacy-era">${c.era}</div>
    <div class="legacy-title">${c.title}</div>
    <div class="legacy-body">${c.body}</div>
  `;
  document.getElementById('legacy-modal').classList.add('active');
}

function closeLegacyModal() {
  document.getElementById('legacy-modal').classList.remove('active');
}

// Swipe on featured card
(function() {
  let startX = 0, startY = 0;
  const el = document.getElementById('legacy-featured-container');
  el.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  el.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0) {
        currentLegacyIndex = (currentLegacyIndex + 1) % LEGACY_CARDS.length;
      } else {
        currentLegacyIndex = (currentLegacyIndex - 1 + LEGACY_CARDS.length) % LEGACY_CARDS.length;
      }
      renderLegacyFeatured(currentLegacyIndex);
    }
  }, { passive: true });
})();

// Close modal on backdrop click
document.getElementById('legacy-modal').addEventListener('click', function(e) {
  if (e.target === this) closeLegacyModal();
});

// ═══════════════════════════════════════
// STREAK RESET AT MIDNIGHT
// ═══════════════════════════════════════

function checkStreakReset() {
  const lastDate = load('lastActiveDate', null);
  const today = todayKey();
  if (lastDate && lastDate !== today) {
    // Check if yesterday's habits were completed — reset streaks for uncompleted ones
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yKey = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
    const yData = load('habits_' + yKey, Array(HABITS.length).fill(false));
    const streaks = getStreaks();
    yData.forEach((completed, i) => {
      if (!completed) streaks[i] = 0;
    });
    store('streaks', streaks);
  }
  store('lastActiveDate', today);
}

// ═══════════════════════════════════════
// NOTIFICATIONS
// ═══════════════════════════════════════

async function requestNotifications() {
  if (!('Notification' in window) || !('serviceWorker' in navigator)) return;
  if (Notification.permission === 'default') {
    await Notification.requestPermission();
  }
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════

function init() {
  updateCountdown();
  updateDailyQuestion();
  renderHabits();
  initJournal();
  renderScouting();
  renderLegacy();
  checkStreakReset();
  requestNotifications();

  // Update countdown every minute
  setInterval(updateCountdown, 60000);
}

document.addEventListener('DOMContentLoaded', init);

// Service Worker Registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('bs2026-sw.js').catch(() => {});
}
</script>
