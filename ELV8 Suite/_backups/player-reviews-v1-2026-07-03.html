<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Black Sticks — Player Reviews</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Montserrat',-apple-system,'Segoe UI',Arial,sans-serif; background:#141414; color:#fff; min-height:100vh; }

/* NAV */
nav { background:#1c1c1c; display:flex; align-items:center; padding:0 20px; border-bottom:2px solid #2a2a2a; flex-wrap:wrap; position:sticky; top:0; z-index:50; }
nav .navmark { display:flex; align-items:center; gap:10px; padding:12px 0; margin-right:26px; }
nav .navmark .nm-txt { font-weight:900; font-size:15px; letter-spacing:2px; color:#fff; }
nav .navmark .nm-txt small { display:block; font-size:9px; letter-spacing:3px; color:#D4AF37; font-weight:700; }
nav button { background:none; border:none; color:#8c8c8c; font-size:14px; padding:16px 16px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .2s; font-weight:600; }
nav button:hover { color:#fff; }
nav button.active { color:#fff; border-bottom-color:#D4AF37; }

.view { display:none; padding:24px; max-width:1500px; margin:0 auto; }
.view.active { display:block; }

h2 { font-size:21px; margin-bottom:4px; color:#fff; font-weight:800; }
.sub { color:#8c8c8c; font-size:12.5px; margin-bottom:18px; }
h3 { font-size:15px; margin-bottom:10px; color:#c4c4c4; }
.btn { padding:9px 16px; border:none; border-radius:5px; cursor:pointer; font-size:13px; font-weight:700; transition:all .2s; }
.btn-primary { background:#D4AF37; color:#161616; }
.btn-primary:hover { background:#c5a032; }
.btn-secondary { background:#2c2c2c; color:#fff; }
.btn-secondary:hover { background:#3a3a3a; }
.btn-danger { background:#5a2320; color:#f2a49e; }
.btn-danger:hover { background:#75302b; }
.btn-success { background:#2a9d3a; color:#fff; }
.btn-sm { padding:5px 11px; font-size:12px; }
input, select, textarea { padding:8px 11px; border:1px solid #383838; border-radius:5px; background:#111; color:#fff; font-size:13px; font-family:inherit; }
input:focus, select:focus, textarea:focus { outline:none; border-color:#D4AF37; }
label { font-size:11px; color:#9a9a9a; display:block; margin-bottom:4px; text-transform:uppercase; letter-spacing:1px; font-weight:700; }
.toolbar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
.form-row { display:flex; gap:12px; margin-bottom:12px; flex-wrap:wrap; align-items:flex-end; }
.form-group { display:flex; flex-direction:column; }
.form-group input, .form-group select, .form-group textarea { width:100%; }
.muted { color:#8c8c8c; font-size:12px; }
.panel { background:#1e1e1e; border:1px solid #303030; border-radius:8px; padding:18px; margin-bottom:16px; }
.panel h3 { color:#D4AF37; margin-bottom:12px; font-size:12px; letter-spacing:2px; text-transform:uppercase; }

/* SQUAD */
.unit-head { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:#D4AF37; font-weight:800; margin:22px 0 10px; border-bottom:1px solid #2c2c2c; padding-bottom:7px; }
.squad-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:10px; }
.squad-card { background:#1e1e1e; border:1px solid #303030; border-radius:8px; padding:16px 10px 12px; text-align:center; cursor:pointer; transition:all .15s; position:relative; }
.squad-card:hover { border-color:#D4AF37; transform:translateY(-2px); }
.squad-card img { width:84px; height:84px; border-radius:50%; object-fit:cover; border:2px solid #D4AF37; margin-bottom:8px; background:#111; }
.squad-card .no-photo { width:84px; height:84px; border-radius:50%; background:#2a2a2a; display:flex; align-items:center; justify-content:center; margin:0 auto 8px; font-size:26px; font-weight:800; color:#D4AF37; border:2px solid #D4AF37; }
.squad-card h4 { font-size:13.5px; color:#fff; margin-bottom:2px; font-weight:700; }
.squad-card .pos { color:#8c8c8c; font-size:11px; }
.squad-card .form { margin-top:8px; display:flex; justify-content:center; gap:6px; align-items:center; }
.fchip { font-size:10px; font-weight:800; padding:3px 8px; border-radius:10px; background:#2a2a2a; color:#D4AF37; }
.fchip.grey { color:#9a9a9a; }
.hist-dot { position:absolute; top:8px; right:10px; font-size:9px; font-weight:800; color:#7bc47f; letter-spacing:1px; }

/* PLAYER DRAWER */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.72); z-index:100; }
.overlay.open { display:block; }
.drawer { position:fixed; top:0; right:-720px; width:min(700px,96vw); height:100vh; background:#191919; border-left:2px solid #D4AF37; z-index:101; transition:right .25s ease; overflow-y:auto; padding:26px; }
.drawer.open { right:0; }
.drawer .d-close { position:sticky; top:0; float:right; background:#2c2c2c; color:#fff; border:none; border-radius:50%; width:34px; height:34px; font-size:16px; cursor:pointer; }
.d-head { display:flex; gap:18px; align-items:center; margin-bottom:20px; }
.d-head img { width:96px; height:96px; border-radius:50%; object-fit:cover; border:2px solid #D4AF37; }
.d-head .dh-name { font-size:24px; font-weight:900; }
.d-head .dh-meta { color:#9a9a9a; font-size:12px; margin-top:3px; }
.d-sec { margin-bottom:20px; }
.d-sec h4 { font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:#D4AF37; margin-bottom:9px; font-weight:800; }
.d-sec .kv { font-size:12.5px; line-height:1.6; color:#d9d9d9; margin-bottom:8px; }
.d-sec .kv b { color:#fff; }
.gold-box { background:#221d10; border:1px solid #4a3d17; border-left:3px solid #D4AF37; border-radius:6px; padding:12px 14px; font-size:12.5px; line-height:1.55; color:#e8dcb8; }
.hist-entry { background:#1e1e1e; border:1px solid #2e2e2e; border-radius:6px; margin-bottom:8px; overflow:hidden; }
.hist-entry .he-head { padding:10px 14px; cursor:pointer; display:flex; justify-content:space-between; font-size:12px; font-weight:700; color:#fff; }
.hist-entry .he-head small { color:#8c8c8c; font-weight:600; }
.hist-entry .he-body { display:none; padding:0 14px 14px; font-size:12.5px; line-height:1.65; color:#c9c9c9; white-space:pre-wrap; border-top:1px solid #2a2a2a; padding-top:10px; }
.hist-entry.open .he-body { display:block; }

/* MATCH LIST */
.review-card { background:#1e1e1e; border:1px solid #303030; border-radius:8px; padding:16px; margin-bottom:8px; cursor:pointer; transition:all .15s; display:flex; justify-content:space-between; align-items:center; }
.review-card:hover { border-color:#D4AF37; }
.review-card .info h4 { color:#fff; font-size:15px; margin-bottom:3px; }
.review-card .info small { color:#8c8c8c; font-size:12px; }
.review-actions { display:flex; gap:6px; align-items:center; }
.prog-pill { font-size:11px; font-weight:800; padding:4px 10px; border-radius:12px; background:#2a2a2a; color:#D4AF37; }

/* PLAYER RAIL */
.rail { display:flex; gap:8px; overflow-x:auto; padding:12px 4px 14px; margin-bottom:6px; -webkit-overflow-scrolling:touch; }
.rail .rp { flex:0 0 auto; text-align:center; cursor:pointer; width:64px; }
.rail .rp img, .rail .rp .ph { width:52px; height:52px; border-radius:50%; object-fit:cover; border:2px solid #3a3a3a; display:block; margin:0 auto 4px; background:#222; transition:all .15s; }
.rail .rp .ph { display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:800; color:#8c8c8c; }
.rail .rp small { font-size:9.5px; color:#8c8c8c; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:600; }
.rail .rp.done img, .rail .rp.done .ph { border-color:#2a9d3a; }
.rail .rp.active img, .rail .rp.active .ph { border-color:#D4AF37; box-shadow:0 0 0 2px rgba(212,175,55,.35); }
.rail .rp.active small { color:#D4AF37; }
.rail .rp.dnp { opacity:.35; }

/* EDITOR LAYOUT */
.editor { display:grid; grid-template-columns:340px 1fr; gap:16px; align-items:start; }
@media (max-width:900px) { .editor { grid-template-columns:1fr; } }
.intel { background:#1e1e1e; border:1px solid #303030; border-radius:8px; padding:18px; position:sticky; top:70px; }
@media (max-width:900px) { .intel { position:static; } }
.intel .i-head { display:flex; gap:14px; align-items:center; margin-bottom:14px; }
.intel .i-head img, .intel .i-head .ph { width:66px; height:66px; border-radius:50%; object-fit:cover; border:2px solid #D4AF37; }
.intel .i-head .ph { background:#2a2a2a; display:flex; align-items:center; justify-content:center; font-weight:800; color:#D4AF37; font-size:20px; }
.intel .i-name { font-size:17px; font-weight:800; }
.intel .i-meta { font-size:11px; color:#9a9a9a; margin-top:2px; }
.intel h5 { font-size:9.5px; letter-spacing:2px; text-transform:uppercase; color:#D4AF37; margin:14px 0 7px; font-weight:800; }
.intel .focus-li { font-size:12px; color:#d9d9d9; line-height:1.5; padding-left:14px; position:relative; margin-bottom:5px; }
.intel .focus-li::before { content:''; position:absolute; left:0; top:6px; width:5px; height:5px; border-radius:50%; background:#D4AF37; }
.spark-mini { margin-top:6px; }
.wispr-box textarea { min-height:280px; font-size:14px; line-height:1.7; padding:14px; resize:vertical; }
.wispr-hint { display:flex; align-items:center; gap:8px; font-size:11.5px; color:#9a9a9a; margin-top:6px; }
.wispr-hint .mic { width:8px; height:8px; border-radius:50%; background:#e23b2e; animation:pulse 1.6s infinite; }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
.score-chips { display:flex; gap:6px; flex-wrap:wrap; }
.score-chips button { width:42px; height:42px; border-radius:8px; border:1px solid #3a3a3a; background:#161616; color:#c4c4c4; font-weight:800; font-size:15px; cursor:pointer; transition:all .12s; }
.score-chips button:hover { border-color:#D4AF37; color:#fff; }
.score-chips button.sel { background:#D4AF37; color:#161616; border-color:#D4AF37; }
.dnp-toggle { display:flex; align-items:center; gap:8px; font-size:12px; color:#9a9a9a; cursor:pointer; font-weight:600; }
.dnp-toggle input { width:16px; height:16px; }

/* ============================================================= */
/* OUTPUT DOCUMENT — Black Sticks premium player-facing document  */
/* ============================================================= */
.doc { background:#fff; color:#15171a; width:100%; max-width:860px; margin:0 auto 34px; box-shadow:0 14px 50px rgba(0,0,0,.45); border-radius:10px; overflow:hidden; }
.doc * { color:#15171a; }

.bs-mast { background:#0d0d0d; padding:20px 34px; display:flex; justify-content:space-between; align-items:center; gap:18px; border-bottom:3px solid #D4AF37; }
.bs-mast * { color:#fff; }
.bs-mast .bm-left { display:flex; align-items:center; gap:14px; }
.bs-mast .bm-word { line-height:1.1; }
.bs-mast .bm-word .w1 { font-size:19px; font-weight:900; letter-spacing:2.5px; color:#fff !important; }
.bs-mast .bm-word .w2 { font-size:9px; font-weight:800; letter-spacing:4px; color:#D4AF37 !important; margin-top:2px; }
.bs-mast .bm-right { text-align:right; display:flex; gap:26px; }
.bs-mast .bm-meta .e { font-size:8.5px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#8c8c8c !important; margin-bottom:3px; }
.bs-mast .bm-meta .v { font-size:12.5px; font-weight:700; color:#fff !important; }
.bs-mast .bm-meta .v.gold { color:#D4AF37 !important; }
.bs-kicker-band { background:#161616; padding:7px 34px; display:flex; justify-content:space-between; align-items:center; }
.bs-kicker-band span { font-size:9px; font-weight:800; letter-spacing:3.5px; text-transform:uppercase; color:#b7b7b7 !important; }
.bs-kicker-band span.g { color:#D4AF37 !important; }

.pl-band { display:flex; align-items:center; gap:22px; padding:26px 34px 22px; border-bottom:1px solid #ebebeb; }
.pl-band img.hs { width:104px; height:104px; border-radius:50%; object-fit:cover; border:3px solid #D4AF37; }
.pl-band .hs-ph { width:104px; height:104px; min-width:104px; border-radius:50%; background:#f0ede4; border:3px solid #D4AF37; display:flex; align-items:center; justify-content:center; font-size:34px; font-weight:800; color:#b8952e; }
.pl-band .pb-name { font-size:29px; font-weight:900; letter-spacing:.3px; line-height:1.05; }
.pl-band .pb-meta { font-size:12px; color:#7d8085; margin-top:6px; font-weight:600; }
.pl-band .pb-meta b { color:#b8952e; }
.pl-band .pb-right { margin-left:auto; display:flex; gap:26px; align-items:center; }
.score-ring { width:84px; height:84px; min-width:84px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.score-ring .sc-num { font-size:32px; font-weight:900; line-height:1; }
.score-ring .sc-den { font-size:11px; font-weight:700; opacity:.8; margin-top:-1px; }
.score-cap { font-size:8.5px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#9a9a9a; text-align:center; margin-top:6px; }

.form-strip { padding:16px 34px; background:#fafaf7; border-bottom:1px solid #ebebeb; display:flex; align-items:center; gap:26px; }
.form-strip .fs-label { font-size:9px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#9a9a9a; }
.form-strip svg { display:block; }

.focus-band { padding:18px 34px; border-bottom:1px solid #ebebeb; }
.sec-head { font-size:10.5px; font-weight:800; letter-spacing:2.5px; text-transform:uppercase; color:#15171a; display:inline-block; padding-bottom:5px; border-bottom:2px solid #D4AF37; margin-bottom:13px; }
.focus-chips { display:flex; flex-direction:column; gap:8px; }
.focus-chip { display:flex; gap:12px; align-items:flex-start; font-size:12.5px; font-weight:600; color:#2a2d31; line-height:1.5; }
.focus-chip .n { flex:0 0 22px; height:22px; border-radius:50%; background:#0d0d0d; color:#D4AF37; font-size:10.5px; font-weight:800; display:flex; align-items:center; justify-content:center; margin-top:1px; }

.doc-body { padding:26px 34px; }
.letter p { font-size:13.5px; line-height:1.75; color:#26292d; margin-bottom:14px; }
.letter p:last-child { margin-bottom:0; }
.signoff { margin-top:20px; font-size:14px; font-weight:700; color:#15171a; }
.signoff small { display:block; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#9a9a9a; font-weight:800; margin-top:2px; }

.two-col { display:flex; gap:34px; }
.two-col > * { flex:1; min-width:0; }
.bullet { position:relative; padding:4px 0 12px 18px; font-size:13px; line-height:1.55; color:#2a2d31; }
.bullet::before { content:''; position:absolute; left:0; top:9px; width:4px; height:14px; border-radius:2px; background:#D4AF37; }
.bullet.good::before { background:#2a9d3a; }
.bullet.warn::before { background:#e23b2e; }
.hair { border:none; border-top:1px solid #ebebeb; margin:22px 0; }

.data-line { display:flex; align-items:baseline; gap:14px; background:#f7f6f2; border-left:3px solid #D4AF37; padding:12px 16px; margin-top:6px; }
.data-line .dl-label { font-size:9.5px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#b8952e; flex-shrink:0; }
.data-line .dl-text { font-size:12.5px; color:#2a2d31; line-height:1.5; }

.next-band { background:#0d0d0d; padding:20px 34px; display:flex; align-items:center; gap:22px; }
.next-band * { color:#fff !important; }
.next-band .nb-k { font-size:9px; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:#8c8c8c !important; white-space:nowrap; }
.next-band .nb-v { font-size:15px; font-weight:800; color:#D4AF37 !important; }
.next-band .nb-t { font-size:12.5px; line-height:1.55; color:#e2e2e2 !important; }

.doc-foot { display:flex; justify-content:space-between; align-items:center; padding:13px 34px; background:#0d0d0d; }
.doc-foot span { font-size:9.5px; letter-spacing:1.5px; color:#8c8c8c !important; font-weight:600; }
.doc-foot .fr { color:#b8952e !important; }

/* review deck extras (kept from v1, restyled) */
.chip { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:5px 12px; border-radius:20px; border:1px solid #e7e7e7; color:#9a9a9a; }
.chip.on-green { background:#eaf6ec; border-color:#b9e0bf; color:#1e7a2b; }
.chip.on-amber { background:#fbf3e3; border-color:#ecd9a6; color:#a07a1a; }
.chip.on-red { background:#fbeae8; border-color:#f0c5bf; color:#c0322a; }
.rating-row { display:flex; gap:8px; }
.rating-tag { flex:1; text-align:center; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:9px 6px; border-radius:4px; border:1px solid #e7e7e7; color:#b0b0b0; }
.rating-tag.on-green { background:#eaf6ec; border-color:#2a9d3a; color:#1e7a2b; }
.rating-tag.on-amber { background:#fbf3e3; border-color:#D4AF37; color:#a07a1a; }
.rating-tag.on-red { background:#fbeae8; border-color:#e23b2e; color:#c0322a; }
.traj-note { font-size:11px; font-style:italic; color:#8c8c8c; margin-top:8px; }
.statement { font-size:15px; font-style:italic; line-height:1.7; color:#2a2d31; }
.num-item { display:flex; gap:14px; margin-bottom:16px; }
.num-dot { width:26px; height:26px; min-width:26px; border-radius:50%; background:#0d0d0d; color:#D4AF37; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; }
.num-dot.warn { background:#e23b2e; color:#fff; }
.num-body { flex:1; }
.num-body .ni-title { font-size:13px; font-weight:700; color:#15171a; margin-bottom:3px; }
.num-body .ni-detail { font-size:12px; line-height:1.5; color:#4a4d51; }
.num-body .ni-coach { font-size:12px; line-height:1.45; color:#b8952e; font-weight:600; margin-top:4px; }
.three-col { display:flex; gap:28px; }
.three-col > * { flex:1; min-width:0; }
.aca-item { display:flex; gap:12px; margin-bottom:14px; align-items:flex-start; }
.aca-letter { width:40px; height:40px; min-width:40px; border-radius:50%; border:2px solid #D4AF37; display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:800; color:#b8952e; }
.aca-content .aca-title { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#15171a; margin-bottom:2px; }
.aca-content .aca-desc { font-size:11px; color:#6a6d71; line-height:1.4; }
.pullquote { border-left:3px solid #D4AF37; padding:4px 0 4px 18px; font-size:14px; font-style:italic; line-height:1.65; color:#2a2d31; }
.eyebrow { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#9a9a9a; }
.jd-item .jd-claim { font-size:13px; color:#2a2d31; line-height:1.5; margin-bottom:8px; }
.doc-page { page-break-after:always; }
.doc-page:last-child { page-break-after:avoid; }
.sec { margin-bottom:28px; }
.sec:last-child { margin-bottom:0; }

/* PRINT */
@media print {
  body { background:#fff; }
  nav, .view:not(#view-preview), .preview-controls, .no-print { display:none !important; }
  #view-preview { display:block !important; padding:0; }
  .doc { max-width:none; margin:0; box-shadow:none !important; border-radius:0; }
  .doc, .doc-page { page-break-after:always; }
  .doc:last-child, .doc-page:last-child { page-break-after:avoid; }
  * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
  @page { margin:8mm; size:A4 portrait; }
}
</style>
</head>
<body>

<nav>
  <span class="navmark" id="nav-mark"></span>
  <button data-v="squad" class="active" onclick="switchView('squad')">Squad</button>
  <button data-v="postmatch" onclick="switchView('postmatch')">Post-Match</button>
  <button data-v="deck" onclick="switchView('deck')">Review Deck</button>
  <button data-v="preview" onclick="switchView('preview')">Preview / Print</button>
</nav>

<div id="view-squad" class="view active"></div>
<div id="view-postmatch" class="view"></div>
<div id="view-deck" class="view"></div>
<div id="view-preview" class="view"></div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"></div>

<script>
// =============================================
// EMBEDDED SQUAD DATA — generated from the AI Coaching Brain

ound, you made all the right defensive calls.\n\n      Very good on the ball and your general positional play was solid.\n\n      Option-taking was good. It can feel like you did not do much in a game like that, but that is\n      more a product of Scotland's low block than your performance.\n\n      For Game 2: if Brad comes in, I am thinking of having him in the middle and starting you\n      on the outside so you are getting the time on the ground you need. If you have any\n      thoughts on that, come see me.\n\nLet me know after reviewing your clips if there is anything you want to go through. Recover well and let us\ncrack into Korea.\n\nShea"},{"date":"2026-06-13","title":"Nations Cup 2026 — Game 1 v Scotland","body":"Not gonna lie, I know it would have been a frustrating game for you last night. With the way things worked out and the minutes played, I'll try to adjust this for Game 2 against Korea so you can have more influence on the game.\n\nIf, for example, Brad comes in, I might put him in the middle and have you start on the outside as an option to keep you feeling like you're getting the time on the ground that you need. If you have any issues with any of that, just come see me.\n\nWhen you're on the ground, you made all the right calls defensively. You were very good on the ball and really good. It's one of those games where you feel like you didn't really do much, but I think for the back group it probably didn't feel like they did a heap, just more because of the low block that Scotland were playing. Your general positional play and option-taking is good.\n\nLet us know if, after reviewing your clips or anything, you want to go through anything. Otherwise, recover well and look forward to cracking into Game 2 against Korea."},{"date":"2026-06-15","title":"Nations Cup 2026 — Game 2 v Korea","body":"A solid game again, mate. I think you generally do all the right stuff. You're controlling the ball, and your positioning in the third was really good. You were able to find your passes at will, which was something really good for us, and it allowed us to control the ball.\n\nIt was good to see you have the ability to play a lot of hockey on the right-hand side. I know of late I've been playing a little bit more on the left, but I think you do really well on the right as well.\n\nOne of the big things you've been starting to bring forward is your deception of looking like you're going to push and overhit. I still want you to keep that at the forefront of your mind, because it will just hold the defender high before you can pop the ball over, so keep that in your advance.\n\nGeneral defensive work was good and strong, so always in the challenge, always in the fight.\n\nOne thing I do want you to review is your PCD running. With Mel likely to be out running, you might be required to do a bit more, but you've gone back to the habit of turning your shoulders away from the ball.\n\nYou're one of the bravest guys I know, so I want you to stay as true to the ball as possible. Both legs parallel, horizontal to the flick. At no point do I want to see you turning away from it. That's your big rock work for PCD.\n\nIf you need to catch up at all through the day, let me know."},{"date":"2026-06-16","title":"Nations Cup 2026 — v Japan","body":"Game of two halves yesterday. The first half we did a lot well. The second half is the one to learn from.\n\nKeen for you to go through your game and send me your read on the second half in particular. Use this lens: what I did, what I need to do to lift my performance, and what the team needs. This is what Japan were doing, this is what I am seeing in front of me, and this is what I want in front of me.\n\nTighten that connection and we are better for the weekend. Recover well today."}]},{"id":"kane-russell","name":"Kane Russell","nickname":"Nos","position":"Defender","unit":"Defender","seasonAvg":8.0,"matches":4,"ratingLabel":"World Class","photo":"data:image/jpeg;base64,/9j/4AAQSkZJRgABA w132m/DvWbqyMiPbq5OGiZiGX9MU+5+GV6kJZryNJ+pR0OPzFZe3prqdH1Ss1pE86pyKWYKOpq9rOkXuj3Pk38JjP8AC3VWHqD3qbR7Vx/pTwl4lPTOM1o5K10YKm+blaNO3i+y6cUC4LgAk/yqugJcZqWa8FycDPHUEcg1Z0uBpbhcDIHWuZu2rO+MU7JFvSYCZlJGV/lWb4x1AiUafC2ETmTHc+ldY7RaVp011PjEa8A8Et2H515fPK88zyyHc7sWY+pNFGPNLmZOKlyR5F1I6KKK6zzwooooAKKKKAP/2Q==","focus":["PCA — get on the ball fast, variation (inside/around)","Outlet — dynamic & aggressive, balanced (high ball / hard & fast)","Defence — front marking, intercepting, 1v1 tackling"],"scores":[{"d":"2026-02-01","o":"Japan","s":8.0},{"d":"2026-02-02","o":"Japan","s":8.0},{"d":"2026-02-04","o":"Japan","s":9.0},{"d":"2026-06-12","o":"Scotland","s":7.0},{"d":"2026-06-14","o":"Korea","s":8.0},{"d":"2026-06-16","o":"Malaysia","s":9.0},{"d":"2026-06-17","o":"Japan","s":7.0},{"d":"2026-06-19","o":"RSA","s":6.0},{"d":"2026-06-30","o":"Japan","s":6.0}],"comms":{"pref":"Direct, collaborative & visual. Clear, honest messages he can engage with, reinforced by clips or notes. In-game: one direct point, then let him play. Post-session: use clips or written notes in collaborative conversation.","pressure":"Helped by internal standards & pride, competition & challenge, external stakes (selection, results). Disrupted by physical fatigue (impacts decision speed), lack of control (game feels chaotic, roles blur).","motivation":"Enjoyment & connection (feels free, present, engaged), competing vs. the best, representing something bigger","connection":"3/10 away from camp (prefers independence, light functional contact). 6/10 during camp/tours (regular, efficient, purposeful).","wcFocus":"Consistent contribution to team success — reliability, role execution, contribution over moments.","keyNote":"One point in-game, then trust him. Post-session needs clips or notes — he processes visually. Don't over-control or over-instruct."},"history":[{"date":"2026-06-10","title":"Pre-Event Game 1","body":"KANE\nI imagine it felt like an interesting game. It probably started a bit slow, but once you got into the\ngroove you were very good.\n\n      Your general ball play, positioning and option-taking were all really solid once you found your\n      rhythm.\n\n      You sped the game up and slowed it down well, got the ball to the outside when we needed it,\n      and the aerials to change up our attack were a good addition. Keep that in your back pocket for\n      Korea.\n\n      Against Korea, look to use the aerial when they sit in a slow setup. Win the ball, then\n      look to send it back through there. You will remember from Japan in January how quick\n      the Asian teams are on the counter, so that option in transition is going to matter.\n\n      Unlucky yellow\n              green card. I did not think you deserved it. But your 1v1 defence has been very good,\n      and coming from the South Africa game to this one, that is a real improvement.\n\nRecover well. If there is anything you want to go through from your clips, just let me know.\n\nShea"},{"date":"2026-06-13","title":"Nations Cup 2026 — Game 1 v Scotland","body":"I bet this was a bit of an interesting game for you. It probably started off a little bit slow, with a few small base errors, but I think once you got into the groove of the game, your general ball play, positioning, and option-taking were really good.\n\nI know it's never easy as one of the two central defenders when you're playing against a low block like that to feel like you can influence the game. I thought you were able to speed the game up and slow it down, get the ball to the outside when we needed it, and take generally good options. It was also good to see you throw a few good aerials to change up our attack, so always have that in your back pocket. This is one thing I think you can look to do against Korea, just with a bit of their slow setup once we win the ball and then try to get it back through there.\n\nDefensively, I thought it was an unlucky yellow card. I didn't think he deserved it, but in general I actually thought he won some really good balls for us. I think on memory there were two times when we were in a bit of trouble, and you won the ball very well. Your one-on-one defence, even coming back from the South Africa game to this one, has been very good, and it is something that we'll need from you, particularly as we start going into the Asian teams who are very quick on the counter and very quick at moving the ball, as you'll remember from when we played Japan in January.\n\nRecover well today. If there's anything you want to go through from your clips, let me know."},{"date":"2026-06-15","title":"Nations Cup 2026 — Game 2 v Korea","body":"Nossy, awesome game, man. The thing you always bring is your overall calmness and quality to our play. I think you said your base level game was slightly down in game one, but you brought that to the fore last night. The simplicity of your play, your ability to read the press and play against it, and your ability to play simply to our guys and punch and pass through were really good to see. The two big rocks for us that you did exceptionally well and started to take the game away from Korea were your flicking ability, which is awesome to see.\n\nThen the second rock is your 1 on 1 defence was exceptional. You won so many ball even when it looked like you were caught out. Your ability to get back into the fight and steal the ball was exceptional.\n\nGreat to see you playing so well and dominating in the black shirt.\n\nJust heard you're a bit crook so hopefully you rebound quickly! Look after yourself and sing out if you need anything."},{"date":"2026-06-16","title":"Nations Cup 2026 — v Japan","body":"Nos, what an achievement, mate. The 100th and 101st goals. Be extremely proud of that. I know you are not a stats or milestone man, but only a handful of players in New Zealand's history have done it before you.\n\nIt has been awesome watching you evolve, as a player, as a person, and as a flicker. You keep getting better, and that is great for you and for us.\n\nFirst half we had real control and dominated Japan. They struggled to live with us.\n\nThe second half is the one to review, especially what you want in front of you when you are on the ball, even a man down. It felt like too many guys were hiding and not giving you a clear lead. Pull a couple of clips so we know exactly how we get out of that if the pressure comes on at any point through the weekend.\n\nI will be looking to keep you on for longer stints, so recover well, do all the right things, and let us go get the treble."}]},{"id":"benji-culhane","name":"Benji Culhane","nickname":"Benj","position":"Defender","unit":"Defender","seasonAvg":7.2,"matches":22,"ratingLabel":"Established","photo":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBQYFBAYGBQYHBwYIChAKCgkJChQODwwQFxQYGBcUFhYaHSUfGhsjHBYWICwgIyYnKSopGR8tMC0oMCUoKSj/2wBDAQcHBwoIChMKChMoGhYaKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCj/wAARCAFAAUADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwD5UooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKK -30","o":"Japan","s":7.0}],"comms":{"pref":"Direct & honest, visual or written (tangible reference points aid recall), in the moment","pressure":"Helped by competition & challenge, clear targets, internal standards. Disrupted by physical fatigue, overthinking mistakes.","motivation":"Competing against the best, high-performance team, enjoyment of the game","connection":"High — values regular check-ins, clarity, coach accessibility","wcFocus":"Consistent team contribution — reliability, defined role, collective outcomes over individual accolades.","keyNote":"Errors can linger mentally if not reset quickly. Give clear targets and written reference points."},"history":[{"date":"2026-06-10","title":"Pre-Event Game 1","body":"BENJI\nSolid game last night. What is becoming a real feature of your game is your comfort on the ball, and\nthat continued last night.\n\n      Even under press, you are making the right decisions: go forward, break inside, or roll\n      back out. Keep that as a mainstay of your game.\n\n      The little nuances are tidying up too. Your receives and passing are starting to sharpen, and\n      when those are consistent, you will be flying.\n\n      Your positioning on the outside compromised the Scottish structure well, and your option-taking\n      was generally solid.\n\n      Defensive work was good. You are physical when you need to be, never caught out, and your\n      positioning is strong. Keep that smart because it is a real strength.\n\n      Forward thinking for the Asian teams: they are very quick on the ball and cut inside\n      sharply, so your mobility needs to come up. In those advanced positions, start thinking\n      about a reverse cross on the left, a hook sweep when you are on speed, and a little\n      skippy push pass. Those tools will start putting you in the circle and really causing\n      problems.\n\nRecover well today. If there is anything you want to go through from your clips, just let me know.\n\nShea"},{"date":"2026-06-13","title":"Nations Cup 2026 — Game 1 v Scotland","body":"Sort of game last night, Benji. I think what has been a bit of a bedrock of your game of late has been your general comfort on the ball, which has been growing from game to game.\n\nEven when you're getting pressed, you feel comfortable on the ball to make the right decisions, whether it's to go forward, break inside, or roll back out. Keep this as a mainstay of your game now. The little nuances of the game, like your receives and passing skills, are starting to tidy up, and you'll be absolutely flying. Your positioning on the outside to compromise the Scottish structure is good, and your option-taking is generally pretty good.\n\nSomething to forward think to for the July camp is what we can do when you're in those advanced positions. We've worked on your dribbling skill set, but are there: a reverse cross if you're playing on the left, a hook sweep when you're on speed, a little skippy push pass. These can aid your ability to get the ball into the circle and really compromise opposition teams.\n\nDefensive work was good. I love how physical you can get, so just keep that smart, because when you're so good at defending, you don't need to do those other things. You're never caught out and are always in really good position.\n\nForward thinking for the Asian teams we're now going to play is how quick they are on the ball and how they cut inside, so your mobility needs to come up a notch again. Recover well today. If there's anything we want to go through, reviewing your clips, let me know."},{"date":"2026-06-15","title":"Nations Cup 2026 — Game 2 v Korea","body":"Benj Matt, what a way to score your first goal. How good. The positive is your ability to get up and get back, which is awesome to see. I think you bring to the team your ability to get up and get back, and your defensive work has been really good.\n\nYour one-on-one tackling has been strong, even though you've made a few tackle errors. There have been a few where it's just given away a free hit, and I'm totally happy with that. The biggest thing is that we just don't want to make a tackle error and then get it eliminated, so it shows that your mobility to stay in the one-on-one challenge has been really positive.\n\nA couple of big rocks for tomorrow:\n- Be really keen to match up with Azrai, because I think you've got the physical capability to match with him.\n- Be conscious of some of the skill sets he will try and do, like the little chip and chase, and that kind of stuff.\n- Be really keen for you to be thinking about your intercepting game, which I think will be really good for you to want to be set to receive those balls down the line.\n\nOverall, solid performance again. It's been really cool to see you keep evolving from game to game, and good to see you getting off the mark. Just to be aware, I scored 34 goals from 320 international games, so not too bad. You got a little way to go yet, mate haha!"},{"date":"2026-06-16","title":"Nations Cup 2026 — v Japan","body":"Tale of two halves out there. The first half we were very dominant and in good control. Your first half was good, sound decision-making and real comfort on the ball.\n\nThere are always things we can do better, like cutting out the one-out attacks, but that sits more with the front and midfield group holding the ball in front of them a bit longer.\n\nA really solid 30 to 35 minutes, then it went pear-shaped in the second half. For you, this is a good one to review around three things:\n\n•  What can you do better?\n\n•  What can the group around you do better?\n\n•  What do you want from the players in front of you?\n\nThere is one clip in particular where you did an excellent broken turn and ran forward, bypassing their press. Great to go, but you also need to read what is in front of you. If the leads are not there, I know it is a hard one to keep driving into.\n\nThat is the big rock for the back group. We beat the press a few times, then turned back into it and invited the pressure straight back on. That is the next level for us this weekend.\n\nPull a few clips, bring them to me for a chat, or even better take them to the group around you. Recover well today, big weekend ahead, go smash it."}]},{"id":"charlie-morrison","name":"Charlie Morrison","nickname":"Chamo","position":"Defender","unit":"Defender","seasonAvg":7.4,"matches":22,"ratingLabel":"Elite","photo":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBQYFBAYGBQYHBwYIChAKCgkJChQODwwQFxQYGBcUFhYaHSUfGhsjHBYWICwgIyYnKSopGR8tMC0oMCUoKSj/2wBDAQcHBwoIChMKChMoGhYaKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCj/wAARCAFAAUADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwD5UooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAqSKTyyflVgRghhUdOjUuwABNAFp7FysbxZaOTkE9V+v5UjWbx3BiYbsHBxW/o8QRRHIx4Hyk9PUc/X+daXkW8kkrSwsQfmjZOpz1H51k6ljeNLmVzkruzMQkbHCcE5xk1Qrp9bs5lunWAmWLJwOmD3rDmsZogN64Y9s9vWrjK6M5wcWVKKekbPIEUfMTjFEqeXIyZzg4zVEDKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooqSGF5SQg6cmgCOpIIXmcKg5pmCO1XdJtpLi6XyztI6HnrSbsNK7sLHps +K5paI74e9I9K8LwGOFSDwO57VzXxrvdul6fZKwy8pkIHoB/ia7PQEMNmu4Y3c1458UdS+3+KpkVsx2wEQ+vessPHmqX7G2Mny0Wu5yFFFFekeGf/Z","focus":["1v1 defending cues and triggers","Variation — air, ground, long, short, punch, pass","Decision making under fatigue"],"scores":[{"d":"2025-06-15","o":"Japan","s":7.0},{"d":"2025-06-16","o":"Malaysia","s":7.0},{"d":"2025-06-18","o":"Pakistan","s":8.0},{"d":"2025-06-20","o":"Korea","s":9.0},{"d":"2025-06-21","o":"Pakistan","s":9.0},{"d":"2025-11-23","o":"Malaysia","s":7.0},{"d":"2025-11-24","o":"Korea","s":8.0},{"d":"2025-11-26","o":"Canada","s":6.0},{"d":"2025-11-27","o":"Malaysia","s":8.0},{"d":"2025-11-27","o":"India","s":6.0},{"d":"2025-11-29","o":"Belgium","s":6.0},{"d":"2025-11-30","o":"Malaysia","s":8.0},{"d":"2026-01-26","o":"NZ A","s":7.0},{"d":"2026-01-27","o":"NZ A","s":8.0},{"d":"2026-01-30","o":"Japan","s":5.0},{"d":"2026-02-01","o":"Japan","s":7.0},{"d":"2026-02-02","o":"Japan","s":5.0},{"d":"2026-02-04","o":"Japan","s":8.0},{"d":"2026-05-28","o":"China","s":8.0},{"d":"2026-05-30","o":"China","s":8.0},{"d":"2026-05-31","o":"China","s":9.0},{"d":"2026-06-12","o":"Scotland","s":9.0},{"d":"2026-06-14","o":"Korea","s":7.0},{"d":"2026-06-16","o":"Malaysia","s":8.0},{"d":"2026-06-17","o":"Japan","s":6.0},{"d":"2026-06-19","o":"RSA","s":6.0},{"d":"2026-06-30","o":"Japan","s":6.0}],"comms":{"pref":"Direct & honest (clear, straightforward, unvarnished standard), visual & written (video clips, simple notes, clear cues), next-action cue (quickly shift focus after error)","pressure":"Helped by competition & challenge, personal standards, clear targets. Disrupted by overthinking mistakes, feeling judged.","motivation":"High-level competition, purpose & representation, high-performance team","connection":"5/10 away from team, 6/10 in competition. Purposeful & measured — provide space, direction on dips.","wcFocus":"Personal mastery, high ownership & coachability","keyNote":"\"Here's your job, here's the measure, go win your moments.\" Simple, direct. Don't let him dwell on errors — give the next action cue immediately."},"history":[{"date":"2026-06-10","title":"Pre-Event Game 1","body":"CHAMO\nReally solid game last night. You set the tone well and it showed throughout.\n\n      Ball speed was excellent in both push and sweep. Simple and effective.\n\n      Your positional play was very good whether you were in the centre or at left half.\n\n      We created a lot when you played left half. In the last quarter alone, you found GB three or four\n      times in that bottom corner.\n\n      Defensive game was very good. I cannot think of a time you got beaten.\n\n      One thing to bring into Korea: your comms when teams are running a specific play\n      against us. Scotland's aerial took us too long to nullify and it cost us corners early. You\n      are the big rock in there, so calling it out for the group sooner makes a real difference.\n\nBe proud of your performance last night, mate. I thought you were genuinely very good. If there is\nanything you want to go through when you review your clips, just let me know. Looking forward to\nwatching you go again against Korea. Recover well.\n\nShea"},{"date":"2026-06-13","title":"Nations Cup 2026 — Game 1 v Scotland","body":"Really solid game last night. You set the tone really well with your ball speed, both in push and sweep, and your positional play was very good, both when you're in the centre and on the outside.\n\nI actually really enjoy that you have the flexibility to play both, because I thought we created a lot when you were at left half, particularly through your positioning and the simplicity of your play. In that last quarter, you would have found GB three or four times in that bottom corner, and your skill set is really good there. You're exceptional in the centre as well, so it's really nice having the variety of your play.\n\nI thought your defensive game was very good. I can't remember a time when you got beaten. You're obviously the big rock for the team, and I think there's something you can bring in your comms, particularly when teams are trying to do a particular thing against us (like Scotland last night with the aerial). Being aware of that and supporting the others around you to be aware of it probably took us a little bit too long to nullify it, and Scotland were able to get a couple of corners out of it early.\n\nBe proud of your performance last night, mate. I thought you were genuinely very good. If there's anything you want to go through when you're reviewing your clips, just let me know. Looking forward to watching you strut your stuff against Korea in game two. Recover well today!"},{"date":"2026-06-15","title":"Nations Cup 2026 — Game 2 v Korea","body":"I think you're a little bit up and down in this game. To be fair, it actually felt like it drifted through from your warm-up. Your warm-up looked a little bit scratchy, so I think you should go back to your toolbox and, when you're having a scratchy warm-up, don't let it drag into the game.\n\nJust a few little fundamental things I think you needed to be better on:\n- You swept quite a bit when it was skipping, so just revert to push paths.\n- Your positional play on overheads got called out a few times.\n\nThose are the big rocks I think you should review over the course of today and tomorrow. Remember, your base level is high now, so your expectation is high too. If you compare your 7 out of 10 to, say, Ryan's 7 out of 10, it's head and shoulders above it. It's just the standard of where you are right now, doing the stuff that you do so well.\n\nAs I mentioned to you as you came off on the sidelines, you made an error on one of the overhead reads, but your exception, in terms of your ability to get back in and dictate that play, is very, very good. Your mobility getting back into defence, getting back into the fight, is very, very good. Your reading of the swoosh or the banana on the PC was exceptional, really world-class, so that's basically a free flick and you're able to run it down, so very good work there.\n\nI think you'll enjoy the Malaysia game. You'll have a heap more space and a heap more ability to play, so just keep thinking about how you can dictate and control the game. It's also really good for us that you can play in the centre and now on the outside, it just gives us a whole new dimension to the way we play. Obviously we can play three at the back or four at the back. You can sit on the outside or in the middle, and teams really struggle to scout us because we are 360-degree hockey players.\n\nIf there's anything that you want to catch up about today, let me know. Otherwise, recover well, and we will connect up soon."},{"date":"2026-06-16","title":"Nations Cup 2026 — v Japan","body":"Game of two halves yesterday, and plenty to like in the first half. Ball position, movement, structure, all good. You were right in what you said afterwards, we ran a few one-out attacks where we could have held the ball in a front 50 position a bit longer. That aside, your general plan in the first half was very good.\n\nYour defensive performance was really solid. Your on-ball work stood out, the way you pivot and look like you are going back to punch forward, or look forward to punch back. That is a real strength. The only thing to tidy is a few of your option-taking calls in the second half, that is where it needs a bit of refinement.\n\nThat second half is our learning from this one. When the pressure came we turned back into it and invited it back on. Clip a couple of those moments so you can see the picture, then it is a quick fix.\n\nI am going to look at increasing your minutes through the weekend. Get a proper recovery day in today, body right, and let us bring another big effort as we push for the treble."}]},{"id":"simon-yorston","name":"Simon Yorston","nickname":"Yorsty","position":"Defender","unit":"Defender","seasonAvg":7.2,"matches":17,"ratingLabel":"Established","photo":"data:image/jpeg , team responsibility (clear \"job to do\"). Disrupted by overthinking mistakes (one error leads to self-review), feeling judged (scrutiny makes him cautious).","motivation":"Love of the game (enjoyment unlocks free play), meaning & identity (representing bigger fuels effort), demanding environment","connection":"7/10 away from team. 9/10 during camps/tours. Benefits from regular, proactive, performance-focused check-ins.","wcFocus":"\"Becoming the best version of myself.\" Seeks consistency in high-pressure games. Needs a clear pathway — improves fastest when priorities are clear.","keyNote":"Don't stack corrections in-game. One cue, let him play. Post-session is where the real work happens — ask his perspective first before delivering yours."},"history":[{"date":"2026-06-10","title":"Pre-Event Game 1","body":"NIC\nI really enjoyed your game last night. The way you were able to pivot between DM and the back was\nimpressive, and I hope you got something out of both positions.\n\n      At DM, your willingness to play forward was exactly what we want. That snap drag was\n      aggressive and that is the intent we are looking for. As you noted in your TMA, that is\n      what we want to see from you. Keep taking those options.\n\n      A couple of good shots too. One world-class save, another just wide. You do not get those\n      opportunities unless you are playing with that DM mindset.\n\n      At the back, you brought a different variety to how we play and the natural combo with Kane\n      from polo came through clearly.\n\n      The last five minutes stood out. Big defensive plays when it mattered. Your\n      hand-on-the-ground, mobile defence is world-leading.\n\nHope you enjoyed being back in Black, mate. You put in a shift, so recover well today and let us go into\ngame two. If there is anything you want to go through, let me know.\n\nShea"},{"date":"2026-06-13","title":"Nations Cup 2026 — Game 1 v Scotland","body":"I really enjoyed your game last night, mate. I thought you were able to pivot between playing DM and at the back really well, and I hope you enjoyed both positions because I think the difference you brought to the group was really good.\n\nI think playing DM, your willingness to play forward was really good. I remember I spoke to you about that one where you did a really good snap drag and then turned the ball over. As you spoke about in your TMA, we actually want to see that from you, taking the aggressive option, and I was proud to see you do that. You had a couple of good shots, one world-class save and another one that just went wide, but you're not getting those opportunities unless you're playing as a DM. I think you add a little bit more forward intent when you're in there compared to someone like Mal, for example.\n\nWhen you played at the back, you brought a different variety to the way we play the game, and you can see your natural combo with Kane that's come back from polo. There was a lot to like about both positions.\n\nThe bit I really liked was probably the last five minutes, when we scored, and you made some really big defensive plays. Your hand-on-the-ground, mobile defence is world-leading. Hope you enjoyed being back in Black, mate. Recover well today, you put in a bit of a shift, and look forward to going into game two."},{"date":"2026-06-15","title":"Nations Cup 2026 — Game 2 v Korea","body":"Woodsy mate, you were awesome last night. Your ability to win the ball and intercept, or be in the challenge, and your ability to pivot from forehand to backhand and backhand to forehand and just kill the ball was honestly world class. You provide so much for us in that space. It was awesome to see you flourishing in the black shirt.\n\nFrom there, you were able to support our ability to go on the counter, so I think you held the middle of the ground really well and supported our ability to get into the game.\n\nThe other bits and pieces that I really liked about you were that you were very much in the 360-degree hockey player role. Your position was in the middle of the ground, but you were floating out to the left and to the right, slightly higher up the field and slightly deeper. You really took the game on and got on board a lot.\n\nIt was really good to see, because it makes it really hard for opposition teams to deal with you, and it adds so much impetus to our attacking game and gives the guys around you a lot of confidence. I think you can be really proud of your overall performance last night, mate. It was really good to see, and I enjoyed watching you play.\n\nIf there's anything that you want to go through, let me know, and otherwise recover well today, and we go again tomorrow."},{"date":"2026-06-16","title":"Nations Cup 2026 — v Japan","body":"Game of two halves from us yesterday. Plenty to like in the first half, we were very dominant and the stats back it up. The way the game was unfolding we looked really strong, and you were a big part of that. Very influential.\n\nThen the second half. As much as it finished 5-2, we did not do a lot well for 25 minutes there. Wrong decisions, turning into pressure and getting pick-pocketed, not wanting the ball in front of us. Passing back and back and inviting pressure on. That is simple stuff we can fix, and it is the difference heading into the weekend.\n\nThis is a good one for you and a couple of the other leaders to grab hold of. Greg will review it in the team briefing, so if there is more you want to pull through with the group, do it.\n\nYou and Dom grabbed the game by the scruff and made sure we saw it out. Not on our watch. Your overall play was very good.\n\nI will talk you through the subsheet once I have built it later today. I will get as much into you as I can and try not to have you and Kane off at the same time. I am prioritising minutes for our favoured players across all four quarters.\n\nBe really proud of your pool play. Four very good games in a row and you have been our best, comfortably. Keep playing the hockey you are playing. Anything you want to go through today, let me know."}]},{"id":"brad-rothwell","name":"Brad Rothwell","nickname":"Rothers","position":"Midfielder","unit":"Mid/Def","seasonAvg":7.0,"matches":2,"ratingLabel":"Established","photo":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBQYFBAYGBQYHBwYIChAKCgkJChQODwwQFxQYGBcUFhYaHSUfGhsjHBYWICwgIyYnKSopGR8tMC0oMCUoKSj/2wBDAQcHBwoIChMKChMoGhYaKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCj/wAARCAFAAUADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwD5UooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAoop8MUk0gSJGdz0VRk0AMorodP0KFU8zV5ZIV7RxkB8np1q/LBoEW+D7LMzYG2TeQeR1Paoc0aKm7XZx9FbN9oVxC6mIbkflQTyKq3Ng0UCPtbdzkY469qpSTJcWihRRRTJCiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiirWnWcl9dJBFwTyWPRR60bAlcXTrGW+m2p8qLy7nooroYRDaQCOzD+jSdCx9+5+lTXaxwCLTLLKrwWI6n16ev8q0o9HaORJZFCxbeUJ+6a55Tvq9jphTttuYkD3Xmr9rZMbuMjoe3HatTWbT7M3n7Xb7ThgYmz1Hpj2NS61Y502S5hKsyHLtkbgPcHkjmsW2vBf6WsM3Jt5AQQcAggjrQnfVFNW0ZL9rkNwsTjanRsfXjn6Vfs7dLmJ7J5GMbuXGRyBnn6dD+dYF7Jeomy6EvlxSbhu7HPQH8K2tFvoop3yWeRxhWAwVBHX9fzFErpXQo2k7M5/WNOVJpZrTcbf7wDkbsVkV6C1rEJl3FjGVVCqgZIzyvPTJrnfE+mC2uDJawqluMhlXnY3fnv9auF eflect), time for reflection (after a period of reflection, not in the heat of the moment)","pressure":"Helped by team responsibility, personal standards, measurable goals (clear targets reduce uncertainty). Disrupted by overthinking errors (over-analysing mistakes slows decision-making), perceived judgement (feeling scrutinised reduces confidence).","motivation":"Personal growth & mastery (continuous improvement), team contribution (deep connection, collective goal), career achievement (long-term purpose, meaningful goal)","connection":"High in-competition (regular engagement, availability, clarity). Low-moderate off-season/breaks (space, balance, family time).","wcFocus":"Establish & consolidate. Key actions: consistent reliability, preparation, meeting expectations.","keyNote":"Don't debrief immediately post-game. Give him time to settle, then have the conversation. Collaborative and calm — he processes through two-way discussion. Perceived judgement shuts him down."},"history":[{"date":"2026-06-10","title":"Pre-Event Game 1","body":"TIM\nSolid game last night. Your positional play in both midfield and on the outside was really good.\n\n      What has been most pleasing is how much more comfortable you look at this level. Your\n      decision-making and comfort on the ball has improved noticeably. That is real growth.\n\n      You are reading the game better and your support play is cleaner. Keep building on that.\n\n      The Asian teams are a different challenge. They will pressure you more, back-tackle, and\n      try to steal the ball from your blind side. Make sure that is sharp going into Korea.\n\n      Your defensive mobility also needs to come up a level. We got caught out against Japan in the\n      Summer Series and we cannot afford a slow start in this block. Mobility and pressure resistance\n      are the focus.\n\nLots to like in your game. Recover well and we go again tomorrow. If there is anything you want to go\nthrough from your clips, just let me know.\n\nShea"},{"date":"2026-06-13","title":"Nations Cup 2026 — Game 1 v Scotland","body":"Solid game last night. To me, your positional play in both midfield and on the outside was generally really good. What's been even more pleasing is that I think you're getting more and more comfortable at this level, with your decision-making on the ball and your comfort on the ball. I think this has been a really big improvement and I've seen your growth in your game.\n\nFrom forward thinking to now, we're obviously going to play some Asian teams. This needs to come up a notch because they'll pressure you more and try to steal the ball. They do a lot of back tackling and come from your blind spot to try to win it, so make sure you really have that nailed.\n\nThe second side of it is that your defensive mobility is going to have to come up. We were given a bit of a shock game one against Japan in the Summer Series, and we've got to make sure we start this Asian block of games against Korea, Malaysia, and Japan really well, with mobility being an absolute feature.\n\nLots of liking your game. If there's anything you want to go through when reviewing your clips or anything, just let me know. Otherwise, recover well and we go again tomorrow."},{"date":"2026-06-15","title":"Nations Cup 2026 — Game 2 v Korea","body":"Timmy, best game in the black shirt. As we mentioned to you after the game, it was really cool to see that you had very good positional play. I think you and Woodsy in particular played off each other really well in terms of your spacing and positioning, which was cool to see. It seemed like the both of you had a bit of an innate sense around how and where you both should be on the ground. There were lots to like. You saw the clip Greg showed, which was awesome around your ability to flow, receive, and I think you've actually done that well over the last few months, which has been really good. Pick your moments when it happens, and when it's not there, don't take it on, but when it's there, definitely think of that skill and then obviously add to that your defensive movement and mobility and hand-down defense and stuff. That has been improving massively, and I think you're just growing the more that you work within this environment. I'm keen to see you keep going throughout the rest of the tournament. If there's anything you want to run through, let me know. Otherwise, enjoy your rest day."}]},{"id":"malachi-buschl","name":"Malachi Buschl","nickname":"Mal","position":"Midfielder","unit":"Midfielder","seasonAvg":6.3,"matches":21,"ratingLabel":"Pushing","photo":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBQYFBAYGBQYHBwYIChAKCgkJChQODwwQFxQYGBcUFhYaHSUfGhsjHBYWICwgIyYnKSopGR8tMC0oMCUoKSj/2wBDAQcHBwoIChMKChMoGhYaKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCj/wAARCAFAAUADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwD5UooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKkhikmkWOJS7scADvQBHRVmayuIXCSwurHjGKhmiaF9rjBwD+dADKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigApQCSABkmnwRNPKscYy  by unclear expectations, overthinking mistakes.","motivation":"Personal growth & mastery, competing against the best, team purpose & representation","connection":"Moderate away from competition. Moderate-to-high during camps and tours.","wcFocus":"Consistent contribution — being relied upon for team success.","keyNote":"Keep it direct and brief. He wants to be challenged and stretched. Unclear expectations are his biggest risk — always give him a clear standard."},"history":[{"date":"2026-06-10","title":"Pre-Event Game 1","body":"MAL\nSolid game last night. A lot to like in what you brought.\n\n      Work ethic was very good throughout. Reliable as always.\n\n      Positional play was excellent against the low block, whether providing an option or cutting off\n      the counter.\n\n      There were moments where you played with real forward-flowing intent, and that is good\n      to see. When you have got space, take it.\n\n      Defensively, your positional play, hand-down defence, press positioning and press wins were\n      all strong. That is going to be a big rock for us against Korea.\n\n      Against the Asian teams, there is going to be space in the midfield. They leave a lot back\n      and push a few forward, so it is about having sharp option-taking in those moments.\n      That is your next challenge.\n\nRecover well today. If there is anything you want to go through from your clips, let me know.\n\nShea"},{"date":"2026-06-13","title":"Nations Cup 2026 — Game 1 v Scotland","body":"Solid game last night, Mal. I thought your general work ethic was very good, and one thing we can always rely on you for is your positional play. Your positional play was very good, particularly against the low block. It can be a bit of an annoying position to stand in, but you did it well, either to provide an option or to stop the counter.\n\nI thought there were a couple of actual forward-flowing intent ones from you as well, which is really good and something that's good to see. If you've got space to play, then definitely do this.\n\nOne thing to think about as we move into the Asian teams is that you'll have, at times, a bit of space to flow into the midfield. They leave a lot back in defence and then have a few attacking, so there's actually a bit of space in the midfield. It's just about having those really good option-taking moves.\n\nGenerally good game defensively. There was lots to like in your positional play, hand-down defence, and your press positioning and press wins. This will be another big rock for us when we play against Korea.\n\nRecover well today, mate. If there's anything when you're over your clips or anything you want to go through, just let me know."},{"date":"2026-06-15","title":"Nations Cup 2026 — Game 2 v Korea","body":"Mal, as Greg said in the meeting, gritty performance. I know you were in pain. You had half of your leg almost fall off, and as a classic Southern man, you were able to grind through it and put your best foot forward to perform, which was really good for the team and obviously the balance of our subs. Big rock things to keep thinking about are:\n- How can I play the ball from more left to right rather than defaulting right to left? That's definitely something I'm going to keep pushing on.\n- Just keep thinking about growing your game.\n- There are some subtleties in how you position yourself originally to be able to do that.\n- When you receive and carry, how can I play more left to right, or at least thread in left to right to then have more space to play right to left?\n\nStill good positioning. Your hog defending is obviously really good, and your ability to get around the ground has been really good. Hopefully the lead comes right, might not be a bad one to miss against Malaysia to give yourself more time. We'll be in touch with you later today to see how you're doing."},{"date":"2026-06-16","title":"Nations Cup 2026 — v Japan","body":"Great to see you back out there, Mal. After the setback with the split league, that was one of your better games in the last seven or eight, purely on simplicity.\n\nYour intent to play and your intent through voice were really good. Chatting well, receiving and moving the ball quickly, you had it between your teeth. I need more of that through the week. It is one of your superpowers, so bring it, especially when the going gets tough. There will be moments in these games where it tightens up, and that is when you say, I can help control this.\n\nI will have you lower on the runner hierarchy, but I want you there as a supportive option if we are short on legs.\n\nKeen for you to review the second half and take clips with a few of the other players: what are you looking for, what am I looking for, what do we need here.\n\nOne I have not mentioned to anyone else, and I would like you to lead it. We have used the strong post-up to win the front 50 ball before. Off a hit-off, even a 40-20, because we knew Japan were going to push up, and instead we went back-pass, back-pass, turnover, twice in a row. Is there a set play off the hit-off, or a ball into the bottom corner, where we go and press them instead? It is harder with ten, so maybe a different setup, but I think there is something in it for our game and I would back you to drive it.\n\nLet me know if there is anything you want to go through. Otherwise rest up and put your best foot forward for a big weekend."}]},{"id":"aidan-sarikaya","name":"Aidan Sarikaya","nickname":"Aids","position":"Midfielder","unit":"Midfielder","seasonAvg":6.9,"matches":17,"ratingLabel":"Solid","photo":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBQYFBAYGBQYHBwYIChAKCgkJChQODwwQFxQYGBcUFhYaHSUfGhsjHBYWICwgIyYnKSopGR8tMC0oMCUoKSj/2wBDAQcHBwoIChMKChMoGhYaKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCj/wAARCAFAAUADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKS "s":7.0}],"comms":{"pref":"Direct & honest, in the moment, collaborative (short discussions that build ownership)","pressure":"Helped by competitive challenge, coach trust & backing, high-energy environment. Disrupted by overthinking mistakes, external distractions.","motivation":"Competition, enjoyment, high-performance team belonging","connection":"High during camps/tours/competition. Moderate away from team.","wcFocus":"\"Becoming the best version of myself as a player.\"","keyNote":"Timely feedback aligns with his action-oriented mindset. Keep it unambiguous — he adjusts immediately."},"history":[{"date":"2026-06-10","title":"Pre-Event Game 1","body":"AIDAN\nThere was a lot to like in your game last night. Some really good things, and obviously a few things\nyou will want to clean up.\n\n      The standout for me was your mindset. Every time you made an error, you were the first\n      to get back in and win it back. You did that several times. That is the exact mindset we\n      need in this environment, and I want you to know I noticed it.\n\n      Your general positioning was really good, with some very good speed-up leads to get the ball\n      down the line.\n\n      Press position was excellent, and your defensive mobility and integrity have been a real feature\n      of your game lately.\n\n      In the attacking 23, you are getting into really good spots and you have the ball in your\n      stick. The next step is being a bit more patient in those key moments. Slow down, read\n      the situation, and take the right option. That is what converts good positions into\n      corners and shots.\n\n      We have got three Asian teams coming. They are fast on the ball and turn sharp. Your\n      defensive mobility is going to be central to starting well against Korea.\n\nKeep it up, mate. I am happy with what you are doing. Recover well and let me know if you want to go\nthrough anything.\n\nShea"},{"date":"2026-06-13","title":"Nations Cup 2026 — Game 1 v Scotland","body":"Aidan, mate, there was a lot to like in your game. There were some really good things, and obviously some things you'd like to tidy up.\n\nWhat was really awesome to see was that if you did make an error, you were the first person to get back in to try and win it, and you actually did that a couple of times. That shows the exact mindset that we need for players within this environment, so I'm stoked for you on that.\n\nYour general positioning was really good, with some very good speed-up leads where you're able to get the ball down the line. You probably need to slow down a bit and be a little more nuanced when coming into that attacking 23-yard circle area. You get into some really good spots and have the ball in your stick, but it's about making those right decisions in those key moments, which will give you some really good outcomes, whether it's winning corners or getting shots away.\n\nOne thing you did really well was your press position, which was awesome, and your defensive mobility and integrity were excellent. I think that's been a bit of a feature of your game of late, and it's something you're going to have to bring into the next three games. We have a trio of Asian teams who are fast on the ball and turn sharp, so we've got to make sure that we're on point and start really well against Korea tomorrow.\n\nRecover well. If there's anything you want to go through, let me know. Otherwise, I'm happy with what you're doing, mate. Keep it up."},{"date":"2026-06-15","title":"Nations Cup 2026 — Game 2 v Korea","body":"It's probably a balance of both sides of the coin yesterday, with some really good stuff and some stuff you'd obviously like to take back.\n\nI think the one key thing I'd really love for you is this: when you do walk off the pitch and you're a little bit frustrated, I want you to go into process. For you, that means:\n- Grab your bib.\n- Grab your bottle.\n- Walk down to the corner.\n- Think about the one thing you want to nail when you get back out onto the pitch.\n\nIf you're thinking in that positive light, I think it's going to spin your mindset around so that when you get back out on the ground, you're going to be better.\n\nIf you need a key piece of advice, like I tried to give you last night, just come and see me, because then I can support you to understand exactly what that could be. It can be as simple as putting a foot in the way of someone, so they can't steal the ball, for example. For the next two minutes, I want you to have vision and then play T-Bar."},{"date":"2026-06-16","title":"Nations Cup 2026 — v Japan","body":"Match of two halves yesterday, but overall I thought you were better than the Malaysia game. Your defensive discipline was really good, you stayed in the fight and in the challenge. Some good wins, good intercepts, and some real disruption of their passing lines. That is a definite win in how you played.\n\nYour injection improved through the game too, good to see, and you made some good decisions on the ball, particularly in the first half.\n\nWhat I want from you is a review of the second half, especially the last 20 minutes. I know being a man down compromised us, but too many of our midfielders and strikers went missing. We were 4-2 up and still ahead on the scoreboard, yet we felt second best.\n\nConnect with the midfield group on this: what do we need to do to get better and actually want the ball? How can you support and influence that part of the game? Use it as a learning moment for the weekend.\n\nAnything you want to catch up on, let me know. Otherwise recover well, looking forward to a big shift from you."}]},{"id":"ryan-parr","name":"Ryan Parr","nickname":"Ryan","position":"Midfielder","unit":"Midfielder","seasonAvg":7.5,"matches":4,"ratingLabel":"Elite","photo":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBQYFBAYGBQYHBwYIChAKCgkJChQODwwQFxQYGBcUFhYaHSUfGhsjHBYWICwgIyYnKSopGR8tMC0oMCUoKSj/2wBDAQcHBwoIChMKChMoGhYaKCgoKCgoKCgoKCgoKCgoKCgo
