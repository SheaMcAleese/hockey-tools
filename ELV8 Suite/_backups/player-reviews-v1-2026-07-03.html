:7.0},{"d":"2026-05-30","o":"China","s":7.0},{"d":"2026-05-31","o":"China","s":8.0},{"d":"2026-06-12","o":"Scotland","s":8.0},{"d":"2026-06-14","o":"Korea","s":7.0},{"d":"2026-06-16","o":"Malaysia","s":8.0},{"d":"2026-06-17","o":"Japan","s":7.0},{"d":"2026-06-19","o":"RSA","s":7.0},{"d":"2026-06-30","o":"Japan","s":6.0}],"comms":{"pref":"Direct & honest, visual & written, in-game: short & specific","pressure":"Helped by competition, clear targets, team responsibility. Disrupted by team tension, overthinking mistakes.","motivation":"Enjoyment & connection, meaningful achievement, personal growth","connection":"3/10 away (low connection preference, values independence). 6/10 on tour/in competition (moderate, values access when needed).","wcFocus":"Long-term growth & mastery. Open to process.","keyNote":"Don't over-engage away from competition — he values his space. On tour, be available but don't crowd him. Keep in-game cues short and specific."},"history":[{"date":"2026-06-10","title":"Pre-Event Game 1","body":"RYAN\nWhat a start. Game 1, a win, and you performed. You should be proud of that.\n\n     Lots of simplicity on the outside, good options, and you were always looking for forward intent.\n\n     Defensive play was strong. Good mobility, stick down and low, and you won a lot of ball. You\n     get around the paddock extremely well because you are fit and strong.\n\n     That running line on the corner came at exactly the right time. Superb.\n\n     Your old man summed it up well: you treat every game like your last. You play with intent,\n     aggression, and that chip on your shoulder. That is something I genuinely enjoy about you.\n\n     This is the first of many. Keep building.\n\nHope you enjoyed your debut, mate. It only comes round once. Recover well, prep for Korea, and let us\ngo again.\n\nShea"},{"date":"2026-06-13","title":"Nations Cup 2026 — Game 1 v Scotland","body":"Mate, what a start. Game 1, win. You made it to the match, and your game has been much better than that, man.\n\nI think you should be proud of how you performed. There was a lot of simplicity in your play when you're on the outside, getting the ball and playing your good options. You were always looking for forward intent, which is good. Your defensive play was strong, with good mobility while keeping a stick down and low. You were able to win a lot of ball, and you get around the paddock extremely well because you're fit and strong.\n\nSuperb running line on the corner came at a really good time for us for you to run that down, which I really enjoyed. I hope you enjoyed your debut, mate. It only comes around once, but definitely know that this is the first of many to come.\n\nI think your old man summed it up really well: you treat every game like your last, so regardless you never get comfortable. You always play with intent, with aggression, and with that chip on your shoulders, which I really enjoy about you. Trust me, mate, you'll keep getting better and better. If there's anything you want to go through when you review your clips or anything, let me know. Recover well, prep well for the career, and let's go again for game two."},{"date":"2026-06-15","title":"Nations Cup 2026 — Game 2 v Korea","body":"Hey mate. There are a few small tidy-ups you would have seen in the clips this morning. One is the simplicity of when you are in man-to-man or this space, and then it is just operating your zone or your man better.\n\nAlways remember, when you start to play high-level hockey, you're going to come up against smarter hockey players. You're going to face players who will lead when they're in counter, trying to disconnect from you and take your space away.\n\nKeep thinking about how you can learn in those moments and keep excelling your game. What I've been really happy with is that you keep growing your game, staying very attentive, having a general hand on the ground in defence, and being able to stay mobile in those times. That's really good.\n\nWhen you're in 50-50 or advanced 50-50 time, that's when you have a crack at the ball. If you feel like it's 60-40 or worse, like tomorrow, and someone like Azrai has got 60-40 of getting the chance at the ball, you've got to absorb him more, because it's not one to rush out on.\n\nObviously, you didn't play as much in the last quarter. Just understand that this is part of the game in high-performance sport. Keep thinking about doing my role and doing what's best for the team, and you'll keep growing from strength to strength. Think you'll enjoy the rest of the event, mate. You're going well. Looking forward to seeing how you keep progressing. Rest up, recover well, and we'll touch base soon."},{"date":"2026-06-16","title":"Nations Cup 2026 — v Japan","body":"Mate, you are playing some good hockey and it is enjoyable to watch. Your positional play has been really good and you are bringing a lot to the group.\n\nThe second half got tough, and that is a really good one for you to sit with a few of the other defenders and work through. The big question is what you do to support it:\n\n•  Do you push off to drag a marker away and create space on the touchline?\n\n•  Or sit deep, take the ball, and play it forward from there?\n\n•  Keep it simple: left-to-right, down the line, and either win the free hit or bypass the player.\n\nThere were a couple of times you did exactly this really well. Use this game as a strong learning one and build into the weekend off it.\n\nAnything you want to go through, let me know and we will catch up. Otherwise connect with a few of the other defenders so you are at your best going forward."}]},{"id":"joe-morrison","name":"Joe Morrison","nickname":"Joey","position":"Midfielder","unit":"Midfielder","seasonAvg":7.5,"matches":15,"ratingLabel":"Established","photo":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBQYFBAYGBQYHBwYIChAKCgkJChQODwwQFxQYGBcUFhYaHSUfGhsjHBYWICwgIyYnKSopGR8tMC0oMCUoKSj/2wBDAQcHBwoIChMKChMoGhYaKCgoKCgoKCg ","o":"Scotland","s":6.0},{"d":"2026-06-16","o":"Malaysia","s":6.0},{"d":"2026-06-17","o":"Japan","s":6.0},{"d":"2026-06-19","o":"RSA","s":5.0},{"d":"2026-06-30","o":"Japan","s":5.0}],"comms":{"pref":"Timing — after reflection (prefers space to process before discussing). Format — visual or written. Style — collaborative (dialogue-based, helps him take ownership of adjustments).","pressure":"Helped by timely recognition, internal standards, team responsibility. Disrupted by feeling judged, overthinking errors.","motivation":"Competing vs. the best, enjoyment & freedom, personal mastery","connection":"Moderate off-field/away from camp. Moderate-high on tour/in competition.","wcFocus":"Establishing himself firmly — moving from opportunist to reliable, consistent selection.","keyNote":"Give him space first, then feedback. Don't deliver immediately post-game. Visual or written reference points are most effective."},"history":[{"date":"2026-06-10","title":"Pre-Event Game 1","body":"FINN\nGood review in TMA. Your self-awareness is solid and that is a real asset.\n\n      Your left side is genuinely excellent. Your upright backhand and 3D skills are a real\n      strength in this group. That is not the issue.\n\n      The development area is your right foot. Under any kind of pressure, you default left. The goal\n      is to become a player who can do both exceptionally well.\n\n      Take some time to review all your clips from the game. Assess where you carried the\n      ball and what option you took: was there a different option? Can you go right? Can you\n      do v-drags, left-to-right, 3D left-to-right to expose defenders and attack space?\n\n      In a game where the opposition sits low and deep like Scotland did, your 3D skill around the\n      circle edge is the tool to win corners. That is an area you can bring more to the side.\n\n      You are early in your career and that is exactly why we are coaching this now. The ceiling is\n      high.\n\nIf there is anything you want to review from the game, let me know. Recover well and looking forward to\nseeing you go hard for the rest of the tournament.\n\nShea"},{"date":"2026-06-13","title":"Nations Cup 2026 — Game 1 v Scotland","body":"Hey Finn, good review in TMA. I think your self-awareness is pretty good.\n\nWhat I would like you to do is review all your clips from the game and assess where you carried the ball, what option you took, and whether there was a different option.\n\nI mentioned it to you yesterday: is there the ability for you to carry the ball a little bit more on your right foot? Instead of feeling any pressure to deviate to your left, can you force yourself to go to the right? You're still early in your hockey career, but we coach you to get better on the world stage, and I think this is a big rock for you to keep working on.\n\nCan you do v-drags? Can you go left-to-right? Can you do 3D left-to-right, just to expose opposition defenders and create and attack the space a bit more? Generally, when you get any kind of pressure, you default to going left.\n\nOne other thing, and it's a positive, is that you're very good on the left side of your body, with your upright backhand and your 3D skills. Those are really strong, so it's not a negative. It's just something you've got to think about: how can you be a player who can do both and do both exceptionally well?\n\nIn a game like that where they're so low and deep, when you're getting on the ball, particularly around the circle edge, you've got to use your 3D skill to actually win corners. I think this is one thing you can really bring to the side and work through in terms of your level and involvement in earning corners.\n\nIf there's anything you want to review from the game, let me know. Otherwise, recover well and look forward to seeing you smash it for the rest of the tournament."}]},{"id":"sean-findlay","name":"Sean Findlay","nickname":"Seano","position":"Midfielder","unit":"Midfielder","seasonAvg":7.1,"ma // =============================================
// STATE (reviews only — squad ships inside this file)
// =============================================
const STORAGE_KEY = 'blackSticksReviewsV2';
let state = {
  matches: [],       // post-match review sets
  decks: [],         // review deck sets
  extras: [],        // manually added guest players
  brand: { crest: '' },
  ui: { view:'squad', matchId:null, deckId:null, pid:null, deckIdx:0 }
};
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e) { console.error('save failed', e); }
}
function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) { try { const d = JSON.parse(raw); state = Object.assign(state, d); state.ui = Object.assign({view:'squad',matchId:null,deckId:null,pid:null,deckIdx:0}, d.ui||{}); } catch(e){ console.error(e); } }
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }
function esc(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escHtml(s) { return esc(s).replace(/\n/g,'<br>'); }

function roster() { return EMBEDDED.players.concat(state.extras); }
function getPlayer(pid) { return roster().find(p => p.id === pid); }
function initials(n) { return (n||'??').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function firstName(n) { return (n||'').split(' ')[0]; }

// =============================================
// SILVER FERN MARK (drawn, not a trademarked crest;
// upload the official crest to replace it)
// =============================================
function fernSVG(h, color, curl) {
  color = color || '#ffffff';
  const N = 15; let paths = '';
  const P = t => {
    const x = (1-t)*(1-t)*14 + 2*(1-t)*t*34 + t*t*92;
    const y = (1-t)*(1-t)*86 + 2*(1-t)*t*44 + t*t*10;
    return [x,y];
  };
  const T = t => {
    const dx = 2*(1-t)*(34-14) + 2*t*(92-34);
    const dy = 2*(1-t)*(44-86) + 2*t*(10-44);
    const L = Math.hypot(dx,dy)||1; return [dx/L, dy/L];
  };
  for (let i=0;i<N;i++){
    const t = 0.06 + 0.9*(i/(N-1));
    const [x,y] = P(t), [tx,ty] = T(t);
    const nx = -ty, ny = tx;
    const len = 30*(1-t)*(0.35+0.65*Math.sin(Math.PI*Math.min(1,t*1.6)))+4;
    for (const s of [-1,1]) {
      const bx = x + s*nx*len - tx*len*0.32;
      const by = y + s*ny*len - ty*len*0.32;
      const c1x = x + s*nx*len*0.5 + tx*len*0.22, c1y = y + s*ny*len*0.5 + ty*len*0.22;
      const c2x = x + s*nx*len*0.5 - tx*len*0.5, c2y = y + s*ny*len*0.5 - ty*len*0.5;
      paths += `<path d="M${x.toFixed(1)},${y.toFixed(1)} Q${c1x.toFixed(1)},${c1y.toFixed(1)} ${bx.toFixed(1)},${by.toFixed(1)} Q${c2x.toFixed(1)},${c2y.toFixed(1)} ${x.toFixed(1)},${y.toFixed(1)} Z" fill="${color}" opacity="${(0.55+0.45*(1-t)).toFixed(2)}"/>`;
    }
  }
  paths += `<path d="M14,86 Q34,44 92,10" fill="none" stroke="${color}" stroke-width="2.6" stroke-linecap="round"/>`;
  if (curl !== false) paths += `<path d="M14,86 q-8,2 -9,-6 q-0.8,-6 5,-7 q4.4,-0.8 5.2,3.4 q0.6,3.2 -2.6,3.8" fill="none" stroke="${color}" stroke-width="2.4" stroke-linecap="round"/>`;
  return `<svg viewBox="0 0 100 96" style="height:${h}px;width:auto;display:block;" xmlns="http://www.w3.org/2000/svg">${paths}</svg>`;
}
function brandMark(h, dark) {
  if (state.brand.crest) return `<img src="${state.brand.crest}" style="height:${h}px;width:auto;max-width:${h*2.2}px;object-fit:contain;display:block;">`;
  return fernSVG(h, dark ? '#15171a' : '#ffffff');
}

// =============================================
// FORM SPARKLINE (coach score history + optional new score)
// =============================================
function sparkSVG(p, newScore, w, hgt, forDoc) {
  const hist = (p.scores||[]).slice(-8).map(s => ({ label: s.o, score: s.s, cur:false }));
  if (newScore) hist.push({ label:'This match', score: parseFloat(newScore), cur:true });
  if (!hist.length) return '';
  w = w || 360; hgt = hgt || 64;
  const bw = Math.min(34, (w-10)/hist.length - 6);
  const axis = forDoc ? '#d8d8d2' : '#3a3a3a';
  const txt = forDoc ? '#9a9a9a' : '#8c8c8c';
  let bars = '';
  hist.forEach((d,i) => {
    const x = 4 + i*((w-8)/hist.length);
    const bh = Math.max(3, (d.score/10)*(hgt-18));
    const col = d.cur ? '#D4AF37' : (d.score>=7 ? '#2a9d3a' : d.score>=5 ? '#c9a02c' : '#cf4b3f');
    bars += `<rect x="${x.toFixed(1)}" y="${(hgt-16-bh).toFixed(1)}" width="${bw}" height="${bh.toFixed(1)}" rx="2.5" fill="${col}" opacity="${d.cur?1:0.82}"/>`;
    bars += `<text x="${(x+bw/2).toFixed(1)}" y="${(hgt-16-bh-3).toFixed(1)}" font-size="8.5" font-weight="800" fill="${d.cur?'#b8952e':txt}" text-anchor="middle" font-family="Montserrat,Arial">${d.score%1?d.score:Math.round(d.score)}</text>`;
    const lab = (d.label||'').slice(0,4);
    bars += `<text x="${(x+bw/2).toFixed(1)}" y="${hgt-4}" font-size="7" font-weight="700" fill="${txt}" text-anchor="middle" font-family="Montserrat,Arial">${esc(lab).toUpperCase()}</text>`;
  });
  return `<svg viewBox="0 0 ${w} ${hgt}" style="width:${w}px;max-width:100%;height:auto;" xmlns="http://www.w3.org/2000/svg"><line x1="2" y1="${hgt-16}" x2="${w-2}" y2="${hgt-16}" stroke="${axis}" stroke-width="1"/>${bars}</svg>`;
}
function scoreColors(score) {
  const n = parseFloat(score) || 0;
  if (n >= 7) return { bg:'#eaf6ec', fg:'#1e7a2b' };
  if (n >= 5) return { bg:'#fbf3e3', fg:'#a07a1a' };
  return { bg:'#fbeae8', fg:'#c0322a' };
}

function switchView(v) {
  state.ui.view = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.v === v));
  if (v==='squad') renderSquad();

  else if (v==='preview') renderPreview();
  saveState();
}

const UNIT_ORDER = ['Goalkeeper','Defender','Midfielder','Forward'];
function unitOf(p) {
  const u = p.unit || p.position || '';
  if (/keep/i.test(u)) return 'Goalkeeper';
  if (/def/i.test(u)) return 'Defender';
  if (/mid/i.test(u)) return 'Midfielder';
  return 'Forward';
}
function renderSquad() {
  const el = document.getElementById('view-squad');
  let html = `<h2>Squad</h2>
    <p class="sub">${EMBEDDED.players.length} players loaded from the AI Coaching Brain · updated ${esc(EMBEDDED.meta.updated)} · tap a player for their profile, comms style and full feedback history</p>

      <button class="btn btn-secondary btn-sm" onclick="addGuest()">+ Guest player</button>

      <button class="btn btn-secondary btn-sm" onclick="exportBackup()">Export backup</button>

          ${p.seasonAvg ? `<span class="fchip">${p.seasonAvg.toFixed(1)} AVG</span>` : ''}
          ${p.matches ? `<span class="fchip grey">${p.matches} M</span>` : ''}

function addGuest() {
  const name = prompt('Player name:'); if (!name) return;
  const pos = prompt('Position:') || 'Midfielder';
  state.extras.push({ id:'guest-'+uid(), name, nickname:firstName(name), position:pos, unit:pos, photo:'', focus:[], scores:[], comms:{}, history:[] });
  saveState(); renderSquad();
}
function uploadCrest() {
  const i = document.createElement('input'); i.type='file'; i.accept='image/*';
  i.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        const sc = Math.min(1, 400/img.width, 400/img.height);
        c.width = Math.round(img.width*sc); c.height = Math.round(img.height*sc);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        state.brand.crest = c.toDataURL('image/png');
        saveState(); renderNavMark(); renderSquad();
      };
      img.src = ev.target.result;
    };
    r.readAsDataURL(f);
  };
  i.click();
}
function exportBackup() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'player-reviews-backup-' + new Date().toISOString().slice(0,10) + '.json'; a.click();
}
function importBackup() {
  const i = document.createElement('input'); i.type='file'; i.accept='.json';
  i.onchange = e => {
    const r = new FileReader();
    r.onload = ev => { try { state = Object.assign(state, JSON.parse(ev.target.result)); saveState(); switchView(state.ui.view||'squad'); } catch(err){ alert('Invalid backup file'); } };
    r.readAsText(e.target.files[0]);
  };
  i.click();
}

// =============================================
// POST-MATCH — Wispr Flow first workflow
// =============================================
function getMatch() { return state.matches.find(m => m.id === state.ui.matchId); }
function recFor(set, pid) {
  if (!set.recs[pid]) set.recs[pid] = { score:'', note:'', dataLine:'', nextFocus:'', signoff:'Shea', dnp:false, gw:['','',''], nw:['',''] };
  return set.recs[pid];
}
function recDone(set, pid) {
  const r = set.recs[pid];
  return !!(r && !r.dnp && (r.note.trim() || r.score));
}
function playersInSet(set) { return (set.pids||[]).map(getPlayer).filter(Boolean); }

function renderPM() {
  const el = document.getElementById('view-postmatch');
  if (state.ui.matchId && getMatch()) { renderPMBuilder(); return; }
  state.ui.matchId = null;
  let html = `<h2>Post-Match Reviews</h2>
    <p class="sub">One match, every player, straight from a Wispr Flow dictation. Talk your review in, score them, print or share the branded document.</p>
    <div class="panel">
      <h3>New Match Review</h3>
      <div class="form-row">
        <div class="form-group" style="flex:2;"><label>Match / Result</label><input id="nm-title" placeholder="NZ 3 – 2 Australia, Nations Cup Final"></div>
        <div class="form-group"><label>Date</label><input id="nm-date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="form-group" style="flex:1;"><label>Next Game</label><input id="nm-next" placeholder="vs India, Thursday 19:00"></div>
        <div class="form-group"><label>&nbsp;</label><button class="btn btn-primary" onclick="createMatch()">Create</button></div>
      </div>
    </div>`;
  state.matches.slice().reverse().forEach(m => {
    const done = (m.pids||[]).filter(pid => recDone(m, pid)).length;
    const active = (m.pids||[]).filter(pid => !(m.recs[pid]&&m.recs[pid].dnp)).length;
    html += `<div class="review-card" onclick="state.ui.matchId='${m.id}';state.ui.pid=null;saveState();renderPM();">
      <div class="info"><h4>${esc(m.title)}</h4><small>${esc(m.date)} · next: ${esc(m.nextGame)||'TBC'}</small></div>
      <div class="review-actions">
        <span class="prog-pill">${done}/${active} done</span>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();delMatch('${m.id}')">×</button>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}
function createMatch() {
  const title = document.getElementById('nm-title').value.trim() || 'Match Review';
  const date = document.getElementById('nm-date').value || new Date().toISOString().slice(0,10);
  const next = document.getElementById('nm-next').value.trim();
  const set = { id:uid(), title, date, nextGame:next, pids:roster().map(p=>p.id), recs:{} };
  state.matches.push(set);
  state.ui.matchId = set.id; state.ui.pid = set.pids[0];
  saveState(); renderPMBuilder();
}
function delMatch(id) {
  if (!confirm('Delete this match review?')) return;
  state.matches = state.matches.filter(m => m.id !== id);
  if (state.ui.matchId === id) state.ui.matchId = null;
  saveState(); renderPM();
}

function renderPMBuilder() {
  const el = document.getElementById('view-postmatch');
  const set = getMatch(); if (!set) { renderPM(); return; }
  if (!state.ui.pid || !set.pids.includes(state.ui.pid)) state.ui.pid = set.pids[0];
  const p = getPlayer(state.ui.pid);
  const r = recFor(set, p.id);
  const done = set.pids.filter(pid => recDone(set, pid)).length;
  const active = set.pids.filter(pid => !(set.recs[pid]&&set.recs[pid].dnp)).length;
  const c = p.comms || {};
  const lastFb = (p.history||[]).slice(-1)[0];

  let html = `<div class="toolbar">

    html += `<div class="rp ${cls}" onclick="state.ui.pid='${pid}';saveState();renderPMBuilder();">

  // editor
  html += `<div class="editor">

        <div>
          <div class="i-name">${esc(p.name)}</div>
          <div class="i-meta">${esc(p.position)}${p.seasonAvg?` · season ${p.seasonAvg.toFixed(1)}`:''}${p.matches?` · ${p.matches} matches`:''}</div>
        </div>
      </div>
      ${(p.scores||[]).length ? `<h5>Form</h5><div class="spark-mini">${sparkSVG(p, r.score, 300, 58, false)}</div>` : ''}
      ${(p.focus||[]).length ? `<h5>Their focus points</h5>${p.focus.map(f=>`<div class="focus-li">${esc(f)}</div>`).join('')}` : ''}
      ${c.keyNote || c.pref ? `<h5>How to land it</h5><div class="gold-box" style="font-size:11.5px;">
        ${c.keyNote ? `${esc(c.keyNote)}` : ''}
        ${c.pref ? `<div style="margin-top:7px;color:#bfae7a;">Prefers: ${esc(c.pref)}</div>` : ''}
      </div>` : ''}
      ${lastFb ? `<h5>Last feedback · ${esc(lastFb.date)}</h5><div class="muted" style="font-size:11.5px;line-height:1.55;">${esc(lastFb.body.slice(0,180))}${lastFb.body.length>180?'…':''}</div>
      <button class="btn btn-secondary btn-sm" style="margin-top:8px;" onclick="openDrawer('${p.id}')">Full history</button>` : ''}
    </div>

    <div>

          </div>
          <label class="dnp-toggle" style="margin-left:auto;"><input type="checkbox" ${r.dnp?'checked':''} onchange="setRec('dnp',this.checked);renderPMBuilder();"> Did not play</label>
        </div>

        <h3>What you saw — dictate it</h3>

        <div class="wispr-hint"><span class="mic"></span> Dictation-first: no structure needed — your words go straight onto the branded review. Blank line = new paragraph.</div>

        <div class="form-row">
          <div class="form-group" style="flex:1;"><label>Data line (GPS / stats)</label><input value="${esc(r.dataLine)}" onchange="setRec('dataLine',this.value)" placeholder="7.2km · 23 sprints · 12 circle entries"></div>
        </div>
        <div class="form-row">
          <div class="form-group" style="flex:1;"><label>Next game focus</label><input value="${esc(r.nextFocus)}" onchange="setRec('nextFocus',this.value)" placeholder="Use the aerial early when they sit in the low block"></div>
          <div class="form-group"><label>Sign-off</label><input value="${esc(r.signoff)}" onchange="setRec('signoff',this.value)" style="width:120px;"></div>
        </div>
      </div>

      <div class="toolbar">
        <button class="btn btn-secondary" onclick="stepPlayer(-1)">← Prev</button>
        <button class="btn btn-primary" onclick="stepPlayer(1)">Next player →</button>
        <span style="flex:1;"></span>
        <button class="btn btn-secondary btn-sm" onclick="previewOne('${p.id}')">Preview ${esc(firstName(p.name))}</button>
      </div>
    </div>
  </div>`;
  el.innerHTML = html;
}
function setRec(field, value) { const set=getMatch(); if(!set) return; recFor(set, state.ui.pid)[field]=value; saveState(); if(field==='score'||field==='dnp') renderPMBuilder(); }
function setRecQuiet(field, value) { const set=getMatch(); if(!set) return; recFor(set, state.ui.pid)[field]=value; clearTimeout(window.__qt); window.__qt=setTimeout(saveState, 600); }
function stepPlayer(dir) {
  const set = getMatch(); if (!set) return;
  const i = set.pids.indexOf(state.ui.pid);
  let j = i + dir;
  if (j < 0) j = set.pids.length - 1;
  if (j >= set.pids.length) j = 0;
  state.ui.pid = set.pids[j];
  saveState(); renderPMBuilder();
  window.scrollTo({top:0, behavior:'smooth'});
}
function previewOne(pid) {
  state.ui.previewType = 'postmatch';
  state.ui.previewPid = pid;
  switchView('preview');
}

}
function genDate() {
  try { return new Date().toLocaleDateString('en-NZ', { day:'2-digit', month:'short', year:'numeric' }); }
  catch(e) { return new Date().toDateString(); }
}

function getDeck() { return state.decks.find(d => d.id === state.ui.deckId); }
function renderDeck() {
  const el = document.getElementById('view-deck');
  if (state.ui.deckId && getDeck()) { renderDeckBuilder(); return; }
  state.ui.deckId = null;
  let html = `<h2>Review Decks</h2>
    <p class="sub">Three-page block or tournament reviews — overview, where you stand, path forward. Squad is preloaded.</p>

      <div class="form-row">
        <div class="form-group" style="flex:2;"><label>Title</label><input id="nd-title" placeholder="Nations Cup 2026 — Tournament Review"></div>
        <div class="form-group" style="flex:1;"><label>Period</label><input id="nd-period" placeholder="June 2026"></div>
        <div class="form-group"><label>&nbsp;</label><button class="btn btn-primary" onclick="createDeck()">Create</button></div>
      </div>
    </div>`;
  state.decks.slice().reverse().forEach(s => {
    const count = s.players.filter(p => p.foundationStatement).length;
    html += `<div class="review-card" onclick="state.ui.deckId='${s.id}';state.ui.deckIdx=0;saveState();renderDeck();">

}
function createDeck() {
  const title = document.getElementById('nd-title').value.trim() || 'Player Review';
  const period = document.getElementById('nd-period').value.trim();
  const set = { id:uid(), reviewTitle:title, reviewPeriod:period,
    players: roster().map(p => ({
      playerId:p.id, name:p.name, position:p.position,
      overallRating:'', trajectory:'', trajectoryNote:'', foundationStatement:'',
      topStrength1:'', topStrength2:'', topFocus1:'', topFocus2:'',
      strength1Title:'', strength1Detail:'', strength2Title:'', strength2Detail:'', strength3Title:'', strength3Detail:'',
      workOn1Title:'', workOn1Detail:'', workOn1Coaching:'', workOn2Title:'', workOn2Detail:'', workOn2Coaching:'', workOn3Title:'', workOn3Detail:'', workOn3Coaching:'',
      jdClaim1:'', jdVerdict1:'yes', jdClaim2:'', jdVerdict2:'partial', jdClaim3:'', jdVerdict3:'no',
      needsWork1:'', needsWork2:'', needsWork3:'', opportunity1:'', opportunity2:'',
      acaAccountability:'', acaConsistency:'', acaAction:'', dataSays:''
    }))
  };
  state.decks.push(set);
  state.ui.deckId = set.id; state.ui.deckIdx = 0;

function delDeck(id) {

  state.decks = state.decks.filter(s => s.id !== id);

  saveState(); renderDeck();
}

function ensureHtml2Canvas(cb) {
  if (window.html2canvas) return cb();
  const sc = document.createElement('script');
  sc.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
  sc.onload = () => cb();
  sc.onerror = () => alert('Could not load the image tool — needs internet. Use Print / Save PDF instead.');
  document.head.appendChild(sc);
}
function shareImages() {
  const nodes = document.querySelectorAll('#preview-content .doc');
  if (!nodes.length) { alert('Nothing to export — pick a review set first.'); return; }
  if (nodes.length > 6 && !confirm(nodes.length + ' images will download. Continue?')) return;
  ensureHtml2Canvas(() => {
    let i = 0;
    const next = () => {
      if (i >= nodes.length) return;
      const node = nodes[i];
      const nameEl = node.querySelector('.pb-name, .bm-meta .v');
      const fname = ((nameEl ? nameEl.textContent : 'review') + '-' + (i+1)).replace(/[^a-z0-9]+/gi,'-').toLowerCase();
      html2canvas(node, { scale:2, backgroundColor:'#ffffff', useCORS:true })
        .then(canvas => {
          const a = document.createElement('a');
          a.href = canvas.toDataURL('image/png');
          a.download = fname + '.png'; a.click();
          i++; setTimeout(next, 450);
        })
        .catch(e => alert('Image export failed: ' + e.message));
    };
    next();
  });
}
function renderPreview() {
  const el = document.getElementById('view-preview');
  const type = state.ui.previewType || (state.ui.deckId && !state.ui.matchId ? 'deck' : 'postmatch');
  const sets = type === 'postmatch' ? state.matches : state.decks;
  const curId = type === 'postmatch' ? state.ui.matchId : state.ui.deckId;
  const sel = sets.find(s => s.id === (state.ui.previewSetId || curId)) || sets[sets.length-1];

  let html = `<div class="preview-controls no-print toolbar">
    <select onchange="state.ui.previewType=this.value;state.ui.previewSetId=null;state.ui.previewPid=null;saveState();renderPreview();">
      <option value="postmatch" ${type==='postmatch'?'selected':''}>Post-Match Reviews</option>
      <option value="deck" ${type==='deck'?'selected':''}>Review Decks</option>
    </select>
    <select onchange="state.ui.previewSetId=this.value;state.ui.previewPid=null;saveState();renderPreview();">
      <option value="">Select…</option>
      ${sets.map(s => `<option value="${s.id}" ${sel&&s.id===sel.id?'selected':''}>${esc(type==='postmatch'?s.title:s.reviewTitle)}</option>`).join('')}
    </select>
    <select id="preview-player" onchange="state.ui.previewPid=this.value;saveState();renderPreview();">
      <option value="all">All players</option>
    </select>
    <span style="flex:1;"></span>
    <button class="btn btn-primary" onclick="window.print()">Print / Save PDF</button>
    <button class="btn btn-secondary" onclick="shareImages()">📷 PNG per player</button>
  </div>
  <div id="preview-content"></div>`;
  el.innerHTML = html;

  if (!sel) { document.getElementById('preview-content').innerHTML = '<p class="muted">No review sets yet — build one in Post-Match or Review Deck first.</p>'; return; }

  const pEl = document.getElementById('preview-player');
  if (type === 'postmatch') {
    const withContent = sel.pids.filter(pid => recDone(sel, pid));
    pEl.innerHTML = '<option value="all">All players with content (' + withContent.length + ')</option>' +
      sel.pids.map(pid => { const p=getPlayer(pid); return p?`<option value="${pid}" ${state.ui.previewPid===pid?'selected':''}>${esc(p.name)}</option>`:''; }).join('');
    const filt = state.ui.previewPid && state.ui.previewPid !== 'all' ? [state.ui.previewPid] : withContent;
    document.getElementById('preview-content').innerHTML = filt.length
      ? filt.map(pid => { const p=getPlayer(pid); return p?renderMatchDoc(sel,p):''; }).join('')
      : '<p class="muted">No completed players in this set yet — dictate some reviews first.</p>';
  } else {
    const withContent = sel.players.filter(p => p.foundationStatement);
    pEl.innerHTML = '<option value="all">All players with content (' + withContent.length + ')</option>' +
      sel.players.map((p,i) => `<option value="${i}" ${String(state.ui.previewPid)===String(i)?'selected':''}>${esc(p.name)}</option>`).join('');
    const filt = state.ui.previewPid && state.ui.previewPid !== 'all' ? [sel.players[parseInt(state.ui.previewPid)]] : withContent;
    document.getElementById('preview-content').innerHTML = filt.length
      ? filt.map(p => renderDeckDoc(sel,p)).join('')
      : '<p class="muted">No completed players in this deck yet.</p>';
  }
}

// =============================================
// INIT
// =============================================
function renderNavMark() {
  document.getElementById('nav-mark').innerHTML =
    (state.brand.crest ? `<img src="${state.brand.crest}" style="height:34px;width:auto;">` : fernSVG(30,'#D4AF37')) +
    `<span class="nm-txt">BLACK STICKS<small>PLAYER REVIEWS · MEN</small></span>`;
}
loadState();
renderNavMark();
switchView(state.ui.view || 'squad');
</script>
</body>
