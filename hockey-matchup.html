<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#d4a843">
<link rel="manifest" href="manifest.json">
<title>Match Lineup</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', -apple-system, Arial, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }

nav { background: #16213e; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #0f3460; flex-wrap: wrap; }
nav .logo { font-weight: 900; font-size: 18px; padding: 14px 0; margin-right: 30px; color: #d4a843; letter-spacing: 1px; }
nav button { background: none; border: none; color: #8899aa; font-size: 14px; padding: 14px 18px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; }
nav button:hover { color: #fff; }
nav button.active { color: #fff; border-bottom-color: #d4a843; }

.view { display: none; padding: 24px; max-width: 1400px; margin: 0 auto; }
.view.active { display: block; }

h2 { font-size: 22px; margin-bottom: 16px; color: #d4a843; }
.btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .2s; }
.btn-primary { background: #d4a843; color: #000; }
.btn-primary:hover { background: #e6bc5a; }
.btn-secondary { background: #0f3460; color: #fff; }
.btn-secondary:hover { background: #1a4a8a; }
.btn-danger { background: #722; color: #fff; }
.btn-danger:hover { background: #933; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
input, select { padding: 6px 10px; border: 1px solid #334; border-radius: 4px; background: #0d1b2a; color: #fff; font-size: 13px; }
input:focus, select:focus { outline: none; border-color: #d4a843; }
input[type="color"] { padding: 2px; width: 36px; height: 32px; cursor: pointer; }
label { font-size: 13px; color: #99a; display: block; margin-bottom: 4px; }
.toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.section { background: #16213e; border: 1px solid #334; border-radius: 6px; padding: 16px; margin-bottom: 16px; }

/* MATCHUP LIST */
.match-card { background: #16213e; border: 1px solid #334; border-radius: 6px; padding: 14px; margin-bottom: 8px; cursor: pointer; transition: all .2s; display: flex; justify-content: space-between; align-items: center; }
.match-card:hover { border-color: #d4a843; }
.match-card .info h4 { color: #fff; font-size: 14px; margin-bottom: 2px; }
.match-card .info small { color: #889; font-size: 12px; }

/* EDITOR LAYOUT */
.editor-layout { display: flex; gap: 16px; align-items: flex-start; }
.editor-main { flex: 1; min-width: 0; }
.editor-sidebar { width: 220px; flex-shrink: 0; }

/* POSITION CATEGORY BARS */
.pos-bar { display: flex; height: 36px; border-radius: 4px; overflow: hidden; }
.pos-bar.top { margin-bottom: 0; border-radius: 4px 4px 0 0; }
.pos-bar.bottom { margin-top: 0; border-radius: 0 0 4px 4px; }
.pos-bar .pos-seg { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; letter-spacing: 1px; border-right: 1px solid rgba(0,0,0,.2); cursor: pointer; transition: opacity .15s; }
.pos-bar .pos-seg:hover { opacity: .7; }
.pos-bar .pos-seg:last-child { border-right: none; }

/* HOCKEY FIELD */
.field-wrap { position: relative; width: 100%; aspect-ratio: 1.5 / 1; background: #4a8c3f; overflow: hidden; border-left: 3px solid #2d6627; border-right: 3px solid #2d6627; }
.field-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

/* PLAYER CHIPS ON FIELD */
.mu-player { position: absolute; transform: translate(-50%, -50%); cursor: grab; user-select: none; z-index: 10; transition: box-shadow .15s; }
.mu-player:active { cursor: grabbing; z-index: 100; }
.mu-player:hover { z-index: 50; }
.mu-player .mu-label { font-size: 12px; font-weight: 700; padding: 5px 14px; border-radius: 3px; white-space: nowrap; text-align: center; min-width: 60px; box-shadow: 0 2px 6px rgba(0,0,0,.3); border: 2px solid; line-height: 1.3; }
.mu-player .mu-label .mu-name { font-size: 9px; font-weight: 600; opacity: .75; display: block; }

/* SIDEBAR */
.sidebar-section { margin-bottom: 16px; }
.sidebar-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #d4a843; text-transform: uppercase; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #334; }
.sidebar-player { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 4px; user-select: none; font-size: 12px; margin-bottom: 2px; }
.sidebar-player:hover { background: #1a2a4a; }
.sidebar-player .sp-pos { font-weight: 700; color: #889; width: 28px; font-size: 10px; }

/* TEAM CONFIG */
.team-config { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-end; flex-wrap: wrap; }
.team-config .tc-group { display: flex; flex-direction: column; }
.team-config .tc-group label { font-size: 11px; }
.team-config .tc-group input:not([type="color"]) { width: 140px; }

/* PRESET FORMATIONS */
.formation-presets { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.formation-presets button { padding: 3px 8px; font-size: 11px; background: #0d1b2a; border: 1px solid #334; color: #aaa; border-radius: 3px; cursor: pointer; }
.formation-presets button:hover { border-color: #d4a843; color: #fff; }

/* COUNTRY PRESET BUTTONS */
.country-presets { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.country-presets button { padding: 3px 8px; font-size: 10px; border: 1px solid #334; border-radius: 3px; cursor: pointer; font-weight: 600; transition: all .15s; }
.country-presets button:hover { transform: scale(1.05); }

/* ROSTER */
.roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.roster-cat { background: #16213e; border: 1px solid #334; border-radius: 6px; padding: 14px; }
.roster-cat h3 { font-size: 14px; color: #d4a843; margin-bottom: 10px; }
.roster-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 8px; border-radius: 4px; font-size: 13px; margin-bottom: 3px; }
.roster-item:hover { background: #1a2a4a; }
.roster-item .ri-pos { font-size: 10px; font-weight: 700; color: #889; margin-right: 6px; }
.roster-add { display: flex; gap: 4px; margin-top: 8px; }
.roster-add input { flex: 1; }
.roster-add select { width: 60px; }

/* ROSTER PICKER IN EDITOR */
.roster-picker { margin-top: 6px; }
.roster-picker select { width: 100%; margin-bottom: 4px; }

/* OUTPUT PREVIEW */
.output-wrap { background: #fff; max-width: 1000px; margin: 0 auto 30px; overflow: hidden; }
.output-field { position: relative; width: 100%; aspect-ratio: 1.5 / 1; background: #4a8c3f; overflow: hidden; }
.output-field .field-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.out-player { position: absolute; transform: translate(-50%, -50%); }
.out-player .out-label { font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 3px; white-space: nowrap; text-align: center; min-width: 55px; border: 2px solid; box-shadow: 0 1px 4px rgba(0,0,0,.3); line-height: 1.3; }
.out-player .out-label .out-name { font-size: 8px; font-weight: 600; opacity: .75; display: block; }
.out-pos-bar { display: flex; height: 32px; }
.out-pos-bar .pos-seg { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; letter-spacing: 1px; border-right: 1px solid rgba(0,0,0,.2); }
.out-pos-bar .pos-seg:last-child { border-right: none; }
.output-title { text-align: center; padding: 10px; background: #1a1a1a; }
.output-title h3 { font-size: 16px; font-weight: 900; color: #d4a843 !important; letter-spacing: 2px; }

/* COLOR ROW */
.color-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 8px; }
.color-row .cg { display: flex; flex-direction: column; }
.color-row .cg label { font-size: 10px; color: #667; }

/* PRINT */
@media print {
  body { background: #fff; }
  nav, .view:not(#view-preview), .no-print { display: none !important; }
  #view-preview { display: block !important; padding: 0; }
  .output-wrap { page-break-after: always; margin: 0; }
  .output-wrap:last-child { page-break-after: avoid; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  @page { size: landscape; margin: 8mm; }
}
</style>
</head>
<body>

<nav>
  <span class="logo">MATCH LINEUP</span>
  <button class="active" onclick="showView('list')">Matchups</button>
  <button onclick="showView('editor')">Editor</button>
  <button onclick="showView('roster')">Roster</button>
  <button onclick="showView('preview')">Preview / Print</button>
</nav>

<div id="view-list" class="view active"></div>
<div id="view-editor" class="view"></div>
<div id="view-roster" class="view"></div>
<div id="view-preview" class="view"></div>

<script>
const STORE_KEY = 'hockeyMatchup';
const POSITIONS = ['GK','LB','RB','LH','RH','CB','CM','LM','RM','LS','CS','RS'];
const POS_CATS = ['GK','D','MF','S'];
const POS_CAT_POSITIONS = {
  GK: ['GK'],
  D: ['LB','RB','LH','RH','CB'],
  MF: ['CM','LM','RM'],
  S: ['LS','CS','RS']
};
const POS_TO_CAT = { GK:'GK', LB:'D', RB:'D', LH:'D', RH:'D', CB:'D', FM:'D', FD:'D', WH:'D', CM:'MF', LM:'MF', RM:'MF', LS:'S', CS:'S', RS:'S' };

// International hockey team colour presets
const TEAM_COLORS = {
  'New Zealand':    { chipBg:'#000000', chipText:'#ffffff', chipBorder:'#333333', barBg:'#000000', barText:'#ffffff' },
  'Australia':      { chipBg:'#FFD700', chipText:'#004225', chipBorder:'#C9A800', barBg:'#004225', barText:'#FFD700' },
  'Netherlands':    { chipBg:'#FF6600', chipText:'#ffffff', chipBorder:'#CC5200', barBg:'#FF6600', barText:'#ffffff' },
  'Belgium':        { chipBg:'#E30613', chipText:'#FFD700', chipBorder:'#B0040F', barBg:'#E30613', barText:'#FFD700' },
  'India':          { chipBg:'#0066CC', chipText:'#ffffff', chipBorder:'#004C99', barBg:'#0066CC', barText:'#ffffff' },
  'Germany':        { chipBg:'#ffffff', chipText:'#000000', chipBorder:'#cccccc', barBg:'#000000', barText:'#ffffff' },
  'England':        { chipBg:'#ffffff', chipText:'#002B5C', chipBorder:'#cccccc', barBg:'#002B5C', barText:'#ffffff' },
  'Argentina':      { chipBg:'#75AADB', chipText:'#ffffff', chipBorder:'#5A8BB8', barBg:'#75AADB', barText:'#ffffff' },
  'Spain':          { chipBg:'#AA151B', chipText:'#F1BF00', chipBorder:'#880E13', barBg:'#AA151B', barText:'#F1BF00' },
  'South Korea':    { chipBg:'#ffffff', chipText:'#003478', chipBorder:'#cccccc', barBg:'#003478', barText:'#ffffff' },
  'Malaysia':       { chipBg:'#010066', chipText:'#FFD700', chipBorder:'#000044', barBg:'#FFD700', barText:'#010066' },
  'France':         { chipBg:'#002395', chipText:'#ffffff', chipBorder:'#001A6E', barBg:'#002395', barText:'#ffffff' },
  'Japan':          { chipBg:'#ffffff', chipText:'#BC002D', chipBorder:'#cccccc', barBg:'#BC002D', barText:'#ffffff' },
  'Ireland':        { chipBg:'#009A49', chipText:'#ffffff', chipBorder:'#007A3A', barBg:'#009A49', barText:'#ffffff' },
  'South Africa':   { chipBg:'#007749', chipText:'#FFB612', chipBorder:'#005C38', barBg:'#007749', barText:'#FFB612' },
  'Pakistan':       { chipBg:'#01411C', chipText:'#ffffff', chipBorder:'#002E13', barBg:'#01411C', barText:'#ffffff' },
  'Great Britain':  { chipBg:'#012169', chipText:'#ffffff', chipBorder:'#001244', barBg:'#012169', barText:'#ffffff' },
  'Canada':         { chipBg:'#FF0000', chipText:'#ffffff', chipBorder:'#CC0000', barBg:'#FF0000', barText:'#ffffff' },
  'Chile':          { chipBg:'#D52B1E', chipText:'#ffffff', chipBorder:'#A82218', barBg:'#D52B1E', barText:'#ffffff' },
  'USA':            { chipBg:'#002868', chipText:'#ffffff', chipBorder:'#001A44', barBg:'#002868', barText:'#ffffff' }
};

const DEFAULT_HOME_COLORS = { chipBg:'#ffffff', chipText:'#111111', chipBorder:'#cccccc', barBg:'#c9a94e', barText:'#000000' };
const DEFAULT_AWAY_COLORS = { chipBg:'#c87533', chipText:'#ffffff', chipBorder:'#a05a20', barBg:'#111111', barText:'#ffffff' };

// Default formation positions (x%, y%) for a team attacking RIGHT
const FORMATION_PRESETS = {
  '1-4-3-3': [
    { pos:'GK', x:5, y:50 },
    { pos:'LH', x:22, y:18 }, { pos:'LB', x:16, y:38 }, { pos:'RB', x:16, y:62 }, { pos:'RH', x:22, y:82 },
    { pos:'LM', x:38, y:30 }, { pos:'CM', x:35, y:50 }, { pos:'RM', x:38, y:70 },
    { pos:'LS', x:52, y:20 }, { pos:'CS', x:48, y:50 }, { pos:'RS', x:52, y:80 }
  ],
  '1-3-4-3': [
    { pos:'GK', x:5, y:50 },
    { pos:'LH', x:18, y:25 }, { pos:'CB', x:14, y:50 }, { pos:'RH', x:18, y:75 },
    { pos:'LM', x:34, y:18 }, { pos:'CM', x:30, y:40 }, { pos:'CM', x:30, y:60 }, { pos:'RM', x:34, y:82 },
    { pos:'LS', x:50, y:20 }, { pos:'CS', x:46, y:50 }, { pos:'RS', x:50, y:80 }
  ],
  '1-4-4-2': [
    { pos:'GK', x:5, y:50 },
    { pos:'LH', x:20, y:15 }, { pos:'LB', x:16, y:38 }, { pos:'RB', x:16, y:62 }, { pos:'RH', x:20, y:85 },
    { pos:'LM', x:36, y:18 }, { pos:'CM', x:33, y:40 }, { pos:'CM', x:33, y:60 }, { pos:'RM', x:36, y:82 },
    { pos:'LS', x:50, y:35 }, { pos:'RS', x:50, y:65 }
  ],
  '1-3-3-3-1': [
    { pos:'GK', x:5, y:50 },
    { pos:'LH', x:18, y:25 }, { pos:'CB', x:14, y:50 }, { pos:'RH', x:18, y:75 },
    { pos:'LM', x:32, y:25 }, { pos:'CM', x:28, y:50 }, { pos:'RM', x:32, y:75 },
    { pos:'LS', x:44, y:20 }, { pos:'CS', x:42, y:50 }, { pos:'RS', x:44, y:80 },
    { pos:'CS', x:55, y:50 }
  ]
};

let state = { matchups: [], roster: [], ui: { view: 'list', currentId: null } };
let dragState = { playerId: null, team: null };

function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function load() { try { const r = localStorage.getItem(STORE_KEY); if (r) { const d = JSON.parse(r); Object.assign(state, d); if (!state.roster) state.roster = []; } } catch(e) {} }
function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getTeamColors(m, team) {
  const t = m[team];
  return {
    chipBg: t.chipBg || (team === 'home' ? DEFAULT_HOME_COLORS.chipBg : DEFAULT_AWAY_COLORS.chipBg),
    chipText: t.chipText || (team === 'home' ? DEFAULT_HOME_COLORS.chipText : DEFAULT_AWAY_COLORS.chipText),
    chipBorder: t.chipBorder || (team === 'home' ? DEFAULT_HOME_COLORS.chipBorder : DEFAULT_AWAY_COLORS.chipBorder),
    barBg: t.barBg || (team === 'home' ? DEFAULT_HOME_COLORS.barBg : DEFAULT_AWAY_COLORS.barBg),
    barText: t.barText || (team === 'home' ? DEFAULT_HOME_COLORS.barText : DEFAULT_AWAY_COLORS.barText)
  };
}

function fieldSVG() {
  return `<svg class="field-svg" viewBox="0 0 1000 690" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="996" height="686" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="3" rx="2"/>
    <line x1="500" y1="2" x2="500" y2="688" stroke="rgba(255,255,255,.6)" stroke-width="2"/>
    <line x1="250" y1="2" x2="250" y2="688" stroke="rgba(255,255,255,.35)" stroke-width="2" stroke-dasharray="10,8"/>
    <line x1="750" y1="2" x2="750" y2="688" stroke="rgba(255,255,255,.35)" stroke-width="2" stroke-dasharray="10,8"/>
    <path d="M 2 140 Q 220 345 2 550" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="2.5"/>
    <rect x="0" y="315" width="8" height="60" fill="rgba(255,255,255,.7)" rx="1"/>
    <path d="M 998 140 Q 780 345 998 550" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="2.5"/>
    <rect x="992" y="315" width="8" height="60" fill="rgba(255,255,255,.7)" rx="1"/>
    <circle cx="80" cy="345" r="4" fill="rgba(255,255,255,.5)"/>
    <circle cx="920" cy="345" r="4" fill="rgba(255,255,255,.5)"/>
  </svg>`;
}

function showView(v) {
  state.ui.view = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const views = { list: 0, editor: 1, roster: 2, preview: 3 };
  const viewEl = document.getElementById('view-' + v);
  if (viewEl) viewEl.classList.add('active');
  const navBtns = document.querySelectorAll('nav button');
  if (navBtns[views[v]]) navBtns[views[v]].classList.add('active');
  if (v === 'list') renderList();
  else if (v === 'editor') renderEditor();
  else if (v === 'roster') renderRoster();
  else if (v === 'preview') renderPreview();
  save();
}

// =============================================
// LIST VIEW
// =============================================
function renderList() {
  const el = document.getElementById('view-list');
  let html = `<h2>Match Lineups</h2>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="createMatchup()">+ New Matchup</button>
    </div>`;

  if (state.matchups.length === 0) {
    html += `<p style="color:#889; text-align:center; padding:40px;">No matchups yet.</p>`;
  }
  state.matchups.forEach(m => {
    html += `<div class="match-card" onclick="openMatchup('${m.id}')">
      <div class="info"><h4>${esc(m.title)}</h4><small>${esc(m.home.name)} vs ${esc(m.away.name)}</small></div>
      <div style="display:flex;gap:4px;" onclick="event.stopPropagation()">
        <button class="btn btn-secondary btn-sm" onclick="dupMatchup('${m.id}')">Dup</button>
        <button class="btn btn-danger btn-sm" onclick="delMatchup('${m.id}')">×</button>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

function createMatchup() {
  const m = {
    id: uid(),
    title: 'Match Lineup',
    home: { name: 'NZ', players: [], ...DEFAULT_HOME_COLORS },
    away: { name: 'Opposition', players: [], ...DEFAULT_AWAY_COLORS },
    homePosBar: ['GK','D','D','D','D','MF','MF','MF','S','S','S'],
    awayPosBar: ['S','S','S','MF','MF','MF','D','D','D','D','GK']
  };
  state.matchups.push(m);
  state.ui.currentId = m.id;
  save();
  showView('editor');
}

function openMatchup(id) { state.ui.currentId = id; save(); showView('editor'); }
function dupMatchup(id) {
  const o = state.matchups.find(m=>m.id===id); if (!o) return;
  const c = JSON.parse(JSON.stringify(o)); c.id = uid(); c.title += ' (copy)';
  state.matchups.push(c); save(); renderList();
}
function delMatchup(id) {
  if (!confirm('Delete?')) return;
  state.matchups = state.matchups.filter(m=>m.id!==id);
  if (state.ui.currentId===id) state.ui.currentId = null;
  save(); renderList();
}

// =============================================
// ROSTER VIEW
// =============================================
function renderRoster() {
  const el = document.getElementById('view-roster');
  let html = `<h2>Player Roster</h2>
    <p style="color:#889; font-size:13px; margin-bottom:16px;">Add players here once, then quickly select them when building lineups.</p>`;

  html += `<div class="roster-grid">`;
  POS_CATS.forEach(cat => {
    const catName = { GK:'Goalkeepers', D:'Defenders', MF:'Midfielders', S:'Strikers' }[cat];
    const positions = POS_CAT_POSITIONS[cat];
    const players = state.roster.filter(p => POS_TO_CAT[p.pos] === cat);

    html += `<div class="roster-cat">
      <h3>${catName}</h3>`;

    players.forEach((p, i) => {
      const ri = state.roster.indexOf(p);
      html += `<div class="roster-item">
        <span><span class="ri-pos">${esc(p.pos)}</span> ${esc(p.name)}</span>
        <button class="btn btn-danger btn-sm" style="padding:2px 6px;font-size:10px;" onclick="removeRosterPlayer(${ri})">×</button>
      </div>`;
    });

    html += `<div class="roster-add">
      <select id="roster-pos-${cat}">
        ${positions.map(p => `<option value="${p}">${p}</option>`).join('')}
      </select>
      <input id="roster-name-${cat}" placeholder="Player name" onkeydown="if(event.key==='Enter')addRosterPlayer('${cat}')">
      <button class="btn btn-primary btn-sm" onclick="addRosterPlayer('${cat}')">+</button>
    </div>`;

    html += `</div>`;
  });
  html += `</div>`;

  el.innerHTML = html;
}

function addRosterPlayer(cat) {
  const posEl = document.getElementById('roster-pos-' + cat);
  const nameEl = document.getElementById('roster-name-' + cat);
  const pos = posEl.value;
  const name = nameEl.value.trim();
  if (!name) return;
  state.roster.push({ id: uid(), pos, name: name.toUpperCase() });
  nameEl.value = '';
  nameEl.focus();
  save();
  renderRoster();
}

function removeRosterPlayer(index) {
  state.roster.splice(index, 1);
  save();
  renderRoster();
}

// =============================================
// EDITOR VIEW
// =============================================
function getCurrent() { return state.matchups.find(m=>m.id===state.ui.currentId); }

function renderEditor() {
  const el = document.getElementById('view-editor');
  const m = getCurrent();
  if (!m) {
    if (state.matchups.length > 0) { state.ui.currentId = state.matchups[0].id; save(); renderEditor(); return; }
    el.innerHTML = `<p style="color:#889;">Create a matchup first.</p>`;
    return;
  }

  const hc = getTeamColors(m, 'home');

  // ---- FIELD + SIDEBAR ----
  html += `<div class="editor-layout">

  // Home pos bar (top)
  html += `<div class="pos-bar top">${m.homePosBar.map((s, i) => `<div class="pos-seg" style="background:${esc(hc.barBg)};color:${esc(hc.barText)};" onclick="renamePosBarSeg('home',${i})">${esc(s)}</div>`).join('')}</div>`;

    </div>`;

function applyTeamColor(team, countryName) {
  const m = getCurrent(); if (!m) return;
  const colors = TEAM_COLORS[countryName]; if (!colors) return;
  m[team].chipBg = colors.chipBg;
  m[team].chipText = colors.chipText;
  m[team].chipBorder = colors.chipBorder;
  m[team].barBg = colors.barBg;
  m[team].barText = colors.barText;
  m[team].name = countryName;
  save();
  renderEditor();
}

function addFromRoster(team, rosterId) {
  if (!rosterId) return;
  const m = getCurrent(); if (!m) return;
  const rp = state.roster.find(r => r.id === rosterId);
  if (!rp) return;

  let x, y;
  if (team === 'home') {
    x = 15 + Math.random() * 30;
    y = 15 + Math.random() * 70;
  } else {
    x = 55 + Math.random() * 30;
    y = 15 + Math.random() * 70;
  }

  // For away team, swap L↔R in position name
  let pos = rp.pos;
  if (team === 'away') {
    const LR_SWAP = { LH:'RH', RH:'LH', LB:'RB', RB:'LB', LM:'RM', RM:'LM', LS:'RS', RS:'LS' };
    pos = LR_SWAP[pos] || pos;
  }

  m[team].players.push({ id: uid(), pos, name: rp.name, x: parseFloat(x.toFixed(1)), y: parseFloat(y.toFixed(1)) });
  save();
  renderEditor();
}

function addPlayer(team) {
  const m = getCurrent(); if (!m) return;
  const posInput = document.getElementById(team + '-new-pos');
  const nameInput = document.getElementById(team + '-new-name');
  const pos = (posInput.value || 'CM').toUpperCase().trim();
  const name = nameInput.value.trim();

  let x, y;
  if (team === 'home') {
    x = 15 + Math.random() * 30;
    y = 15 + Math.random() * 70;
  } else {
    x = 55 + Math.random() * 30;
    y = 15 + Math.random() * 70;
  }

  m[team].players.push({ id: uid(), pos, name: name.toUpperCase(), x: parseFloat(x.toFixed(1)), y: parseFloat(y.toFixed(1)) });
  nameInput.value = '';
  nameInput.focus();
  save();
  renderEditor();
}

function removePlayer(team, index) {
  const m = getCurrent(); if (!m) return;
  m[team].players.splice(index, 1);
  save();
  renderEditor();
}

function renamePlayer(team, index) {
  const m = getCurrent(); if (!m) return;
  const p = m[team].players[index]; if (!p) return;
  const name = prompt(`Name for ${p.pos}:`, p.name || '');
  if (name === null) return;
  p.name = name.trim().toUpperCase();
  save();
  renderEditor();
}

function renamePosBarSeg(team, index) {
  const m = getCurrent(); if (!m) return;
  const bar = team === 'home' ? m.homePosBar : m.awayPosBar;
  const current = bar[index] || '';
  const newName = prompt('Rename segment:', current);
  if (newName === null) return;
  bar[index] = newName.trim().toUpperCase();
  save();
  renderEditor();
}

function applyPreset(team, presetName) {
  const m = getCurrent(); if (!m) return;
  const preset = FORMATION_PRESETS[presetName];
  if (!preset) return;

  const LR_SWAP = { LH:'RH', RH:'LH', LB:'RB', RB:'LB', LM:'RM', RM:'LM', LS:'RS', RS:'LS' };

  // Try to keep existing player names by matching position
  const oldPlayers = [...m[team].players];

  const players = preset.map(p => {
    let x = p.x, y = p.y, pos = p.pos;
    if (team === 'away') {
      x = 100 - p.x;
      pos = LR_SWAP[pos] || pos;
    }

    // Try to find an existing player with matching position to keep their name
    let name = '';
    const existingIdx = oldPlayers.findIndex(op => op.pos === pos && op.name);
    if (existingIdx >= 0) {
      name = oldPlayers[existingIdx].name;
      oldPlayers.splice(existingIdx, 1); // don't reuse
    }

    return { id: uid(), pos, name, x: parseFloat(x.toFixed(1)), y: parseFloat(y.toFixed(1)) };
  });

  m[team].players = players;

  const cats = [];
  const catOrder = { GK: 0, D: 1, MF: 2, S: 3 };
  players.forEach(p => {
    const cat = POS_TO_CAT[p.pos] || 'MF';
    cats.push(cat);
  });
  cats.sort((a, b) => (catOrder[a]||0) - (catOrder[b]||0));

  if (team === 'home') m.homePosBar = cats;
  else m.awayPosBar = [...cats].reverse();

  save();
  renderEditor();
}

// Drag and drop
function startDrag(e, team, index) {
  dragState.team = team;
  dragState.index = index;
  e.dataTransfer.setData('text/plain', team + ':' + index);
  e.dataTransfer.effectAllowed = 'move';
}

function dropOnField(e) {
  e.preventDefault();
  const m = getCurrent(); if (!m) return;
  const rect = document.getElementById('field-drop').getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width * 100);
  const y = ((e.clientY - rect.top) / rect.height * 100);
  let cx = parseFloat(x.toFixed(1));
  let cy = Math.max(3, Math.min(97, parseFloat(y.toFixed(1))));

  if (dragState.team === 'home') {
    cx = Math.max(2, Math.min(50, cx));
  } else if (dragState.team === 'away') {
    cx = Math.max(50, Math.min(98, cx));
  } else {
    cx = Math.max(2, Math.min(98, cx));
  }

  if (dragState.team && dragState.index !== undefined) {
    const p = m[dragState.team].players[dragState.index];
    if (p) { p.x = cx; p.y = cy; }
  }
  dragState.team = null;
  dragState.index = undefined;
  save();
  renderEditor();
}

function setupTouchDrag() {
  let ghost = null;

  document.querySelectorAll('.mu-player').forEach(el => {
    el.addEventListener('touchstart', function(e) {
      const ds = el.getAttribute('ondragstart');
      if (!ds) return;
      const match = ds.match(/startDrag\(event,'(\w+)',(\d+)\)/);
      if (!match) return;
      dragState.team = match[1];
      dragState.index = parseInt(match[2]);
      ghost = el.cloneNode(true);
      ghost.style.position = 'fixed';
      ghost.style.pointerEvents = 'none';
      ghost.style.zIndex = '10000';
      ghost.style.opacity = '0.8';
      document.body.appendChild(ghost);
      e.preventDefault();
    }, { passive: false });
  });

  document.addEventListener('touchmove', function(e) {
    if (!ghost) return;
    const t = e.touches[0];
    ghost.style.left = (t.clientX - 30) + 'px';
    ghost.style.top = (t.clientY - 15) + 'px';
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchend', function(e) {
    if (!ghost) return;
    const t = e.changedTouches[0];
    ghost.remove();
    ghost = null;
    const fieldEl = document.getElementById('field-drop');
    if (fieldEl) {
      const rect = fieldEl.getBoundingClientRect();
      if (t.clientX >= rect.left && t.clientX <= rect.right && t.clientY >= rect.top && t.clientY <= rect.bottom) {
        dropOnField({ preventDefault:()=>{}, clientX: t.clientX, clientY: t.clientY });
        return;
      }
    }
    dragState.team = null;
    dragState.index = undefined;
  });
}

// =============================================
// PREVIEW
// =============================================
function renderPreview() {
  const el = document.getElementById('view-preview');
  let html = `<div class="no-print" style="margin-bottom:16px; display:flex; gap:8px; align-items:center;">
    <select id="preview-select" onchange="renderPreviewContent()">
      <option value="">Select matchup...</option>
      ${state.matchups.map(m => `<option value="${m.id}" ${m.id===state.ui.currentId?'selected':''}>${esc(m.title)} - ${esc(m.home.name)} vs ${esc(m.away.name)}</option>`).join('')}
    </select>
    <button class="btn btn-primary" onclick="window.print()">Print</button>
  </div>
  <div id="preview-content"></div>`;
  el.innerHTML = html;
  renderPreviewContent();
}

function renderPreviewContent() {
  const matchId = document.getElementById('preview-select').value;
  const m = state.matchups.find(mu => mu.id === matchId);
  const content = document.getElementById('preview-content');
  if (!m) { content.innerHTML = '<p style="color:#889;">Select a matchup to preview.</p>'; return; }

  const hc = getTeamColors(m, 'home');
  const ac = getTeamColors(m, 'away');

  let html = `<div class="output-wrap">
    <div class="output-title"><h3>${esc(m.home.name)} vs ${esc(m.away.name)}</h3></div>`;

  // Home pos bar (top)
  html += `<div class="out-pos-bar">${m.homePosBar.map(s => `<div class="pos-seg" style="background:${esc(hc.barBg)};color:${esc(hc.barText)};">${esc(s)}</div>`).join('')}</div>`;

  // Field
  html += `<div class="output-field">${fieldSVG()}`;

  m.home.players.forEach(p => {
    const nameHtml = p.name ? `<span class="out-name">${esc(p.name)}</span>` : '';
    html += `<div class="out-player" style="left:${p.x}%;top:${p.y}%;">
      <div class="out-label" style="background:${esc(hc.chipBg)};color:${esc(hc.chipText)};border-color:${esc(hc.chipBorder)};">${esc(p.pos)}${nameHtml}</div>
    </div>`;
  });

  m.away.players.forEach(p => {
    const nameHtml = p.name ? `<span class="out-name">${esc(p.name)}</span>` : '';
    html += `<div class="out-player" style="left:${p.x}%;top:${p.y}%;">
      <div class="out-label" style="background:${esc(ac.chipBg)};color:${esc(ac.chipText)};border-color:${esc(ac.chipBorder)};">${esc(p.pos)}${nameHtml}</div>
    </div>`;
  });

  html += `</div>`;

  // Away pos bar (bottom)
  html += `<div class="out-pos-bar">${m.awayPosBar.map(s => `<div class="pos-seg" style="background:${esc(ac.barBg)};color:${esc(ac.barText)};">${esc(s)}</div>`).join('')}</div>`;

  html += `</div>`;
  content.innerHTML = html;
}

// =============================================
// INIT
// =============================================
load();

// One-time migration: fix away team L↔R positions from old data
if (!state._migratedLR) {
  const LR_SWAP = { LH:'RH', RH:'LH', LB:'RB', RB:'LB', LM:'RM', RM:'LM', LS:'RS', RS:'LS' };
  state.matchups.forEach(m => {
    m.away.players.forEach(p => {
      if (LR_SWAP[p.pos]) p.pos = LR_SWAP[p.pos];
    });
  });
  state._migratedLR = true;
  save();
}

if (state.ui.view) showView(state.ui.view);
else showView('list');

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
