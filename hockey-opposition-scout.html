<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#d4a843">
<link rel="manifest" href="manifest.json">
<title>Opposition Scout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', -apple-system, Arial, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }

nav { background: #16213e; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #0f3460; flex-wrap: wrap; }
nav .logo { font-weight: 900; font-size: 18px; padding: 14px 0; margin-right: 30px; color: #d4a843; letter-spacing: 1px; }
nav button { background: none; border: none; color: #8899aa; font-size: 14px; padding: 14px 18px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; }
nav button:hover { color: #fff; }
nav button.active { color: #fff; border-bottom-color: #d4a843; }

.view { display: none; padding: 24px; max-width: 1400px; margin: 0 auto; }
.view.active { display: block; }

h2 { font-size: 22px; margin-bottom: 16px; color: #d4a843; }
.btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .2s; }
.btn-primary { background: #d4a843; color: #000; }
.btn-primary:hover { background: #e6bc5a; }
.btn-secondary { background: #0f3460; color: #fff; }
.btn-secondary:hover { background: #1a4a8a; }
.btn-danger { background: #722; color: #fff; }
.btn-danger:hover { background: #933; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
input, select, textarea { padding: 6px 10px; border: 1px solid #334; border-radius: 4px; background: #0d1b2a; color: #fff; font-size: 13px; font-family: inherit; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #d4a843; }
textarea { resize: vertical; min-height: 80px; width: 100%; }
label { font-size: 13px; color: #99a; display: block; margin-bottom: 4px; }
.toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.section { background: #16213e; border: 1px solid #334; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
.section h3 { color: #d4a843; margin-bottom: 12px; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }
.form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; align-items: flex-end; }
.form-group { display: flex; flex-direction: column; flex: 1; min-width: 140px; }

/* Team cards */
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
.team-card { background: #16213e; border: 1px solid #334; border-radius: 6px; padding: 16px; cursor: pointer; transition: all .2s; }
.team-card:hover { border-color: #d4a843; transform: translateY(-2px); }
.team-card h4 { color: #fff; font-size: 16px; margin-bottom: 4px; }
.team-card .meta { color: #889; font-size: 12px; margin-bottom: 8px; }
.team-card .stats { display: flex; gap: 12px; font-size: 11px; color: #667; }
.team-card .stats span { display: flex; align-items: center; gap: 4px; }

/* Threat badges */
.threat { display: inline-block; padding: 3px 10px; border-radius: 3px; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
.threat-low { background: #2a5a2a; color: #8fc; }
.threat-medium { background: #5a4a1a; color: #fc0; }
.threat-high { background: #5a2a2a; color: #f88; }
.threat-elite { background: #8b0000; color: #fcc; }

/* Profile tabs */
.profile-tabs { display: flex; gap: 0; margin-bottom: 16px; background: #0d1b2a; border-radius: 6px; overflow: hidden; border: 1px solid #334; }
.profile-tab { flex: 1; padding: 10px 0; text-align: center; font-size: 13px; font-weight: 700; cursor: pointer; border: none; background: transparent; color: #667; transition: all .2s; letter-spacing: 1px; }
.profile-tab:hover { color: #aaa; background: #16213e; }
.profile-tab.active { background: #d4a843; color: #000; }
.profile-tab + .profile-tab { border-left: 1px solid #334; }
.ptab { display: none; }
.ptab.active { display: block; }

/* Dossier player cards */
.dossier-category { margin-bottom: 20px; }
.dossier-category-label { font-size: 11px; font-weight: 700; letter-spacing: 3px; color: #d4a843; text-transform: uppercase; padding-bottom: 6px; border-bottom: 2px solid #d4a843; margin-bottom: 10px; }
.dossier-card { background: #0d1b2a; border-left: 3px solid #d4a843; border-radius: 0 4px 4px 0; margin-bottom: 10px; overflow: hidden; }
.dossier-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #111a2e; flex-wrap: wrap; gap: 8px; }
.dossier-id { display: flex; align-items: baseline; gap: 10px; }
.dossier-jersey { font-size: 20px; font-weight: 900; color: #d4a843; }
.dossier-name { font-size: 15px; font-weight: 700; color: #fff; }
.dossier-nickname { font-size: 12px; color: #889; font-style: italic; margin-left: 6px; }
.dossier-position { font-size: 11px; font-weight: 700; color: #667; letter-spacing: 1px; text-transform: uppercase; }
.dossier-body { padding: 12px 14px; }
.dossier-row { display: flex; gap: 12px; margin-bottom: 8px; }
.dossier-panel { flex: 1; padding: 8px 10px; border-radius: 3px; }
.dossier-panel.threat-panel { background: rgba(231,76,60,.12); border-left: 2px solid #e74c3c; }
.dossier-panel.counter-panel { background: rgba(74,140,63,.12); border-left: 2px solid #4a8c3f; }
.dossier-panel-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
.dossier-panel.threat-panel .dossier-panel-label { color: #e74c3c; }
.dossier-panel.counter-panel .dossier-panel-label { color: #4a8c3f; }
.dossier-panel-text { font-size: 12px; color: #ccc; line-height: 1.5; }
.dossier-stars { color: #d4a843; font-size: 14px; margin-top: 4px; }
.dossier-actions { display: flex; gap: 6px; }

/* Hockey field for formation */
.field-wrap { position: relative; width: 100%; max-width: 800px; aspect-ratio: 1.5 / 1; background: #4a8c3f; overflow: hidden; border: 3px solid #2d6627; border-radius: 4px; margin-bottom: 16px; }
.field-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
.formation-marker { position: absolute; transform: translate(-50%, -50%); background: #fff; color: #111; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 3px; white-space: nowrap; box-shadow: 0 2px 6px rgba(0,0,0,.4); text-align: center; min-width: 50px; border: 2px solid #fff; pointer-events: none; }

/* Attack pattern items */
.pattern-item { background: #0d1b2a; border-left: 3px solid #d4a843; padding: 12px 14px; border-radius: 0 4px 4px 0; margin-bottom: 8px; }
.pattern-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
.pattern-name { font-weight: 700; color: #d4a843; font-size: 14px; }
.pattern-badges { display: flex; gap: 6px; }
.pattern-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px; letter-spacing: .5px; }
.pattern-desc { font-size: 12px; color: #bbb; margin-bottom: 4px; line-height: 1.5; }
.pattern-meta { font-size: 11px; color: #667; }

/* PC routine items */
.pc-item { background: #0d1b2a; border-left: 3px solid #c0392b; padding: 12px 14px; border-radius: 0 4px 4px 0; margin-bottom: 8px; }
.pc-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
.pc-name { font-weight: 700; color: #e74c3c; font-size: 14px; }

/* Weakness items */
.weakness-item { background: #0d1b2a; padding: 12px 14px; border-radius: 4px; margin-bottom: 8px; }
.weakness-item.priority-high { border-left: 3px solid #e74c3c; }
.weakness-item.priority-medium { border-left: 3px solid #f39c12; }
.weakness-item.priority-low { border-left: 3px solid #4a8c3f; }
.weakness-title { font-weight: 700; color: #fff; font-size: 14px; margin-bottom: 4px; }
.weakness-desc { font-size: 12px; color: #bbb; margin-bottom: 6px; line-height: 1.5; }
.weakness-tactic { font-size: 12px; color: #4a8c3f; font-style: italic; line-height: 1.5; }

/* Scouting */
.scout-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.scout-tag { padding: 6px 12px; border: 1px solid #334; border-radius: 4px; background: #0d1b2a; color: #889; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
.scout-tag:hover { border-color: #d4a843; color: #d4a843; }
.scout-tag.active { background: #d4a843; color: #000; border-color: #d4a843; }
.scout-entry { background: #0d1b2a; border-left: 3px solid #d4a843; padding: 10px 14px; border-radius: 0 4px 4px 0; margin-bottom: 8px; }
.scout-entry-tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px; background: #d4a843; color: #000; margin-bottom: 4px; letter-spacing: .5px; }
.scout-entry-time { font-size: 11px; color: #667; margin-bottom: 4px; }
.scout-entry-text { font-size: 13px; color: #ccc; line-height: 1.5; }
.scout-entry .btn { margin-top: 6px; }

/* Match log */
.match-entry { background: #16213e; border: 1px solid #334; border-radius: 6px; padding: 16px; margin-bottom: 10px; }
.match-score { font-size: 24px; font-weight: 900; color: #d4a843; }
.match-result-w { color: #4a8c3f; }
.match-result-l { color: #e74c3c; }
.match-result-d { color: #f39c12; }

/* Pre-Match Brief output */
.brief-output { background: #1e1e1e; color: #c8c8c8; max-width: 960px; margin: 0 auto; overflow: hidden; }
.brief-output * { color: #c8c8c8; }
.brief-banner { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; background: #1a1a1a; border-bottom: 3px solid #d4a843; }
.brief-banner .team-name { font-size: 16px; font-weight: 900; letter-spacing: 4px; color: #d4a843 !important; text-transform: uppercase; }
.brief-banner .doc-type { font-size: 12px; letter-spacing: 3px; color: #888 !important; text-transform: uppercase; }
.brief-info-bar { display: flex; padding: 16px 24px; background: #1e1e1e; border-bottom: 1px solid #333; }
.brief-info-item { flex: 1; padding: 0 16px; border-right: 1px solid #333; }
.brief-info-item:last-child { border-right: none; }
.brief-info-label { font-size: 10px; font-weight: 700; letter-spacing: 3px; color: #d4a843 !important; text-transform: uppercase; margin-bottom: 4px; }
.brief-info-value { font-size: 15px; color: #fff !important; font-weight: 600; }
.brief-body { padding: 20px 24px; }
.brief-section-hdr { font-size: 12px; font-weight: 700; letter-spacing: 4px; color: #d4a843 !important; text-transform: uppercase; margin: 20px 0 12px; padding-bottom: 6px; border-bottom: 2px solid #d4a843; }
.brief-player-row { margin-bottom: 12px; padding-left: 12px; border-left: 2px solid rgba(212,168,67,.3); }
.brief-player-name { font-weight: 700; color: #d4a843 !important; font-size: 14px; }
.brief-threat-text { color: #e74c3c !important; font-size: 13px; margin-top: 2px; }
.brief-counter-text { color: #4a8c3f !important; font-size: 13px; font-style: italic; margin-top: 2px; }
.brief-pattern-row { margin-bottom: 10px; padding-left: 12px; }
.brief-weakness-row { margin-bottom: 10px; padding: 10px 12px; background: #252525; border-left: 3px solid #e74c3c; }
.brief-weakness-row .exploit { color: #4a8c3f !important; font-style: italic; margin-top: 4px; }
.brief-priority-section { margin: 20px 0; padding: 16px; border: 1px solid #d4a843; border-top: 3px solid #d4a843; }
.brief-priority-section h4 { color: #d4a843 !important; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
.brief-priority-item { display: flex; gap: 8px; margin-bottom: 6px; font-size: 14px; font-weight: 600; color: #fff !important; }
.brief-priority-num { color: #d4a843 !important; font-weight: 900; min-width: 24px; }
.brief-footer { display: flex; justify-content: space-between; padding: 16px 24px; border-top: 1px solid #333; }
.brief-footer .stamp { font-size: 11px; color: #c0392b !important; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
.brief-footer .date { font-size: 11px; color: #555 !important; }

/* Modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000; align-items: center; justify-content: center; }
.modal-bg.active { display: flex; }
.modal { background: #16213e; border: 2px solid #d4a843; border-radius: 6px; padding: 20px; max-width: 550px; width: 90%; max-height: 90vh; overflow-y: auto; }
.modal h3 { color: #d4a843; margin-bottom: 14px; font-size: 16px; letter-spacing: 1px; }
.modal .form-group { margin-bottom: 12px; }
.modal .form-group input, .modal .form-group select, .modal .form-group textarea { width: 100%; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

.empty-state { text-align: center; padding: 40px 20px; color: #667; }
.empty-state-icon { font-size: 40px; margin-bottom: 12px; }

@media print {
  body { background: #1e1e1e; }
  nav, .view:not(.print-target), .no-print, .toolbar { display: none !important; }
  .view.print-target { display: block !important; padding: 0; }
  .brief-output { border: none; margin: 0; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  @page { size: landscape; margin: 8mm; }
}
@media (max-width: 768px) {
  nav { padding: 0 10px; }
  nav .logo { font-size: 14px; margin-right: 10px; }
  nav button { font-size: 12px; padding: 10px 10px; }
  .view { padding: 12px; }
  .team-grid { grid-template-columns: 1fr; }
  .dossier-row { flex-direction: column; }
  .brief-info-bar { flex-direction: column; }
  .brief-info-item { border-right: none; border-bottom: 1px solid #333; padding: 8px 0; }
  .brief-info-item:last-child { border-bottom: none; }
  .profile-tabs { flex-wrap: wrap; }
  .profile-tab { min-width: 0; font-size: 11px; letter-spacing: 0; }
}
</style>
</head>
<body>

<nav>
  <span class="logo">OPPOSITION SCOUT</span>
  <button class="active" onclick="showView('teams')">Teams</button>
  <button onclick="showView('profile')">Profile</button>
  <button onclick="showView('scouting')">Scouting</button>
  <button onclick="showView('matchlog')">Match Log</button>
  <button onclick="showView('brief')">Pre-Match Brief</button>
  <button onclick="showView('data')">Data</button>
</nav>

<div id="view-teams" class="view active"></div>
<div id="view-profile" class="view"></div>
<div id="view-scouting" class="view"></div>
<div id="view-matchlog" class="view"></div>
<div id="view-brief" class="view"></div>
<div id="view-data" class="view"></div>

<!-- Modals -->
<div class="modal-bg" id="modal-team"><div class="modal" id="modal-team-inner"></div></div>
<div class="modal-bg" id="modal-player"><div class="modal" id="modal-player-inner"></div></div>
<div class="modal-bg" id="modal-pattern"><div class="modal" id="modal-pattern-inner"></div></div>
<div class="modal-bg" id="modal-pc"><div class="modal" id="modal-pc-inner"></div></div>
<div class="modal-bg" id="modal-pcdef"><div class="modal" id="modal-pcdef-inner"></div></div>
<div class="modal-bg" id="modal-weakness"><div class="modal" id="modal-weakness-inner"></div></div>
<div class="modal-bg" id="modal-match"><div class="modal" id="modal-match-inner"></div></div>

<script>
// ============================================
// DATA LAYER
// ============================================
const STORE = 'hockeyOppoScout';
const COMPETITIONS = ['FIH Pro League','Hockey World Cup','Olympic Games','Olympic Qualifiers','Nations Cup','Sultan Azlan Shah','Champions Trophy','Asian Games','Commonwealth Games','Test Series','Friendly','Other'];
const PLAYER_CATEGORIES = [
  { key: 'DIRECTORS', label: 'DIRECTORS', desc: 'Playmakers & Distributors', icon: '\u25C9' },
  { key: 'ASSASSINS', label: 'ASSASSINS', desc: 'Finishers & Goal Threats', icon: '\u2694' },
  { key: 'ENGINE', label: 'ENGINE ROOM', desc: 'Midfield & Tempo', icon: '\u2699' },
  { key: 'PRESS', label: 'PRESS TARGETS', desc: 'Weak Links to Exploit', icon: '\u26A0' }
];

let data = { teams: [] };
let currentTeamId = null;
let currentProfileTab = 'players';
let scoutTags = new Set();
let scoutFeed = [];

function save() { localStorage.setItem(STORE, JSON.stringify(data)); }
function load() { try { const r = localStorage.getItem(STORE); if (r) data = JSON.parse(r); if (!data.teams) data.teams = []; } catch(e) { data = { teams: [] }; } }
function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,6); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function team(id) { return data.teams.find(t => t.id === id); }
function saveTeam(t) { const i = data.teams.findIndex(x => x.id === t.id); if (i >= 0) data.teams[i] = t; else data.teams.push(t); t.lastScouted = new Date().toISOString(); save(); }

function newTeam() {
  return { id: uid(), name: '', country: '', competition: 'FIH Pro League', threatLevel: 'MEDIUM',
    lastScouted: null, players: [], attackPatterns: [], pcAttack: [], pcDefence: [], weaknesses: [],
    matches: [], formationType: '3-3', formationNotes: '', defensiveNotes: '',
    pressType: 'mixed', pressNotes: '', priorities: ['','','','',''] };
}

function fieldSVG() {
  return `<svg class="field-svg" viewBox="0 0 1000 690" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="996" height="686" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="3" rx="2"/>
    <line x1="500" y1="2" x2="500" y2="688" stroke="rgba(255,255,255,.6)" stroke-width="2"/>
    <line x1="250" y1="2" x2="250" y2="688" stroke="rgba(255,255,255,.35)" stroke-width="2" stroke-dasharray="10,8"/>
    <line x1="750" y1="2" x2="750" y2="688" stroke="rgba(255,255,255,.35)" stroke-width="2" stroke-dasharray="10,8"/>
    <path d="M 2 140 Q 220 345 2 550" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="2.5"/>
    <rect x="0" y="315" width="8" height="60" fill="rgba(255,255,255,.7)" rx="1"/>
    <path d="M 998 140 Q 780 345 998 550" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="2.5"/>
    <rect x="992" y="315" width="8" height="60" fill="rgba(255,255,255,.7)" rx="1"/>
    <circle cx="80" cy="345" r="4" fill="rgba(255,255,255,.5)"/>
    <circle cx="920" cy="345" r="4" fill="rgba(255,255,255,.5)"/>
  </svg>`;
}

const FORMATION_PRESETS = {
  '1-3-3-3': { positions: [
    { pos:'GK', x:5, y:50 },
    { pos:'LH', x:18, y:25 }, { pos:'CB', x:14, y:50 }, { pos:'RH', x:18, y:75 },
    { pos:'LM', x:34, y:25 }, { pos:'CM', x:30, y:50 }, { pos:'RM', x:34, y:75 },
    { pos:'LS', x:48, y:20 }, { pos:'CS', x:44, y:50 }, { pos:'RS', x:48, y:80 }
  ]},
  '1-4-3-3': { positions: [
    { pos:'GK', x:5, y:50 },
    { pos:'LH', x:22, y:18 }, { pos:'LB', x:16, y:38 }, { pos:'RB', x:16, y:62 }, { pos:'RH', x:22, y:82 },
    { pos:'LM', x:38, y:30 }, { pos:'CM', x:35, y:50 }, { pos:'RM', x:38, y:70 },
    { pos:'LS', x:52, y:20 }, { pos:'CS', x:48, y:50 }, { pos:'RS', x:52, y:80 }
  ]},
  '1-3-4-3': { positions: [
    { pos:'GK', x:5, y:50 },
    { pos:'LH', x:18, y:25 }, { pos:'CB', x:14, y:50 }, { pos:'RH', x:18, y:75 },
    { pos:'LM', x:34, y:18 }, { pos:'CM', x:30, y:40 }, { pos:'CM2', x:30, y:60 }, { pos:'RM', x:34, y:82 },
    { pos:'LS', x:50, y:20 }, { pos:'CS', x:46, y:50 }, { pos:'RS', x:50, y:80 }
  ]},
  '1-4-4-2': { positions: [
    { pos:'GK', x:5, y:50 },
    { pos:'LH', x:20, y:15 }, { pos:'LB', x:16, y:38 }, { pos:'RB', x:16, y:62 }, { pos:'RH', x:20, y:85 },
    { pos:'LM', x:36, y:18 }, { pos:'CM', x:33, y:40 }, { pos:'CM2', x:33, y:60 }, { pos:'RM', x:36, y:82 },
    { pos:'LS', x:50, y:35 }, { pos:'RS', x:50, y:65 }
  ]}
};

// ============================================
// VIEW SWITCHING
// ============================================
function showView(name) {
  document.querySelectorAll('.view').forEach(v => { v.classList.remove('active'); v.classList.remove('print-target'); });
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => { if (b.textContent.toLowerCase().replace(/[\s-]/g,'').includes(name.replace(/[\s-]/g,''))) b.classList.add('active'); });
  if (name === 'teams') renderTeams();
  if (name === 'profile') renderProfile();
  if (name === 'scouting') renderScouting();
  if (name === 'matchlog') renderMatchLog();
  if (name === 'brief') renderBrief();
  if (name === 'data') renderData();
}

// ============================================
// VIEW: TEAMS
// ============================================
function renderTeams() {
  const el = document.getElementById('view-teams');
  const teams = data.teams.slice();

  el.innerHTML = `
    <div class="toolbar" style="justify-content:space-between;">
      <h2>Opposition Teams</h2>
      <button class="btn btn-primary" onclick="openTeamModal()">+ New Team</button>
    </div>
    <div class="toolbar">
      <div class="form-group" style="flex:0 0 auto; min-width: 160px;">
        <label>Competition</label>
        <select id="filter-comp" onchange="renderTeams()">
          <option value="">All</option>
          ${COMPETITIONS.map(c => '<option value="'+esc(c)+'">'+esc(c)+'</option>').join('')}
        </select>
      </div>
      <div class="form-group" style="flex:0 0 auto; min-width: 140px;">
        <label>Sort By</label>
        <select id="sort-teams" onchange="renderTeams()">
          <option value="name">Name</option>
          <option value="date">Last Scouted</option>
          <option value="threat">Threat Level</option>
        </select>
      </div>
    </div>
    <div class="team-grid" id="teams-grid"></div>`;

  let filtered = teams;
  const fc = document.getElementById('filter-comp');
  if (fc && fc.value) filtered = filtered.filter(t => t.competition === fc.value);
  const sb = document.getElementById('sort-teams');
  const sort = sb ? sb.value : 'name';
  if (sort === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));
  if (sort === 'date') filtered.sort((a,b) => new Date(b.lastScouted||0) - new Date(a.lastScouted||0));
  if (sort === 'threat') { const o = {ELITE:0,HIGH:1,MEDIUM:2,LOW:3}; filtered.sort((a,b) => (o[a.threatLevel]||3) - (o[b.threatLevel]||3)); }

  const grid = document.getElementById('teams-grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">\uD83C\uDFD1</div><p>No teams yet. Add your first opposition team profile.</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(t => {
    const pc = (t.players||[]).length;
    const mc = (t.matches||[]).length;
    return `<div class="team-card" onclick="openTeamProfile('${t.id}')">
      <div style="display:flex;justify-content:space-between;align-items:start;gap:8px;">
        <div><h4>${esc(t.name)}</h4><div class="meta">${esc(t.country)} \u2022 ${esc(t.competition)}</div></div>

        <span>\uD83D\uDCCB ${mc} match${mc!==1?'es':''}</span>
        <span>\uD83D\uDD52 ${t.lastScouted ? new Date(t.lastScouted).toLocaleDateString() : 'Never'}</span>
      </div>
    </div>`;
  }).join('');
}

  });
  return `<div class="field-wrap">${fieldSVG()}${markers}</div>`;

function toggleScoutTag(el) { el.classList.toggle('active'); const tag = el.dataset.tag; if (el.classList.contains('active')) scoutTags.add(tag); else scoutTags.delete(tag); }
function insertMinute() { const m = document.getElementById('scout-minute').value; if (!m) return; const ta = document.getElementById('scout-notes'); ta.value += `[${m}'] `; ta.focus(); }

function addScoutEntry() {
  const text = document.getElementById('scout-notes').value.trim();
  if (!text) return alert('Write an observation first.');
  const tags = Array.from(scoutTags);
  if (tags.length === 0) tags.push('General');
  scoutFeed.push({ id: uid(), tags, text, time: new Date().toLocaleTimeString() });
  document.getElementById('scout-notes').value = '';
  renderScoutFeed();
}

function renderScoutFeed() {
  const el = document.getElementById('scout-feed');
  if (!el) return;
  if (scoutFeed.length === 0) { el.innerHTML = '<div style="color:#667;font-size:12px;">No observations recorded yet.</div>'; return; }

  el.innerHTML = scoutFeed.map(e => `<div class="scout-entry">
    <div>${e.tags.map(t => `<span class="scout-entry-tag">${esc(t)}</span>`).join(' ')}</div>
    <div class="scout-entry-time">${e.time}</div>
    <div class="scout-entry-text">${esc(e.text)}</div>
    <button class="btn btn-danger btn-sm" onclick="removeScoutEntry('${e.id}')" style="margin-top:6px;">Remove</button>
  </div>`).join('');
}

function removeScoutEntry(id) { scoutFeed = scoutFeed.filter(e => e.id !== id); renderScoutFeed(); }

function clearScoutFeed() { if (confirm('Clear all scouting entries?')) { scoutFeed = []; renderScoutFeed(); } }

function processScoutFeed() {
  const teamId = document.getElementById('scout-team').value;
  if (!teamId) return alert('Select a team first.');
  if (scoutFeed.length === 0) return alert('No entries to process.');

  const t = team(teamId);
  if (!t.attackPatterns) t.attackPatterns = [];
  if (!t.weaknesses) t.weaknesses = [];
  if (!t.pcAttack) t.pcAttack = [];
  if (!t.pcDefence) t.pcDefence = [];
  if (!t.matches) t.matches = [];

  let routed = { attack: 0, defence: 0, pc: 0, player: 0, weakness: 0, formation: 0, general: 0 };

  scoutFeed.forEach(entry => {
    const tags = entry.tags;

    // Route Attack Pattern observations
    if (tags.includes('Attack Pattern')) {
      t.attackPatterns.push({ id: uid(), name: 'Scouted Pattern', description: entry.text, players: '', frequency: 'Observed', danger: 3 });
      routed.attack++;
    }
    // Route Weakness observations
    if (tags.includes('Weakness')) {
      t.weaknesses.push({ id: uid(), title: 'Scouted Weakness', description: entry.text, tactic: '', priority: 'MEDIUM' });
      routed.weakness++;
    }
    // Route PC Routine observations
    if (tags.includes('PC Routine')) {
      t.pcAttack.push({ id: uid(), name: 'Scouted PC Routine', description: entry.text, personnel: '', lastSeen: document.getElementById('scout-date').value, effectiveness: 3 });
      routed.pc++;
    }
    // Route Key Player observations to match log with tag
    if (tags.includes('Key Player')) { routed.player++; }
    if (tags.includes('Defensive Shape')) { routed.defence++; }
    if (tags.includes('Formation Change')) { routed.formation++; }

    // Everything goes to match log
    t.matches.push({
      id: uid(), date: document.getElementById('scout-date').value,
      competition: document.getElementById('scout-comp').value,
      venue: document.getElementById('scout-venue').value,
      observations: entry.text, tags: entry.tags.join(', '),
      ourScore: 0, theirScore: 0, adjustments: '', reflections: ''
    });
    routed.general++;
  });

  saveTeam(t);
  const summary = [];
  if (routed.attack) summary.push(`${routed.attack} attack pattern(s)`);
  if (routed.weakness) summary.push(`${routed.weakness} weakness(es)`);
  if (routed.pc) summary.push(`${routed.pc} PC routine(s)`);
  summary.push(`${routed.general} entries to match log`);

  alert(`Processed & routed for ${t.name}:\n\u2022 ${summary.join('\n\u2022 ')}\n\nTip: Review routed items in the team profile to refine names and details.`);
  scoutFeed = [];
  scoutTags.clear();
  renderScoutFeed();
}

function renderMatchLog() {
  const el = document.getElementById('view-matchlog');
  const teamOpts = data.teams.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('');

  el.innerHTML = `
    <h2>Match Log</h2>
    <div class="toolbar">
      <div class="form-group" style="flex:0 0 auto;min-width:200px;">
        <label>Team</label>
        <select id="matchlog-team" onchange="renderMatchLogEntries()">${teamOpts.length?'<option value="">Select Team...</option>'+teamOpts:'<option value="">No teams</option>'}</select>
      </div>
      <button class="btn btn-primary" onclick="openMatchModal()">+ New Match Entry</button>
    </div>
    <div id="matchlog-entries"></div>`;

  renderMatchLogEntries();
}

function renderMatchLogEntries() {
  const el = document.getElementById('matchlog-entries');
  const tid = document.getElementById('matchlog-team').value;
  if (!tid) { el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">\uD83C\uDFD1</div><p>Select a team to view their match log.</p></div>'; return; }

  const t = team(tid);
  const matches = (t.matches||[]).filter(m => m.ourScore !== undefined || m.observations).sort((a,b) => new Date(b.date||0) - new Date(a.date||0));

  if (matches.length === 0) { el.innerHTML = '<div class="empty-state"><p>No match entries yet.</p></div>'; return; }

  el.innerHTML = matches.map(m => {
    const resultClass = m.ourScore > m.theirScore ? 'match-result-w' : m.ourScore < m.theirScore ? 'match-result-l' : 'match-result-d';
    const hasScore = m.ourScore !== undefined && m.theirScore !== undefined && (m.ourScore > 0 || m.theirScore > 0);
    return `<div class="match-entry">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px;">
        <div>
          <div style="color:#d4a843;font-weight:700;">${m.date||'No date'}</div>
          <div style="color:#889;font-size:12px;">${esc(m.competition)} \u2022 ${esc(m.venue)}</div>
        </div>
        ${hasScore ? `<div class="match-score ${resultClass}">${m.ourScore} - ${m.theirScore}</div>` : ''}
      </div>
      ${m.tags ? `<div style="margin-bottom:6px;">${m.tags.split(',').map(t => `<span class="scout-entry-tag" style="margin-right:4px;">${esc(t.trim())}</span>`).join('')}</div>` : ''}
      <div style="font-size:13px;color:#ccc;line-height:1.6;margin-bottom:6px;">${esc(m.observations)}</div>
      ${m.adjustments ? `<div style="font-size:12px;color:#4a8c3f;margin-bottom:4px;"><strong>Adjustments:</strong> ${esc(m.adjustments)}</div>` : ''}
      ${m.reflections ? `<div style="font-size:12px;color:#d4a843;"><strong>Reflections:</strong> ${esc(m.reflections)}</div>` : ''}
      <div style="margin-top:8px;display:flex;gap:6px;">
        <button class="btn btn-secondary btn-sm" onclick="openMatchModal('${m.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteMatch('${m.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function deleteMatch(id) {
  if (!confirm('Delete this match entry?')) return;
  const tid = document.getElementById('matchlog-team').value;
  const t = team(tid);
  t.matches = (t.matches||[]).filter(m => m.id !== id);
  saveTeam(t);
  renderMatchLogEntries();
}

function renderBrief() {
  const el = document.getElementById('view-brief');
  const teamOpts = data.teams.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('');

  el.innerHTML = `

      <button class="btn btn-primary" onclick="printBrief()">Print Brief</button>

    <div id="brief-priorities-editor" class="section no-print" style="display:none;">

      <button class="btn btn-primary btn-sm" onclick="savePriorities()" style="margin-top:8px;">Save Priorities</button>
    </div>

}

function generateBrief() {
  const tid = document.getElementById('brief-team').value;
  const container = document.getElementById('brief-container');
  const prioEditor = document.getElementById('brief-priorities-editor');

  if (!tid) { container.innerHTML = ''; prioEditor.style.display = 'none'; return; }

  const t = team(tid);
  if (!t.priorities) t.priorities = ['','','','',''];

  // Show priorities editor
  prioEditor.style.display = 'block';
  document.getElementById('priorities-inputs').innerHTML = t.priorities.map((p,i) =>
    `<div class="form-row" style="margin-bottom:6px;">
      <span style="color:#d4a843;font-weight:900;font-size:16px;min-width:24px;">${i+1}.</span>
      <input type="text" id="priority-${i}" value="${esc(p)}" placeholder="Priority ${i+1}..." style="flex:1;">
    </div>`
  ).join('');

  // Build brief output
  const threatPlayers = (t.players||[]).filter(p => ['DIRECTORS','ASSASSINS'].includes(p.category));
  const pressPlayers = (t.players||[]).filter(p => p.category === 'PRESS');
  const enginePlayers = (t.players||[]).filter(p => p.category === 'ENGINE');
  const dangerPatterns = (t.attackPatterns||[]).filter(p => p.danger >= 3).sort((a,b) => b.danger - a.danger);
  const highWeaknesses = (t.weaknesses||[]).filter(w => w.priority === 'HIGH');
  const allWeaknesses = (t.weaknesses||[]).filter(w => w.priority !== 'HIGH');
  const pcAtk = t.pcAttack || [];
  const pcDef = t.pcDefence || [];
  const priorities = (t.priorities||[]).filter(p => p.trim());

  let html = `<div class="brief-output">
    <div class="brief-banner">
      <span class="team-name">\uD83C\uDFD1 Opposition Brief \u2014 ${esc(t.name)}</span>
      <span class="doc-type">${esc(t.competition)}</span>
    </div>
    <div class="brief-info-bar">
      <div class="brief-info-item"><div class="brief-info-label">Country</div><div class="brief-info-value">${esc(t.country)}</div></div>
      <div class="brief-info-item"><div class="brief-info-label">Threat Level</div><div class="brief-info-value"><span class="threat threat-${t.threatLevel.toLowerCase()}" style="font-size:13px;">${t.threatLevel}</span></div></div>
      <div class="brief-info-item"><div class="brief-info-label">Formation</div><div class="brief-info-value">${esc(t.formationType||'Unknown')}</div></div>
      <div class="brief-info-item"><div class="brief-info-label">Press</div><div class="brief-info-value">${esc(t.pressType||'Unknown')}</div></div>
    </div>
    <div class="brief-body">`;

  // Formation & Structure
  if (t.formationNotes) {
    html += `<div class="brief-section-hdr">Formation & Structure</div>
      <div style="font-size:13px;color:#ccc;line-height:1.7;margin-bottom:12px;">${esc(t.formationNotes)}</div>`;
  }

  // Key Threats
  html += '<div class="brief-section-hdr">Key Threats</div>';
  if (threatPlayers.length > 0) {
    threatPlayers.forEach(p => {
      html += `<div class="brief-player-row">
        <div class="brief-player-name">#${p.jersey} ${esc(p.name)} \u2014 "${esc(p.nickname)}" (${esc(p.position)}) ${'\u2605'.repeat(p.form||0)}</div>
        <div class="brief-threat-text">THREAT: ${esc(p.threat)}</div>
        <div class="brief-counter-text">COUNTER: ${esc(p.counter)}</div>
      </div>`;
    });
  } else { html += '<div style="color:#888;font-size:13px;">No threat players documented.</div>'; }

  // Engine Room
  if (enginePlayers.length > 0) {
    html += '<div class="brief-section-hdr">Engine Room</div>';
    enginePlayers.forEach(p => {
      html += `<div class="brief-player-row">
        <div class="brief-player-name">#${p.jersey} ${esc(p.name)} \u2014 "${esc(p.nickname)}" (${esc(p.position)})</div>
        <div class="brief-threat-text">ROLE: ${esc(p.threat)}</div>
        <div class="brief-counter-text">DISRUPT: ${esc(p.counter)}</div>
      </div>`;
    });
  }

  // Press Targets
  if (pressPlayers.length > 0) {
    html += '<div class="brief-section-hdr">Press Targets</div>';
    pressPlayers.forEach(p => {
      html += `<div class="brief-player-row">
        <div class="brief-player-name">#${p.jersey} ${esc(p.name)} (${esc(p.position)})</div>
        <div class="brief-counter-text">EXPLOIT: ${esc(p.counter)}</div>
      </div>`;
    });
  }

  // Attack Patterns
  if (dangerPatterns.length > 0) {
    html += '<div class="brief-section-hdr">Attacking Patterns</div>';
    dangerPatterns.forEach(p => {
      html += `<div class="brief-pattern-row">
        <div style="font-weight:700;color:#d4a843 !important;font-size:14px;">${esc(p.name)} <span style="color:#e74c3c !important;">(Danger ${p.danger}/5, ${esc(p.frequency)})</span></div>
        <div style="font-size:13px;color:#ccc;margin-top:2px;">${esc(p.description)}</div>
        <div style="font-size:12px;color:#888;margin-top:2px;">Key players: ${esc(p.players)}</div>
      </div>`;
    });
  }

  // Set Pieces
  html += '<div class="brief-section-hdr">Set Pieces</div>';
  html += '<div style="font-weight:700;color:#e74c3c !important;font-size:13px;margin-bottom:6px;">PC ATTACK ROUTINES (THEIR CORNERS)</div>';
  if (pcAtk.length > 0) {
    pcAtk.forEach(r => { html += `<div style="padding-left:12px;margin-bottom:6px;font-size:13px;color:#ccc;">\u2022 <strong style="color:#d4a843 !important;">${esc(r.name)}</strong>: ${esc(r.description)} <span style="color:#888;">(Eff: ${r.effectiveness}/5)</span></div>`; });
  } else { html += '<div style="padding-left:12px;font-size:13px;color:#888;">No PC attack routines documented.</div>'; }

  html += '<div style="font-weight:700;color:#4a8c3f !important;font-size:13px;margin:12px 0 6px;">PC DEFENCE (HOW THEY DEFEND OUR CORNERS)</div>';
  if (pcDef.length > 0) {
    pcDef.forEach(r => { html += `<div style="padding-left:12px;margin-bottom:6px;font-size:13px;color:#ccc;">\u2022 <strong style="color:#d4a843 !important;">${esc(r.name)}</strong>: ${esc(r.description)} <span style="color:#888;">(Eff: ${r.effectiveness}/5)</span></div>`; });
  } else { html += '<div style="padding-left:12px;font-size:13px;color:#888;">No PC defence routines documented.</div>'; }

  // Weaknesses
  if (highWeaknesses.length > 0 || allWeaknesses.length > 0) {
    html += '<div class="brief-section-hdr">Weaknesses to Exploit</div>';
    highWeaknesses.forEach(w => {
      html += `<div class="brief-weakness-row">
        <div style="font-weight:700;color:#e74c3c !important;font-size:13px;">\u26A0 ${esc(w.title)}</div>
        <div style="font-size:13px;color:#ccc;margin-top:4px;">${esc(w.description)}</div>
        <div class="exploit">\u2192 EXPLOIT: ${esc(w.tactic)}</div>
      </div>`;
    });
    allWeaknesses.forEach(w => {
      html += `<div style="padding-left:12px;margin-bottom:8px;font-size:13px;color:#ccc;">
        <strong style="color:#f39c12 !important;">${esc(w.title)}</strong>: ${esc(w.description)}
        <div style="color:#4a8c3f !important;font-style:italic;margin-top:2px;">\u2192 ${esc(w.tactic)}</div>
      </div>`;
    });
  }

  // Pressing Profile
  if (t.pressNotes) {
    html += `<div class="brief-section-hdr">Pressing Profile</div>
      <div style="font-size:13px;color:#ccc;line-height:1.7;"><strong style="color:#d4a843 !important;">Type:</strong> ${esc(t.pressType)}<br>${esc(t.pressNotes)}</div>`;
  }

  // Defensive Structure
  if (t.defensiveNotes) {
    html += `<div class="brief-section-hdr">Defensive Structure</div>
      <div style="font-size:13px;color:#ccc;line-height:1.7;">${esc(t.defensiveNotes)}</div>`;
  }

  // Tactical Priorities
  if (priorities.length > 0) {
    html += `<div class="brief-priority-section">
      <h4>Tactical Priorities \u2014 Team Meeting</h4>
      ${priorities.map((p,i) => `<div class="brief-priority-item"><span class="brief-priority-num">${i+1}.</span><span>${esc(p)}</span></div>`).join('')}
    </div>`;
  }

  html += `</div>
    <div class="brief-footer">
      <span class="stamp">\u26A0 Confidential \u2014 High Performance</span>
      <span class="date">Generated: ${new Date().toLocaleDateString()}</span>
    </div>
  </div>`;

  container.innerHTML = html;
}

function savePriorities() {
  const tid = document.getElementById('brief-team').value;
  if (!tid) return;
  const t = team(tid);
  t.priorities = [0,1,2,3,4].map(i => document.getElementById('priority-'+i).value);
  saveTeam(t);
  generateBrief();
  alert('Priorities saved.');
}

function printBrief() {
  const el = document.getElementById('view-brief');
  el.classList.add('print-target');
  window.print();
  setTimeout(() => el.classList.remove('print-target'), 500);
}

  const el = document.getElementById('view-data');
  const size = (JSON.stringify(data).length / 1024).toFixed(1);
  const teamOpts = data.teams.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('');

  el.innerHTML = `
    <h2>Data Management</h2>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;">
      <div class="section">
        <h3>Export Data</h3>
        <div class="form-group">
          <label>Export Type</label>
          <select id="export-type" onchange="document.getElementById('export-team-wrap').style.display=this.value==='single'?'block':'none'">
            <option value="all">All Teams</option>
            <option value="single">Single Team</option>
          </select>
        </div>
        <div id="export-team-wrap" style="display:none;" class="form-group">
          <label>Select Team</label>
          <select id="export-team">${teamOpts}</select>
        </div>
        <button class="btn btn-primary" onclick="exportData()">Export JSON</button>
      </div>
      <div class="section">
        <h3>Import Data</h3>
        <div class="form-group">
          <input type="file" id="import-file" accept=".json">
        </div>
        <button class="btn btn-primary" onclick="importData()">Import</button>
      </div>
      <div class="section">
        <h3>Storage Info</h3>
        <p style="color:#ccc;margin-bottom:4px;">Teams: <strong style="color:#d4a843;">${data.teams.length}</strong></p>
        <p style="color:#ccc;margin-bottom:12px;">Size: <strong style="color:#d4a843;">${size} KB</strong></p>
        <button class="btn btn-danger" onclick="clearAllData()">Clear All Data</button>
      </div>
    </div>`;
}

function exportData() {
  const type = document.getElementById('export-type').value;
  let exportObj, filename;
  if (type === 'single') {
    const tid = document.getElementById('export-team').value;
    const t = team(tid);
    exportObj = { teams: [t] };
    filename = `oppo-scout-${t.name.replace(/\s+/g,'-')}-${new Date().toISOString().split('T')[0]}.json`;
  } else {
    exportObj = data;
    filename = `oppo-scout-all-${new Date().toISOString().split('T')[0]}.json`;
  }
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}

function importData() {
  const file = document.getElementById('import-file').files[0];
  if (!file) return alert('Select a file.');
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imp = JSON.parse(e.target.result);
      if (!imp.teams || !Array.isArray(imp.teams)) return alert('Invalid file format.');
      const newTeams = imp.teams.filter(t => !data.teams.find(x => x.id === t.id));
      data.teams.push(...newTeams);
      save();
      alert(`Imported ${newTeams.length} new team(s).`);
      renderData();
    } catch(err) { alert('Error: ' + err.message); }
  };
  reader.readAsText(file);
}

function clearAllData() {
  if (!confirm('Delete ALL opposition data? Cannot be undone.')) return;
  if (!confirm('Are you sure? This is permanent.')) return;
  localStorage.removeItem(STORE);
  data = { teams: [] };
  showView('teams');
}

  saveTeam(t); closeModal('modal-pattern'); renderPatternsList();
}

function deletePattern(id) {
  if (!confirm('Delete this pattern?')) return;
  const t = team(currentTeamId); t.attackPatterns = (t.attackPatterns||[]).filter(p => p.id !== id); saveTeam(t); renderPatternsList();
}

// -- PC Modal (Attack & Defence) --
let editingPCId = null;
let editingPCType = 'attack';

function openPCModal(type, pcId) {
  editingPCType = type;
  editingPCId = pcId || null;
  const t = team(currentTeamId);
  const list = type === 'attack' ? (t.pcAttack||[]) : (t.pcDefence||[]);
  const p = editingPCId ? list.find(x => x.id === editingPCId) : null;
  const label = type === 'attack' ? 'PC Attack Routine' : 'PC Defence Routine';

  document.getElementById('modal-pc-inner').innerHTML = `
    <h3>${p ? 'Edit' : 'Add'} ${label}</h3>
    <div class="form-group"><label>Routine Name</label><input type="text" id="mpc-name" value="${p?esc(p.name):''}"></div>
    <div class="form-group"><label>Description</label><textarea id="mpc-desc" placeholder="${type==='attack'?'Describe execution: injector, receiver, finish...':'Describe defensive setup: positioning, rushers, strategy...'}">${p?esc(p.description):''}</textarea></div>
    <div class="form-group"><label>Key Personnel</label><input type="text" id="mpc-personnel" value="${p?esc(p.personnel):''}" placeholder="Comma-separated"></div>
    <div class="form-row">
      <div class="form-group"><label>Last Seen</label><input type="date" id="mpc-date" value="${p?p.lastSeen:new Date().toISOString().split('T')[0]}"></div>
      <div class="form-group"><label>Effectiveness (1-5)</label><input type="number" id="mpc-eff" min="1" max="5" value="${p?p.effectiveness:3}"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-pc')">Cancel</button>
      <button class="btn btn-primary" onclick="savePC()">Save</button>
    </div>`;
  openModal('modal-pc');
}

function savePC() {
  const t = team(currentTeamId);
  const key = editingPCType === 'attack' ? 'pcAttack' : 'pcDefence';
  if (!t[key]) t[key] = [];
  const pd = {
    id: editingPCId || uid(),
    name: document.getElementById('mpc-name').value, description: document.getElementById('mpc-desc').value,
    personnel: document.getElementById('mpc-personnel').value, lastSeen: document.getElementById('mpc-date').value,
    effectiveness: parseInt(document.getElementById('mpc-eff').value)||3
  };
  if (editingPCId) { const i = t[key].findIndex(x => x.id === editingPCId); if (i >= 0) t[key][i] = pd; }
  else t[key].push(pd);
  saveTeam(t); closeModal('modal-pc'); renderPCList(editingPCType);
}

function deletePC(type, id) {
  if (!confirm('Delete this routine?')) return;
  const t = team(currentTeamId);
  const key = type === 'attack' ? 'pcAttack' : 'pcDefence';
  t[key] = (t[key]||[]).filter(x => x.id !== id);
  saveTeam(t); renderPCList(type);
}

// -- Weakness Modal --
let editingWeaknessId = null;

function openWeaknessModal(wId) {
  editingWeaknessId = wId || null;
  const t = team(currentTeamId);
  const w = editingWeaknessId ? (t.weaknesses||[]).find(x => x.id === editingWeaknessId) : null;

  document.getElementById('modal-weakness-inner').innerHTML = `
    <h3>${w ? 'Edit' : 'Add'} Weakness</h3>
    <div class="form-group"><label>Title</label><input type="text" id="mw-title" value="${w?esc(w.title):''}"></div>
    <div class="form-group"><label>Description</label><textarea id="mw-desc">${w?esc(w.description):''}</textarea></div>
    <div class="form-group"><label>Tactical Recommendation</label><textarea id="mw-tactic" placeholder="How should we exploit this?">${w?esc(w.tactic):''}</textarea></div>
    <div class="form-group"><label>Priority</label><select id="mw-priority">
      ${['HIGH','MEDIUM','LOW'].map(p => `<option ${w&&w.priority===p?'selected':''}>${p}</option>`).join('')}
    </select></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-weakness')">Cancel</button>
      <button class="btn btn-primary" onclick="saveWeakness()">Save</button>
    </div>`;
  openModal('modal-weakness');
}

function saveWeakness() {
  const t = team(currentTeamId);
  if (!t.weaknesses) t.weaknesses = [];
  const wd = {
    id: editingWeaknessId || uid(),
    title: document.getElementById('mw-title').value, description: document.getElementById('mw-desc').value,
    tactic: document.getElementById('mw-tactic').value, priority: document.getElementById('mw-priority').value
  };
  if (editingWeaknessId) { const i = t.weaknesses.findIndex(x => x.id === editingWeaknessId); if (i >= 0) t.weaknesses[i] = wd; }
  else t.weaknesses.push(wd);
  saveTeam(t); closeModal('modal-weakness'); renderWeaknessesTab();
}

function deleteWeakness(id) {
  if (!confirm('Delete this weakness?')) return;
  const t = team(currentTeamId); t.weaknesses = (t.weaknesses||[]).filter(w => w.id !== id); saveTeam(t); renderWeaknessesTab();
}

// -- Match Modal --
let editingMatchId = null;

function openMatchModal(matchId) {
  editingMatchId = matchId || null;
  const tid = document.getElementById('matchlog-team')?.value;
  const t = tid ? team(tid) : null;
  const m = editingMatchId && t ? (t.matches||[]).find(x => x.id === editingMatchId) : null;

  document.getElementById('modal-match-inner').innerHTML = `
    <h3>${m ? 'Edit' : 'New'} Match Entry</h3>
    <div class="form-group"><label>Match Date</label><input type="date" id="mm-date" value="${m?m.date:new Date().toISOString().split('T')[0]}"></div>
    <div class="form-group"><label>Competition</label><input type="text" id="mm-comp" value="${m?esc(m.competition):''}" placeholder="e.g. FIH Pro League"></div>
    <div class="form-row">
      <div class="form-group"><label>Our Score</label><input type="number" id="mm-ours" min="0" value="${m?m.ourScore:''}"></div>
      <div class="form-group"><label>Their Score</label><input type="number" id="mm-theirs" min="0" value="${m?m.theirScore:''}"></div>
    </div>
    <div class="form-group"><label>Venue</label><input type="text" id="mm-venue" value="${m?esc(m.venue):''}" placeholder="City/Stadium"></div>
    <div class="form-group"><label>Key Observations</label><textarea id="mm-obs">${m?esc(m.observations):''}</textarea></div>
    <div class="form-group"><label>Tactical Adjustments</label><textarea id="mm-adj">${m?esc(m.adjustments||''):''}</textarea></div>
    <div class="form-group"><label>What Worked / Didn't</label><textarea id="mm-ref">${m?esc(m.reflections||''):''}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-match')">Cancel</button>
      <button class="btn btn-primary" onclick="saveMatch()">Save</button>
    </div>`;
  openModal('modal-match');
}

function saveMatch() {
  const tid = document.getElementById('matchlog-team').value;
  if (!tid) return alert('Select a team first.');
  const t = team(tid);
  if (!t.matches) t.matches = [];
  const md = {
    id: editingMatchId || uid(),
    date: document.getElementById('mm-date').value, competition: document.getElementById('mm-comp').value,
    ourScore: parseInt(document.getElementById('mm-ours').value)||0, theirScore: parseInt(document.getElementById('mm-theirs').value)||0,
    venue: document.getElementById('mm-venue').value, observations: document.getElementById('mm-obs').value,
    adjustments: document.getElementById('mm-adj').value, reflections: document.getElementById('mm-ref').value
  };
  if (editingMatchId) { const i = t.matches.findIndex(x => x.id === editingMatchId); if (i >= 0) t.matches[i] = md; }
  else t.matches.push(md);
  saveTeam(t); closeModal('modal-match'); renderMatchLogEntries();
}

// ============================================
// INIT
// ============================================
load();
renderTeams();
</script>
</body>
</html>
