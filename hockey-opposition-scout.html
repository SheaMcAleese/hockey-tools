<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0d">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<title>Opposition Scout | HNZ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ============================================
   PALETTE — black & gold chrome, per-team accent
   ============================================ */
:root {
  --bg: #0a0a0d;
  --surface: #131318;
  --surface-2: #1a1a21;
  --surface-3: #22222c;
  --border: #2a2a34;
  --border-lite: #34343f;
  --gold: #d8b24a;
  --gold-bright: #ecc767;
  --gold-dim: #9a8038;
  --text: #f5f5f7;
  --text-2: #c6c6cf;
  --muted: #8b8b98;
  --faint: #5b5b67;
  --danger: #e0574a;
  --green: #55b25b;
  /* country accent — reassigned per team by applyTeamTheme() */
  --accent: #d8b24a;
  --accent-ink: #0a0a0d;
  --accent-soft: rgba(216,178,74,.13);
  --radius: 12px;
  --shadow: 0 6px 24px rgba(0,0,0,.45);
}

html { scroll-behavior: smooth; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
::selection { background: var(--accent); color: var(--accent-ink); }

/* ============================================
   NAV
   ============================================ */
nav { position: sticky; top: 0; z-index: 500; background: rgba(12,12,16,.86); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); display: flex; align-items: center; padding: 0 22px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
nav .inner { display: flex; align-items: center; width: 100%; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; }
nav .logo { font-weight: 900; font-size: 16px; padding: 15px 0; margin-right: 26px; color: var(--gold); letter-spacing: 2px; display: flex; align-items: center; gap: 9px; }
nav .logo::before { content: ''; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: background .35s, box-shadow .35s; }
nav button { background: none; border: none; color: var(--muted); font-size: 13.5px; font-weight: 600; padding: 15px 16px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .18s, border-color .18s; }
nav button:hover { color: var(--text); }
nav button.active { color: var(--text); border-bottom-color: var(--accent); }

.view { display: none; padding: 26px 24px 60px; max-width: 1200px; margin: 0 auto; }
.view.active { display: block; animation: viewfade .35s ease; }
@keyframes viewfade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

h2 { font-size: 22px; margin-bottom: 16px; color: var(--text); letter-spacing: .3px; }
.btn { padding: 9px 17px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700; letter-spacing: .3px; transition: transform .12s, background .18s, box-shadow .18s; }
.btn:active { transform: translateY(1px); }
.btn-primary { background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: #1a1405; box-shadow: 0 2px 10px rgba(216,178,74,.25); }
.btn-primary:hover { box-shadow: 0 4px 16px rgba(216,178,74,.4); }
.btn-secondary { background: var(--surface-3); color: var(--text); border: 1px solid var(--border-lite); }
.btn-secondary:hover { background: #2c2c37; }
.btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(224,87,74,.4); }
.btn-danger:hover { background: rgba(224,87,74,.14); }
.btn-sm { padding: 6px 11px; font-size: 12px; border-radius: 7px; }
input, select, textarea { padding: 8px 11px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface-2); color: var(--text); font-size: 13px; font-family: inherit; transition: border-color .18s, box-shadow .18s; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
textarea { resize: vertical; min-height: 100px; width: 100%; }
label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; letter-spacing: .3px; }
.toolbar { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }

/* ============================================
   TEAM HERO — shows the current opponent
   ============================================ */
.team-hero { display: flex; align-items: center; gap: 18px; padding: 20px 22px; margin-bottom: 18px; border-radius: var(--radius); background:
     linear-gradient(120deg, color-mix(in srgb, var(--accent) 22%, transparent), transparent 62%), var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--accent); box-shadow: var(--shadow); transition: border-color .35s; }
.team-hero-flag { font-size: 46px; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,.5)); }
.team-hero-main { flex: 1; min-width: 0; }
.team-hero-name { font-size: 27px; font-weight: 900; letter-spacing: .5px; color: var(--text); line-height: 1.05; }
.team-hero-sub { font-size: 12.5px; color: var(--muted); margin-top: 5px; letter-spacing: .4px; text-transform: uppercase; }
.team-hero-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 999px; background: var(--accent); color: var(--accent-ink); font-size: 12px; font-weight: 800; letter-spacing: 1px; }

/* ============================================
   TEAM SELECTOR TABS
   ============================================ */
.team-tabs { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.team-tab { flex: 1; min-width: 120px; padding: 12px 14px; text-align: center; font-size: 13.5px; font-weight: 800; cursor: pointer; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); color: var(--muted); transition: all .2s; letter-spacing: .5px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.team-tab .flag { font-size: 18px; }
.team-tab:hover { color: var(--text); border-color: var(--border-lite); background: var(--surface-2); }
.team-tab.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); box-shadow: 0 4px 16px color-mix(in srgb, var(--accent) 40%, transparent); }

/* ============================================
   PDF-STYLE SCOUTING PANELS
   ============================================ */
.page-bar { display: flex; justify-content: space-between; align-items: center; padding: 11px 16px; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); margin-bottom: 22px; border-radius: 10px; transition: border-color .35s; }
.page-bar-left { font-size: 12.5px; font-weight: 800; color: var(--text-2); letter-spacing: 1px; text-transform: uppercase; }
.page-bar-right { font-size: 11.5px; color: var(--muted); letter-spacing: 1px; }

.doc-title { font-size: 26px; font-weight: 900; color: var(--text); margin-bottom: 6px; letter-spacing: .3px; }
.doc-title::after { content: ''; display: block; width: 46px; height: 3px; border-radius: 2px; background: var(--accent); margin-top: 10px; transition: background .35s; }
.doc-subtitle { font-size: 13.5px; color: var(--muted); margin: 14px 0 22px; line-height: 1.6; }

.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 22px; }
.info-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; transition: border-color .18s; }
.info-box:focus-within { border-color: var(--accent); }
.info-box-label { font-size: 10.5px; font-weight: 800; letter-spacing: 1.5px; color: var(--gold); text-transform: uppercase; margin-bottom: 7px; }
.info-box textarea, .info-box input { background: transparent; border: none; color: var(--text); font-size: 14px; font-weight: 600; width: 100%; resize: none; min-height: 40px; padding: 0; }
.info-box textarea:focus, .info-box input:focus { outline: none; box-shadow: none; }

.scout-panel { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--border-lite); border-radius: 10px; padding: 15px 20px; margin-bottom: 12px; transition: border-color .18s; }
.scout-panel:focus-within { border-left-color: var(--accent); }
.scout-panel.accent-green { border-left-color: var(--green); }
.scout-panel.accent-red { border-left-color: var(--danger); }
.scout-panel.accent-gold { border-left-color: var(--gold); }
.scout-panel-label { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; color: var(--text-2); text-transform: uppercase; margin-bottom: 8px; }
.scout-panel textarea { background: transparent; border: none; color: var(--text-2); font-size: 13.5px; width: 100%; min-height: 60px; line-height: 1.7; padding: 0; resize: none; }
.scout-panel textarea:focus { outline: none; box-shadow: none; color: var(--text); }
.scout-panel textarea::placeholder { color: var(--faint); }

.threat-card { display: flex; gap: 0; margin-bottom: 12px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
.threat-num { background: var(--accent); color: var(--accent-ink); font-size: 26px; font-weight: 900; display: flex; align-items: center; justify-content: center; min-width: 66px; padding: 20px 0; transition: background .35s; }
.threat-body { background: var(--surface); flex: 1; padding: 15px 20px; }
.threat-body input { background: transparent; border: none; color: var(--text); font-size: 13px; font-weight: 800; letter-spacing: .8px; text-transform: uppercase; width: 100%; margin-bottom: 6px; padding: 0; }
.threat-body input:focus { outline: none; box-shadow: none; }
.threat-body textarea { background: transparent; border: none; color: var(--text-2); font-size: 13.5px; width: 100%; min-height: 50px; line-height: 1.7; padding: 0; resize: none; }
.threat-body textarea:focus { outline: none; box-shadow: none; color: var(--text); }

.sv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

.log-table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 12px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
.log-table th { background: var(--surface-3); color: var(--gold); padding: 11px 12px; font-size: 10.5px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; text-align: left; }
.log-table td { padding: 9px 12px; background: var(--surface); border-top: 1px solid var(--border); vertical-align: middle; }
.log-table td input, .log-table td textarea { background: transparent; border: none; color: var(--text-2); font-size: 12.5px; width: 100%; padding: 0; resize: none; min-height: 36px; }
.log-table td input:focus, .log-table td textarea:focus { outline: none; box-shadow: none; color: var(--text); }

.section-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface); border-radius: 10px; padding: 4px; border: 1px solid var(--border); }
.section-tab { flex: 1; padding: 9px 6px; text-align: center; font-size: 11px; font-weight: 700; cursor: pointer; border: none; background: transparent; color: var(--muted); transition: all .18s; letter-spacing: .3px; border-radius: 7px; }
.section-tab:hover { color: var(--text); background: var(--surface-2); }
.section-tab.active { background: var(--surface-3); color: var(--accent); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 45%, transparent); }
.sec { display: none; }
.sec.active { display: block; }

.doc-footer { display: flex; justify-content: space-between; align-items: center; padding: 14px 4px 0; margin-top: 26px; border-top: 1px solid var(--border); }
.doc-footer .page-num { font-size: 11px; color: var(--faint); }
.doc-footer .brand { font-size: 11px; color: var(--faint); letter-spacing: 2px; text-transform: uppercase; }

.section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; }
.section h3 { color: var(--gold); margin-bottom: 12px; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }

/* ============================================
   EXPANDABLE TEXT
   ============================================ */
.expandable-wrap { position: relative; }
.expandable-wrap textarea { overflow: hidden; transition: max-height .3s ease; }
.expandable-wrap.collapsed textarea { max-height: 5.6em; }
.expandable-toggle { display: none; background: none; border: none; color: var(--gold); font-size: 11px; font-weight: 700; cursor: pointer; padding: 4px 0; letter-spacing: .5px; }
.expandable-wrap.collapsed .expandable-toggle,
.expandable-wrap.expanded .expandable-toggle { display: inline-block; }

/* ============================================
   VIDEO BUTTON
   ============================================ */
.video-link-btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; background: linear-gradient(180deg, var(--gold-bright), var(--gold)); border: none; color: #1a1405; border-radius: 8px; font-size: 13px; font-weight: 800; cursor: pointer; text-decoration: none; transition: box-shadow .2s, transform .12s; letter-spacing: .5px; box-shadow: 0 2px 10px rgba(216,178,74,.25); }
.video-link-btn:hover { box-shadow: 0 4px 16px rgba(216,178,74,.4); }
.video-link-btn:active { transform: translateY(1px); }
.video-link-btn svg { width: 16px; height: 16px; fill: currentColor; }

/* ============================================
   USER ID MODAL
   ============================================ */
.user-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.72); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 9999; animation: viewfade .25s ease; }
.user-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 32px; max-width: 360px; width: 90%; box-shadow: var(--shadow); }
.user-modal h3 { color: var(--text); margin-bottom: 16px; }
.user-modal input { width: 100%; margin-bottom: 12px; padding: 11px; }
.user-modal .btn { width: 100%; padding: 12px; }

/* ============================================
   PLAYER SCOUTING CARDS
   ============================================ */
.player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top: 16px; }
.player-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; transition: border-color .18s, transform .18s, box-shadow .18s; }
.player-card:hover { border-color: var(--border-lite); transform: translateY(-2px); box-shadow: var(--shadow); }
.player-card-header { position: relative; background: var(--surface-2); display: flex; align-items: center; justify-content: center; min-height: 180px; cursor: pointer; border-bottom: 1px solid var(--border); }
.player-card-header img { width: 100%; height: 180px; object-fit: cover; }
.player-card-header .upload-placeholder { text-align: center; padding: 20px; color: var(--faint); }
.player-card-header .upload-placeholder svg { width: 46px; height: 46px; fill: var(--border-lite); margin-bottom: 8px; }
.player-card-header .upload-placeholder div { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.player-card-body { padding: 14px 16px; flex: 1; }
.player-card-body input { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-size: 14px; font-weight: 800; width: 100%; padding: 5px 0; margin-bottom: 8px; border-radius: 0; }
.player-card-body input:focus { outline: none; box-shadow: none; border-bottom-color: var(--accent); }
.player-card-body .player-meta { display: flex; gap: 8px; margin-bottom: 10px; }
.player-card-body .player-meta input { font-size: 12px; font-weight: 600; color: var(--text-2); flex: 1; }
.player-card-body label { font-size: 10px; font-weight: 800; letter-spacing: 1.2px; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; margin-top: 8px; }
.player-card-body textarea { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-2); font-size: 12px; width: 100%; min-height: 50px; line-height: 1.6; padding: 7px 9px; border-radius: 7px; resize: vertical; }
.player-card-body textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); color: var(--text); }
.player-card-actions { display: flex; justify-content: flex-end; padding: 8px 12px; border-top: 1px solid var(--border); }
.player-posted-by { font-size: 9px; color: var(--faint); padding: 6px 16px; letter-spacing: .5px; }

/* ============================================
   LINKIFIED URLS
   ============================================ */
.linkify-links { padding: 4px 0 0; }
.linkify-links a { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--accent); text-decoration: none; margin-right: 10px; word-break: break-all; }
.linkify-links a::before { content: '\1F517'; font-size: 9px; opacity: .7; }
.linkify-links a:hover { text-decoration: underline; }
.video-placeholder { font-size: 11px; color: var(--faint); font-style: italic; margin-top: 4px; }

/* ============================================
   AUTH LOGIN SCREEN
   ============================================ */
.auth-screen { position: fixed; inset: 0; background:
     radial-gradient(1100px 620px at 50% -8%, color-mix(in srgb, var(--gold) 12%, transparent), transparent 60%), var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-top: 3px solid var(--gold); border-radius: 16px; padding: 40px 36px; max-width: 400px; width: 100%; text-align: center; box-shadow: var(--shadow); }
.auth-card h2 { color: var(--gold); margin-bottom: 8px; font-size: 23px; letter-spacing: 2.5px; }
.auth-card .auth-subtitle { color: var(--muted); font-size: 13px; margin-bottom: 26px; letter-spacing: .5px; }
.auth-card input { width: 100%; margin-bottom: 12px; padding: 13px; text-align: center; }
.auth-card .btn { width: 100%; padding: 13px; font-size: 14px; }
.auth-card .auth-toggle { color: var(--muted); font-size: 12px; cursor: pointer; margin-top: 18px; display: inline-block; border: none; background: none; transition: color .18s; }
.auth-card .auth-toggle:hover { color: var(--gold); text-decoration: underline; }
.auth-error { color: var(--danger); font-size: 12px; margin-bottom: 12px; min-height: 16px; }

/* ============================================
   AI EXECUTIVE BRIEFING
   ============================================ */
.ai-card { background:
     linear-gradient(180deg, color-mix(in srgb, var(--gold) 8%, transparent), transparent 40%), var(--surface); border: 1px solid var(--gold-dim); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 20px; }
.ai-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.ai-card-title { font-size: 12.5px; font-weight: 800; letter-spacing: 1.5px; color: var(--gold); text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
.ai-card-title::before { content: '\2726'; color: var(--gold); }
.ai-card-time { font-size: 10px; color: var(--faint); }
.ai-card-body { font-size: 13px; color: var(--text-2); line-height: 1.8; }
.ai-card-body h2, .ai-card-body h3, .ai-card-body h4 { color: var(--gold); margin: 14px 0 6px; font-size: 14px; letter-spacing: .5px; }
.ai-card-body strong { color: var(--text); }
.ai-card-body .ai-bullet { padding-left: 18px; margin: 3px 0; position: relative; }
.ai-card-body .ai-bullet::before { content: '\2022'; position: absolute; left: 4px; color: var(--gold); }
.ai-card-empty { color: var(--muted); font-size: 12px; font-style: italic; margin-bottom: 12px; }
.ai-loading { display: flex; align-items: center; gap: 12px; padding: 16px 0; color: var(--gold); font-size: 13px; font-weight: 600; }
@keyframes aispin { to { transform: rotate(360deg); } }
.ai-spinner { width: 22px; height: 22px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: aispin .8s linear infinite; flex-shrink: 0; }

/* ============================================
   TACTICAL BOARD
   ============================================ */
.tactical-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; margin-top: 16px; }
.tactical-item { background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.tactical-canvas-wrap { position: relative; background: #050507; cursor: crosshair; touch-action: none; }
.tactical-canvas-wrap img { display: block; width: 100%; }
.tactical-canvas-wrap canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.tactical-toolbar { display: flex; gap: 7px; padding: 10px 12px; background: var(--surface-2); align-items: center; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
.color-btn { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border-lite); cursor: pointer; transition: transform .12s, border-color .2s; }
.color-btn:hover { transform: scale(1.1); }
.color-btn.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,.4); }
.color-btn[data-color="red"] { background: #e74c3c; }
.color-btn[data-color="blue"] { background: #3498db; }
.color-btn[data-color="yellow"] { background: var(--gold); }
.color-btn[data-color="white"] { background: #fff; }
.tactical-item-footer { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-top: 1px solid var(--border); }
.tactical-item-footer input { background: transparent; border: none; color: var(--text-2); font-size: 13px; font-weight: 600; flex: 1; padding: 4px 0; }
.tactical-item-footer input:focus { outline: none; box-shadow: none; color: var(--text); }
.tactical-upload-zone { border: 2px dashed var(--border-lite); border-radius: var(--radius); padding: 40px 20px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; }
.tactical-upload-zone:hover { border-color: var(--accent); background: var(--accent-soft); }
.tactical-upload-zone svg { width: 38px; height: 38px; fill: var(--muted); margin-bottom: 8px; }
.tactical-upload-zone div { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: .5px; }

/* ============================================
   COMPLETION BAR (in hero)
   ============================================ */
.hero-progress { height: 6px; border-radius: 3px; background: var(--surface-3); overflow: hidden; margin-top: 10px; max-width: 340px; }
.hero-progress-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .5s ease, background .35s; }
.hero-progress-label { font-size: 11px; font-weight: 800; letter-spacing: 1px; color: var(--muted); margin-top: 6px; text-transform: uppercase; }
.hero-progress-label b { color: var(--accent); }

/* ============================================
   SECTION PREV / NEXT
   ============================================ */
.section-nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 26px; padding-top: 20px; border-top: 1px solid var(--border); }
.section-nav .btn[disabled] { opacity: .35; cursor: default; pointer-events: none; }
.section-nav-label { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); text-align: center; flex: 1; }

<div id="toast-wrap"></div>

<script>
const STORE = 'hockeyOppoScoutV4';
const USER_STORE = 'hockeyScoutUser';

/* ============================================
   SUPABASE CLIENT
   ============================================ */
const SB_URL = 'https://rqqjqoyjaiphsfhyyvka.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxcWpxb3lqYWlwaHNmaHl5dmthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTEyMTksImV4cCI6MjA4OTQyNzIxOX0.kIZI3gNv3kfaWOsZhQ6k2B1Me4Q-zZMaaIcQTHD3Tuc';
const sb = supabase.createClient(SB_URL, SB_KEY, {
  auth: {
    // Implicit flow: session token arrives in the URL fragment, so the magic
    // link completes in ANY browser that opens it (incl. in-app mail browsers).
    // PKCE (the v2 default) needs a verifier stored in the SAME browser that
    // requested the link, which breaks when phones open links in an in-app webview.
    flowType: 'implicit',
    detectSessionInUrl: true,
    persistSession: true,
    autoRefreshToken: true
  }
});
let sbOnline = true;

function blankTeamData() {
  return {
    worldRanking: '', headCoach: '', keyPlayersOverview: '', lastResultVsNZ: '',
    videoLink: '',
    playingIdentity: '', strengthsTop3: '', vulnerabilitiesTop3: '',
    defensiveFormation: '', pressTriggers: '', defensiveBlock: '',
    setPieceDefence: '', transitionLosingPossession: '',
    buildUpPattern: '', attackTransition: '', dangerousZones: '',
    setPieceAttack: '', keyAttackingPlayers: '',
    threats: [{ title: '', description: '' },{ title: '', description: '' },{ title: '', description: '' }],
    ourAttackingPriority: '', ourDefensivePriority: '',
    setPieceStrategy: '', psychologicalEdge: '',
    players: [],
    tacticalImages: [],
    log: [],
    aiBriefing: '',
    aiBriefingTime: ''
  };
}

function blankTeam(name, country, competition) {
  return { id: uid(), name, country, competition: competition || 'Hockey World Cup', ...blankTeamData() };
}

/* ---- Convert between app format and DB format ---- */
function teamToRow(t) {
  const { id, name, country, competition, ...rest } = t;
  return { id, name, country, competition, team_data: rest, updated_at: new Date().toISOString() };
}
function rowToTeam(r) {
  const defaults = blankTeamData();
  const td = r.team_data || {};
  return { id: r.id, name: r.name, country: r.country, competition: r.competition, ...defaults, ...td };
}

let data = { teams: [], currentTeamIdx: 0, currentSection: 0 };
let currentUser = null;
let currentRole = 'contributor'; // 'admin', 'coach', or 'contributor'
let currentAuthUid = null;

/* ============================================
   COUNTRY ACCENT THEMING
   Each opponent gets its national colour; black & gold stays the frame.
   ============================================ */
const COUNTRY_THEME = {
  netherlands: { c: '#F26B1F', ink: '#180a00', flag: '🇳🇱', short: 'NED' },
  holland:     { c: '#F26B1F', ink: '#180a00', flag: '🇳🇱', short: 'NED' },
  argentina:   { c: '#6CACE4', ink: '#062338', flag: '🇦🇷', short: 'ARG' },
  japan:       { c: '#C8102E', ink: '#ffffff', flag: '🇯🇵', short: 'JPN' },
  australia:   { c: '#0B7A3B', ink: '#ffffff', flag: '🇦🇺', short: 'AUS' },
  germany:     { c: '#111111', ink: '#ffffff', flag: '🇩🇪', short: 'GER' },
  belgium:     { c: '#C8102E', ink: '#ffffff', flag: '🇧🇪', short: 'BEL' },
  india:       { c: '#FF8A2B', ink: '#180a00', flag: '🇮🇳', short: 'IND' },
  england:     { c: '#E63946', ink: '#ffffff', flag: '🏴', short: 'ENG' },
  spain:       { c: '#E0402A', ink: '#ffffff', flag: '🇪🇸', short: 'ESP' },
  france:      { c: '#3A6BC4', ink: '#ffffff', flag: '🇫🇷', short: 'FRA' },
  'new zealand': { c: '#111111', ink: '#ffffff', flag: '🇳🇿', short: 'NZL' }
};
function teamTheme(t) {
  const s = ((t && (t.country || t.name)) || '').toLowerCase();
  for (const k in COUNTRY_THEME) { if (s.indexOf(k) !== -1) return COUNTRY_THEME[k]; }
  return { c: '#d8b24a', ink: '#0a0a0d', flag: '🏑', short: (t && t.name ? t.name.slice(0,3).toUpperCase() : '—') };
}
function applyTeamTheme(t) {
  const th = teamTheme(t);
  const r = document.documentElement.style;
  r.setProperty('--accent', th.c);
  r.setProperty('--accent-ink', th.ink);
  r.setProperty('--accent-soft', th.c + '22');
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', '#0a0a0d');
}

/* ---- Toast notifications (replace jarring alert() popups) ---- */
function toast(msg, type) {
  const wrap = document.getElementById('toast-wrap');
  if (!wrap) { return; }
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(function() {
    el.classList.add('leaving');
    setTimeout(function() { el.remove(); }, 300);
  }, 2600);
}

/* ---- How complete is a team's scouting report? (0–100) ---- */
const COMPLETION_FIELDS = ['playingIdentity','strengthsTop3','vulnerabilitiesTop3',
  'defensiveFormation','pressTriggers','defensiveBlock','setPieceDefence','transitionLosingPossession',
  'buildUpPattern','attackTransition','dangerousZones','setPieceAttack','keyAttackingPlayers',
  'ourAttackingPriority','ourDefensivePriority','setPieceStrategy','psychologicalEdge'];
function teamCompletion(t) {
  if (!t) return 0;
  let done = 0, total = COMPLETION_FIELDS.length + 3; // + threats, players, tactical
  COMPLETION_FIELDS.forEach(function(k) { if ((t[k] || '').trim()) done++; });
  if (t.threats && t.threats.some(function(x) { return (x.title || '').trim() || (x.description || '').trim(); })) done++;
  if (t.players && t.players.length) done++;
  if (t.tacticalImages && t.tacticalImages.length) done++;
  return Math.round(done / total * 100);
}

/* ---- Drawing state ---- */
let drawingState = {};

/* ---- User Identity ---- */
function getUser() {
  const stored = localStorage.getItem(USER_STORE);
  if (stored) { currentUser = JSON.parse(stored); return currentUser; }
  return null;
}
function setUser(name, initials) {
  currentUser = { name, initials };
  localStorage.setItem(USER_STORE, JSON.stringify(currentUser));
}
function promptUserIdentity(cb) {
  // Remove any existing identity modal to prevent duplicates
  const existing = document.querySelector('.user-modal-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.className = 'user-modal-overlay';
  overlay.innerHTML = `<div class="user-modal">
    <h3>Who are you?</h3>
    <label>Full Name</label><input type="text" class="uid-name-input" placeholder="e.g. Shea McAleese">
    <label>Initials</label><input type="text" class="uid-init-input" placeholder="e.g. SM" maxlength="4">
    <button class="btn btn-primary uid-go-btn">Continue</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.uid-go-btn').onclick = function() {
    const n = overlay.querySelector('.uid-name-input').value.trim();
    const i = overlay.querySelector('.uid-init-input').value.trim().toUpperCase();
    if (!n || !i) return;
    setUser(n, i);
    overlay.remove();
    if (cb) cb();
  };
}
function postedByStamp() {
  if (!currentUser) return '';
  const now = new Date();
  const d = now.toLocaleDateString('en-NZ', { day:'numeric', month:'short', year:'numeric' });
  const t = now.toLocaleTimeString('en-NZ', { hour:'2-digit', minute:'2-digit' });
  return `${currentUser.initials} \u2014 ${d} ${t}`;
}
function stampWithUid() {
  return { postedBy: postedByStamp(), createdByUid: currentAuthUid };
}

/* ============================================
   AUTHENTICATION
   ============================================ */
let authMode = 'login';

function showLoginScreen() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('main-nav').style.display = 'none';
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
}

function hideLoginScreen() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('main-nav').style.display = '';
}

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'signup' : 'login';
  document.getElementById('auth-submit').textContent = authMode === 'login' ? 'Sign In' : 'Sign Up';
  document.getElementById('auth-toggle').textContent = authMode === 'login' ? 'Need an account? Sign Up' : 'Already have an account? Sign In';
  document.getElementById('auth-error').textContent = '';
}

async function handleAuth() {
        const email = document.getElementById('auth-email').value.trim();
        const errEl = document.getElementById('auth-error');
        errEl.textContent = '';
        if (!email) { errEl.textContent = 'Please enter your email.'; return; }
        try {
          const { error } = await sb.auth.signInWithOtp({
            email,
            options: {
              emailRedirectTo: window.location.origin + window.location.pathname,
              // 'Sign In' only emails existing accounts; 'Sign Up' creates a new one.
              shouldCreateUser: authMode === 'signup'
            }
          });
          if (error) throw error;
          errEl.style.color = 'var(--green)';
          errEl.textContent = authMode === 'signup'
            ? 'Account link sent! Check your email to finish signing up.'
            : 'Magic link sent! Check your email inbox.';
        } catch(e) {
          errEl.style.color = 'var(--danger)';
          errEl.textContent = (e && /not.*(found|exist)|signups? not allowed/i.test(e.message||''))
            ? 'No account for that email. Tap "Need an account? Sign Up".'
            : (e.message || 'Error sending magic link.');
        }
      }

async function handleSignOut() {
  _proceeding = false;
  await sb.auth.signOut();
  location.reload();
}

let _proceeding = false;
async function proceedAfterAuth() {
  if (_proceeding) return;
  _proceeding = true;
  try {
    // Read role from Supabase user metadata
    const { data: { session } } = await sb.auth.getSession();
    if (session && session.user) {
      currentAuthUid = session.user.id;
      const meta = session.user.app_metadata || {};
      currentRole = meta.role || 'contributor';
    }
    document.getElementById('view-scout').classList.add('active');
    await load();
    subscribeToRealtime();
    if (!getUser()) {
      promptUserIdentity(function() { renderScout(); });
    } else {
      renderScout();
    }
  } catch(e) {
    console.error('proceedAfterAuth error:', e);
    _proceeding = false;
  }
}

function canEdit(entry) {
  if (currentRole === 'admin' || currentRole === 'coach') return true;
  if (!entry || !entry.createdByUid) return true; // legacy entries without uid
  return entry.createdByUid === currentAuthUid;
}

function isCoachOrAdmin() {
  return currentRole === 'admin' || currentRole === 'coach';
}

/* ============================================
   SAVE — localStorage immediately, Supabase debounced
   ============================================ */
let _syncTimer = null;
let _isSyncing = false;
function safeSetStore() {
  try { localStorage.setItem(STORE, JSON.stringify(data)); return true; }
  catch (e) { console.warn('Local save failed (storage full?) — cloud sync still active:', e); return false; }
}
function save() {
  safeSetStore();
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncToSupabase, 800);
  updateSyncBadge('saving');
}

async function syncToSupabase() {
  _isSyncing = true;
  try {
    for (const team of data.teams) {
      const row = teamToRow(team);
      const { error } = await sb.from('scout_teams').upsert(row);
      if (error) throw error;
    }
    sbOnline = true;
    updateSyncBadge('synced');
  } catch(e) {
    console.warn('Supabase sync failed:', e);
    sbOnline = false;
    updateSyncBadge('offline');
  }
  setTimeout(function() { _isSyncing = false; }, 500);
}

/* ============================================
   REALTIME — Listen for changes from other users
   ============================================ */
let _realtimeChannel = null;
let _lastSyncVersion = 0;
function subscribeToRealtime() {
  if (_realtimeChannel) return;
  _realtimeChannel = sb.channel('scout-sync')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'scout_teams' }, function(payload) {
      if (_isSyncing) return;
      handleRealtimeUpdate(payload);
    })
    .subscribe();
}

function isEditingScout() {
  const a = document.activeElement;
  const scout = document.getElementById('view-scout');
  return a && scout && scout.contains(a) && (a.tagName === 'TEXTAREA' || a.tagName === 'INPUT');
}

function handleRealtimeUpdate(payload) {
  if (payload.eventType === 'UPDATE' || payload.eventType === 'INSERT') {
    const row = payload.new;
    const idx = data.teams.findIndex(function(t) { return t.id === row.id; });
    // Don't clobber the team a user is mid-edit on — their local edits would be lost.
    // Their own changes still sync out; they'll pick up remote changes on next switch/reload.
    if (idx >= 0 && idx === data.currentTeamIdx && isEditingScout()) return;
    if (idx >= 0) {
      // Capture current DOM values into data without triggering save/sync
      captureDOMValues();
      data.teams[idx] = rowToTeam(row);
      localStorage.setItem(STORE, JSON.stringify(data));
      if (idx === data.currentTeamIdx) renderScout();
    } else {
      data.teams.push(rowToTeam(row));
      localStorage.setItem(STORE, JSON.stringify(data));
      renderScout();
    }
    updateSyncBadge('synced');
  } else if (payload.eventType === 'DELETE') {
    const oldId = payload.old.id;
    const idx = data.teams.findIndex(function(t) { return t.id === oldId; });
    if (idx >= 0) {
      data.teams.splice(idx, 1);
      if (data.currentTeamIdx >= data.teams.length) data.currentTeamIdx = Math.max(0, data.teams.length - 1);
      localStorage.setItem(STORE, JSON.stringify(data));
      renderScout();
    }
  }
}

/* Capture DOM values into data WITHOUT calling save() — prevents sync loops */
function captureDOMValues() {
  const t = ct(); if (!t) return;
  document.querySelectorAll('[data-field]').forEach(function(el) { t[el.dataset.field] = el.value; });
  document.querySelectorAll('[data-threat]').forEach(function(el) {
    const i = parseInt(el.dataset.threat);
    if (t.threats && t.threats[i]) t.threats[i][el.dataset.tfield] = el.value;
  });
  document.querySelectorAll('[data-log]').forEach(function(el) {
    const i = parseInt(el.dataset.log);
    if (t.log && t.log[i]) t.log[i][el.dataset.lfield] = el.value;
  });
  document.querySelectorAll('[data-pidx]').forEach(function(el) {
    const i = parseInt(el.dataset.pidx);
    if (t.players && t.players[i] && el.dataset.pfield) t.players[i][el.dataset.pfield] = el.value;
  });
}

async function syncDeleteTeam(id) {
  try { await sb.from('scout_teams').delete().eq('id', id); } catch(e) { console.warn('Delete sync failed:', e); }
}

async function syncInsertTeam(team) {
  try {
    const row = teamToRow(team);
    row.created_at = new Date().toISOString();
    await sb.from('scout_teams').upsert(row);
  } catch(e) { console.warn('Insert sync failed:', e); }
}

function updateSyncBadge(state) {
  const el = document.getElementById('sync-badge');
  if (!el) return;
  const dot = '● ';
  if (state === 'synced') { el.textContent = dot + 'Synced'; el.style.color = 'var(--green)'; el.style.borderColor = 'color-mix(in srgb, var(--green) 40%, transparent)'; }
  else if (state === 'saving') { el.textContent = dot + 'Saving…'; el.style.color = 'var(--gold)'; el.style.borderColor = 'var(--gold-dim)'; }
  else if (state === 'offline') { el.textContent = dot + 'Offline'; el.style.color = 'var(--danger)'; el.style.borderColor = 'color-mix(in srgb, var(--danger) 40%, transparent)'; }
  else if (state === 'loading') { el.textContent = dot + 'Loading…'; el.style.color = 'var(--muted)'; el.style.borderColor = 'var(--border)'; }
}

/* ============================================
   LOAD — Supabase first, localStorage fallback
   ============================================ */
async function load() {
  updateSyncBadge('loading');
  // Try Supabase first
  try {
    const { data: rows, error } = await sb.from('scout_teams').select('*').order('created_at');
    if (!error && rows && rows.length > 0) {
      data.teams = rows.map(rowToTeam);
      data.currentTeamIdx = 0;
      data.currentSection = 0;
      localStorage.setItem(STORE, JSON.stringify(data));
      sbOnline = true;
      updateSyncBadge('synced');
      return;
    }
  } catch(e) {
    console.warn('Supabase load failed, using localStorage:', e);
    sbOnline = false;
  }

  // Fall back to localStorage
  try {
    const r = localStorage.getItem(STORE);
    if (r) data = JSON.parse(r);
    if (!data.teams) data.teams = [];
    if (data.currentTeamIdx === undefined) data.currentTeamIdx = 0;
    if (data.currentSection === undefined) data.currentSection = 0;
  } catch(e) { data = { teams: [], currentTeamIdx: 0, currentSection: 0 }; }

  // Ensure new fields exist on legacy data
  data.teams.forEach(t => {
    if (!t.videoLink) t.videoLink = '';
    if (!t.players) t.players = [];
    if (!t.tacticalImages) t.tacticalImages = [];
  });

  if (data.teams.length === 0) {
    data.teams.push(blankTeam('Netherlands', 'Netherlands', 'Hockey World Cup'));
    data.teams.push(blankTeam('Argentina', 'Argentina', 'Hockey World Cup'));
    data.teams.push(blankTeam('Japan', 'Japan', 'Hockey World Cup'));
    localStorage.setItem(STORE, JSON.stringify(data));
    // Try to seed Supabase
    for (const t of data.teams) await syncInsertTeam(t);
  }
  updateSyncBadge(sbOnline ? 'synced' : 'offline');
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,6); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ct() { return data.teams[data.currentTeamIdx]; }

/* ---- Image compression utility ---- */
function compressImage(file, maxW, maxH, quality, cb) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      if (h > maxH) { w = w * maxH / h; h = maxH; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ---- Canvas Drawing Engine ---- */
function initCanvas(idx) {
  const img = document.getElementById('tac-img-' + idx);
  const canvas = document.getElementById('tac-canvas-' + idx);
  if (!img || !canvas) return;
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;

  const state = {
    drawing: false,
    color: '#e74c3c',
    lineWidth: 3,
    currentStroke: [],
    ctx: canvas.getContext('2d')
  };
  state.ctx.lineCap = 'round';
  state.ctx.lineJoin = 'round';
  drawingState[idx] = state;

  // Restore saved strokes
  const ti = ct().tacticalImages[idx];
  if (ti && ti.strokes && ti.strokes.length > 0) {
    ti.strokes.forEach(s => drawStroke(state.ctx, s));
  }

  // Mouse events
  canvas.onmousedown = function(e) { startDraw(e, idx, canvas); };
  canvas.onmousemove = function(e) { moveDraw(e, idx, canvas); };
  canvas.onmouseup = function() { endDraw(idx); };
  canvas.onmouseleave = function() { endDraw(idx); };

  // Touch events — lock body scroll while drawing
  canvas.ontouchstart = function(e) { e.preventDefault(); document.body.style.overflow = 'hidden'; startDraw(e.touches[0], idx, canvas); };
  canvas.ontouchmove = function(e) { e.preventDefault(); moveDraw(e.touches[0], idx, canvas); };
  canvas.ontouchend = function(e) { e.preventDefault(); document.body.style.overflow = ''; endDraw(idx); };
  canvas.ontouchcancel = function() { document.body.style.overflow = ''; endDraw(idx); };
}

function getCanvasPos(e, canvas) {
  const r = canvas.getBoundingClientRect();
  const scaleX = canvas.width / r.width;
  const scaleY = canvas.height / r.height;
  return { x: (e.clientX - r.left) * scaleX, y: (e.clientY - r.top) * scaleY };
}

function startDraw(e, idx, canvas) {
  const state = drawingState[idx];
  if (!state) return;
  state.drawing = true;
  const pos = getCanvasPos(e, canvas);
  state.currentStroke = { color: state.color, lineWidth: state.lineWidth, points: [pos] };
  state.ctx.beginPath();
  state.ctx.strokeStyle = state.color;
  state.ctx.lineWidth = state.lineWidth;
  state.ctx.moveTo(pos.x, pos.y);
}

function moveDraw(e, idx, canvas) {
  const state = drawingState[idx];
  if (!state || !state.drawing) return;
  const pos = getCanvasPos(e, canvas);
  state.currentStroke.points.push(pos);
  state.ctx.lineTo(pos.x, pos.y);
  state.ctx.stroke();
}

function endDraw(idx) {
  const state = drawingState[idx];
  if (!state || !state.drawing) return;
  state.drawing = false;
  if (state.currentStroke.points.length > 1) {
    const ti = ct().tacticalImages[idx];
    if (!ti.strokes) ti.strokes = [];
    ti.strokes.push(state.currentStroke);
    save();
  }
  state.currentStroke = [];
}

function drawStroke(ctx, stroke) {
  if (!stroke.points || stroke.points.length < 2) return;
  ctx.beginPath();
  ctx.strokeStyle = stroke.color;
  ctx.lineWidth = stroke.lineWidth;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
  for (let i = 1; i < stroke.points.length; i++) {
    ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
  }
  ctx.stroke();
}

function setDrawColor(btn, color) {
  const idx = parseInt(btn.dataset.tidx);
  if (drawingState[idx]) drawingState[idx].color = color;
  const toolbar = btn.closest('.tactical-toolbar');
  toolbar.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function undoDrawing(idx) {
  const ti = ct().tacticalImages[idx];
  if (!ti.strokes || ti.strokes.length === 0) return;
  ti.strokes.pop();
  save();
  redrawCanvas(idx);
}

function clearDrawing(idx) {
  const ti = ct().tacticalImages[idx];
  if (!ti.strokes || ti.strokes.length === 0) return;
  if (!confirm('Clear all annotations?')) return;
  ti.strokes = [];
  save();
  redrawCanvas(idx);
}

function redrawCanvas(idx) {
  const canvas = document.getElementById('tac-canvas-' + idx);
  const state = drawingState[idx];
  if (!canvas || !state) return;
  state.ctx.clearRect(0, 0, canvas.width, canvas.height);
  const ti = ct().tacticalImages[idx];
  if (ti && ti.strokes) ti.strokes.forEach(s => drawStroke(state.ctx, s));
}

          ? `<div class="ai-card-body">${renderMarkdown(t.aiBriefing)}</div>`

      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-top:12px;">
        <button class="btn btn-primary" id="ai-swot-btn" onclick="generateAISwot()">${t.aiBriefing ? 'Regenerate AI SWOT' : 'Generate AI SWOT'}</button>
        <span style="font-size:12px;color:#999;font-style:italic;">Coaches only — generates an AI tactical briefing</span>
      </div>
    </div>` : (t.aiBriefing ? `
    <div class="ai-card" style="margin-top:20px;">
      <div class="ai-card-header">
        <span class="ai-card-title">Executive Briefing</span>
        ${t.aiBriefingTime ? `<span class="ai-card-time">Generated ${esc(t.aiBriefingTime)}</span>` : ''}
      </div>
      <div class="ai-card-body">${renderMarkdown(t.aiBriefing)}</div>
    </div>` : '');
  return `<div class="sec ${data.currentSection===6?'active':''}" id="sec-gameplan">
    <div class="page-bar"><span class="page-bar-left">${esc(t.name)} | Our Game Plan</span><span class="page-bar-right">${esc(t.competition)}</span></div>

  </div>`;
}

/* ============================================
   SCOUTING LOG — Section 8
   ============================================ */
function renderLog(t) {
  if (!t.log) t.log = [];
  let rows = t.log.map((e,i)=>`<tr>
    <td><input type="text" data-log="${i}" data-lfield="dateTournament" value="${esc(e.dateTournament)}" placeholder="Date / Tournament" onchange="logChange(this)"></td>
    <td><input type="text" data-log="${i}" data-lfield="result" value="${esc(e.result)}" placeholder="Result" onchange="logChange(this)"></td>
    <td><div class="expandable-wrap collapsed"><textarea data-log="${i}" data-lfield="observation" placeholder="Key observation" onchange="logChange(this)">${esc(e.observation)}</textarea><button class="expandable-toggle" onclick="toggleExpand(this)">See More</button></div></td>
    <td><div class="expandable-wrap collapsed"><textarea data-log="${i}" data-lfield="action" placeholder="Action taken" onchange="logChange(this)">${esc(e.action)}</textarea><button class="expandable-toggle" onclick="toggleExpand(this)">See More</button></div></td>
    <td style="font-size:10px;color:#667;white-space:nowrap;">${esc(e.postedBy||'')}</td>
    <td style="width:40px;" class="no-print">${canEdit(e) ? `<button class="btn btn-danger btn-sm" onclick="deleteLogEntry(${i})">\u00D7</button>` : ''}</td>
  </tr>`).join('');

  return `<div class="sec ${data.currentSection===7?'active':''}" id="sec-log">
    <div class="page-bar"><span class="page-bar-left">${esc(t.name)} | Scouting Log</span><span class="page-bar-right">Updated Each Tournament</span></div>
    <div class="doc-title">Running Observations Log</div>
    <div class="doc-subtitle">Add a row each time you play or watch this team. This becomes your living intelligence database.</div>
    <button class="btn btn-primary btn-sm no-print" onclick="addLogEntry()" style="margin-bottom:12px;">+ Add Entry</button>
    <div style="overflow-x:auto;"><table class="log-table"><thead><tr>
      <th style="width:15%;">Date / Tournament</th><th style="width:8%;">Result</th>
      <th style="width:30%;">Key Observation</th><th style="width:25%;">Action Taken</th>
      <th style="width:12%;">Posted By</th>

  </div>`;
}

function fieldChange(el) { ct()[el.dataset.field] = el.value; ct().lastEditedBy = postedByStamp(); save(); }
function threatChange(el) { const i = parseInt(el.dataset.threat); ct().threats[i][el.dataset.tfield] = el.value; ct().threats[i].postedBy = postedByStamp(); save(); }
function logChange(el) { const i = parseInt(el.dataset.log); ct().log[i][el.dataset.lfield] = el.value; ct().log[i].postedBy = postedByStamp(); save(); }

/* ---- Live input sync — save while typing, not just on blur ---- */
let _liveInputTimer = null;
document.getElementById('view-scout').addEventListener('input', function(e) {
  const el = e.target;
  if (!el || !ct()) return;
  if (el.dataset.field) { ct()[el.dataset.field] = el.value; }
  else if (el.dataset.threat !== undefined && el.dataset.tfield) { const i = parseInt(el.dataset.threat); if (ct().threats && ct().threats[i]) ct().threats[i][el.dataset.tfield] = el.value; }
  else if (el.dataset.log !== undefined && el.dataset.lfield) { const i = parseInt(el.dataset.log); if (ct().log && ct().log[i]) ct().log[i][el.dataset.lfield] = el.value; }
  else if (el.dataset.pidx !== undefined && el.dataset.pfield) { const i = parseInt(el.dataset.pidx); if (ct().players && ct().players[i]) ct().players[i][el.dataset.pfield] = el.value; }
  else return;
  clearTimeout(_liveInputTimer);
  _liveInputTimer = setTimeout(function() { save(); }, 600);
});

function autoSave() {
  const t = ct(); if (!t) return;
  document.querySelectorAll('[data-field]').forEach(el => { t[el.dataset.field] = el.value; });
  document.querySelectorAll('[data-threat]').forEach(el => {
    const i = parseInt(el.dataset.threat);
    if (t.threats && t.threats[i]) t.threats[i][el.dataset.tfield] = el.value;
  });
  document.querySelectorAll('[data-log]').forEach(el => {
    const i = parseInt(el.dataset.log);
    if (t.log && t.log[i]) t.log[i][el.dataset.lfield] = el.value;
  });
  document.querySelectorAll('[data-pidx]').forEach(el => {
    const i = parseInt(el.dataset.pidx);
    if (t.players && t.players[i] && el.dataset.pfield) t.players[i][el.dataset.pfield] = el.value;
  });
  save();
}

function addLogEntry() { autoSave(); ct().log.push({ dateTournament:'', result:'', observation:'', action:'', postedBy: postedByStamp(), createdByUid: currentAuthUid }); save(); renderScout(); }
function deleteLogEntry(i) { if (!canEdit(ct().log[i])) return toast('You can only delete entries you created.', 'warn'); if (!confirm('Are you sure you want to delete this log entry?')) return; autoSave(); ct().log.splice(i,1); save(); renderScout(); }
function addNewTeam() { const n = prompt('Team name:'); if (!n) return; autoSave(); const t = blankTeam(n.trim(),n.trim(),'Hockey World Cup'); data.teams.push(t); data.currentTeamIdx = data.teams.length-1; data.currentSection = 0; save(); syncInsertTeam(t); renderScout(); }

function printScout() {
  autoSave();
  document.getElementById('view-scout').classList.add('print-active');
  window.print();
  setTimeout(() => document.getElementById('view-scout').classList.remove('print-active'), 500);
}

function renderLive() {

      </div>

function toggleLiveTag(el) {
  const tag = el.dataset.ltag;
  if (liveTags.has(tag)) { liveTags.delete(tag); el.style.background='var(--surface-2)'; el.style.color='var(--text-2)'; el.style.borderColor='var(--border)'; }
  else { liveTags.add(tag); el.style.background='var(--accent)'; el.style.color='var(--accent-ink)'; el.style.borderColor='var(--accent)'; }
}
function insertLiveMin() { const m=document.getElementById('live-min').value; if(!m)return; const ta=document.getElementById('live-notes'); ta.value+=`[${m}'] `; ta.focus(); }

function addLiveEntry() {
  const text = document.getElementById('live-notes').value.trim();
  if (!text) return toast('Write an observation first.', 'warn');
  const tags = Array.from(liveTags); if (tags.length===0) tags.push('General');
  liveFeed.push({ id:uid(), tags, text, time:new Date().toLocaleTimeString() });
  document.getElementById('live-notes').value = '';
  renderLiveFeed();
}

function renderLiveFeed() {
  const el = document.getElementById('live-feed'); if(!el)return;
  if (liveFeed.length===0) { el.innerHTML='<div style="color:#667;font-size:12px;">No observations yet.</div>'; return; }
  el.innerHTML = liveFeed.map(e=>`<div style="background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--accent);padding:11px 14px;border-radius:8px;margin-bottom:8px;">

    <div style="font-size:13px;color:var(--text-2);line-height:1.5;">${esc(e.text)}</div>

}

function processLiveFeed() {
  const idx = parseInt(document.getElementById('live-team').value);
  if (liveFeed.length===0) return toast('No observations to process yet.', 'warn');
  const t = data.teams[idx]; if(!t.log) t.log=[];
  const d = document.getElementById('live-date').value, c = document.getElementById('live-comp').value;
  const n = liveFeed.length;
  liveFeed.forEach(e => { t.log.push({ dateTournament:`${d} ${c}`.trim(), result:'', observation:`[${e.tags.join(', ')}] ${e.text}`, action:'', postedBy: postedByStamp(), createdByUid: currentAuthUid }); });
  save();
  toast(`${n} ${n === 1 ? 'observation' : 'observations'} added to ${t.name}'s log.`, 'ok');
  liveFeed=[]; liveTags.clear(); renderLiveFeed();
}

/* ---- Expandable text toggle ---- */
function toggleExpand(btn) {
  const wrap = btn.closest('.expandable-wrap');
  if (wrap.classList.contains('collapsed')) {
    wrap.classList.remove('collapsed');
    wrap.classList.add('expanded');
    btn.textContent = 'Show Less';
    wrap.querySelector('textarea').style.maxHeight = 'none';
  } else {
    wrap.classList.remove('expanded');
    wrap.classList.add('collapsed');
    btn.textContent = 'See More';
  }
}

function initExpandables() {
  const LINE_THRESHOLD = 4;
  const HEIGHT_THRESHOLD = 80;

  // Check existing expandable wraps
  document.querySelectorAll('.expandable-wrap').forEach(wrap => {
    const ta = wrap.querySelector('textarea');
    const btn = wrap.querySelector('.expandable-toggle');
    if (!ta || !btn) return;
    const lines = (ta.value || '').split('\n').length;
    if (ta.scrollHeight > HEIGHT_THRESHOLD || lines > LINE_THRESHOLD) {
      btn.style.display = 'inline-block';
    } else {
      btn.style.display = 'none';
      wrap.classList.remove('collapsed');
    }
  });

  // Wrap textareas that have enough content but aren't yet in an expandable-wrap
  document.querySelectorAll('.scout-panel textarea, .threat-body textarea, .player-card-body textarea').forEach(ta => {
    if (ta.closest('.expandable-wrap')) return;
    const lines = (ta.value || '').split('\n').length;
    if (ta.value && (ta.scrollHeight > HEIGHT_THRESHOLD || lines > LINE_THRESHOLD)) {
      const parent = ta.parentNode;
      const wrap = document.createElement('div');
      wrap.className = 'expandable-wrap collapsed';
      parent.insertBefore(wrap, ta);
      wrap.appendChild(ta);
      const btn = document.createElement('button');
      btn.className = 'expandable-toggle';
      btn.textContent = 'See More';
      btn.onclick = function() { toggleExpand(this); };
      wrap.appendChild(btn);
    }
  });
}

/* ---- Auto-linkify URLs in textareas ---- */
function linkifyTextareas() {
  const urlRegex = /https?:\/\/[^\s<>"']+/g;
  document.querySelectorAll('.scout-panel textarea, .threat-body textarea, .player-card-body textarea, .info-box textarea, .log-table textarea').forEach(ta => {
    // Remove existing link containers
    const existing = ta.parentNode.querySelector('.linkify-links');
    if (existing) existing.remove();
    const urls = (ta.value || '').match(urlRegex);
    if (!urls || urls.length === 0) return;
    const container = document.createElement('div');
    container.className = 'linkify-links';
    [...new Set(urls)].forEach(url => {
      const a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener';
      // Show truncated URL text
      a.textContent = url.length > 60 ? url.substring(0, 57) + '...' : url;
      container.appendChild(a);
    });
    ta.parentNode.appendChild(container);
  });
}

// Re-check expandables + linkify after renders
const _origRenderScout = renderScout;
renderScout = function() { _origRenderScout(); setTimeout(function() { initExpandables(); linkifyTextareas(); }, 50); };

async function forceSync() {

/* ---- Lightweight Markdown renderer ---- */
function renderMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.*)$/gm, '<h4>$1</h4>')
    .replace(/^## (.*)$/gm, '<h3>$1</h3>')
    .replace(/^# (.*)$/gm, '<h2>$1</h2>')
    .replace(/^[\-\*] (.*)$/gm, '<div class="ai-bullet">$1</div>')
    .replace(/\n{2,}/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

/* ---- AI SWOT via Edge Function ---- */
async function generateAISwot() {
  const t = ct();
  const btn = document.getElementById('ai-swot-btn');
  const contentEl = document.getElementById('ai-briefing-content');

  // Show loading spinner
  btn.disabled = true;
  btn.textContent = 'Generating...';
  contentEl.innerHTML = '<div class="ai-loading"><div class="ai-spinner"></div>Analyzing scouting entries across all sections...</div>';

  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) throw new Error('Not authenticated. Please log in again.');

    const response = await fetch(SB_URL + '/functions/v1/ai-swot', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + session.access_token
      },
      body: JSON.stringify({ teamId: t.id, teamData: teamToRow(t) })
    });

    if (!response.ok) {
      const errBody = await response.text();
      throw new Error('Edge Function returned ' + response.status + ': ' + errBody);
    }

    const result = await response.json();
    t.aiBriefing = result.briefing;
    t.aiBriefingTime = new Date().toLocaleString('en-NZ');
    save();
    renderScout();
  } catch(e) {
    contentEl.innerHTML = '<div style="color:#e74c3c;font-size:13px;padding:8px 0;">Failed: ' + esc(e.message || 'Unknown error') + '</div>';
    btn.disabled = false;
    btn.textContent = 'Retry Generate AI SWOT';
  }
}

sb.auth.onAuthStateChange(function(event, session) {
  if (event === 'SIGNED_IN' && session) {
    const authScreen = document.getElementById('auth-screen');
    if (authScreen && authScreen.style.display === 'flex') {
      hideLoginScreen();

// ---- Boot ----
async function boot() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    showLoginScreen();
    return;
  }
  await proceedAfterAuth();
}
boot();
