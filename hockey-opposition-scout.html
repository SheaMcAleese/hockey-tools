<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#d4a843">
<link rel="manifest" href="manifest.json">
<title>Opposition Scout | HNZ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', -apple-system, Arial, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }

/* ============================================
   NAV — matches all other hockey tools
   ============================================ */
nav { background: #16213e; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #0f3460; flex-wrap: wrap; }
nav .logo { font-weight: 900; font-size: 18px; padding: 14px 0; margin-right: 30px; color: #d4a843; letter-spacing: 1px; }
nav button { background: none; border: none; color: #8899aa; font-size: 14px; padding: 14px 18px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; }
nav button:hover { color: #fff; }
nav button.active { color: #fff; border-bottom-color: #d4a843; }

.view { display: none; padding: 24px; max-width: 1200px; margin: 0 auto; }
.view.active { display: block; }

h2 { font-size: 22px; margin-bottom: 16px; color: #d4a843; }
.btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .2s; }
.btn-primary { background: #d4a843; color: #000; }
.btn-primary:hover { background: #e6bc5a; }
.btn-secondary { background: #0f3460; color: #fff; }
.btn-secondary:hover { background: #1a4a8a; }
.btn-danger { background: #722; color: #fff; }
.btn-danger:hover { background: #933; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
input, select, textarea { padding: 6px 10px; border: 1px solid #334; border-radius: 4px; background: #0d1b2a; color: #fff; font-size: 13px; font-family: inherit; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #d4a843; }
textarea { resize: vertical; min-height: 100px; width: 100%; }
label { font-size: 13px; color: #99a; display: block; margin-bottom: 4px; }
.toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }

/* ============================================
   TEAM SELECTOR TABS
   ============================================ */
.team-tabs { display: flex; gap: 0; margin-bottom: 20px; background: #0d1b2a; border-radius: 6px; overflow: hidden; border: 1px solid #334; }
.team-tab { flex: 1; padding: 12px 0; text-align: center; font-size: 14px; font-weight: 700; cursor: pointer; border: none; background: transparent; color: #667; transition: all .2s; letter-spacing: 1px; text-transform: uppercase; }
.team-tab:hover { color: #aaa; background: #16213e; }
.team-tab.active { background: #d4a843; color: #000; }
.team-tab + .team-tab { border-left: 1px solid #334; }

/* ============================================
   PDF-STYLE SCOUTING PANELS
   ============================================ */
.page-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: #2a2a2a; border-bottom: 2px solid #555; margin-bottom: 24px; border-radius: 4px 4px 0 0; }
.page-bar-left { font-size: 13px; font-weight: 700; color: #ccc; letter-spacing: 1px; text-transform: uppercase; }
.page-bar-right { font-size: 12px; color: #888; letter-spacing: 1px; }

.doc-title { font-size: 28px; font-weight: 900; color: #fff; margin-bottom: 6px; }
.doc-subtitle { font-size: 14px; color: #888; font-style: italic; margin-bottom: 24px; line-height: 1.5; }

.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
.info-box { background: #2a2a2a; border-radius: 4px; padding: 14px 16px; }
.info-box-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #999; text-transform: uppercase; margin-bottom: 6px; }
.info-box textarea, .info-box input { background: transparent; border: none; color: #fff; font-size: 14px; font-weight: 600; width: 100%; resize: none; min-height: 40px; padding: 0; }
.info-box textarea:focus, .info-box input:focus { outline: none; }

.scout-panel { background: #2a2a2a; border-left: 3px solid #555; border-radius: 0 4px 4px 0; padding: 16px 20px; margin-bottom: 14px; }
.scout-panel.accent-green { border-left-color: #4a8c3f; }
.scout-panel.accent-red { border-left-color: #e74c3c; }
.scout-panel.accent-gold { border-left-color: #d4a843; }
.scout-panel-label { font-size: 12px; font-weight: 700; letter-spacing: 2px; color: #ccc; text-transform: uppercase; margin-bottom: 8px; }
.scout-panel textarea { background: transparent; border: none; color: #bbb; font-size: 13px; width: 100%; min-height: 60px; line-height: 1.7; font-style: italic; padding: 0; resize: vertical; }
.scout-panel textarea:focus { outline: none; color: #fff; font-style: normal; }
.scout-panel textarea::placeholder { color: #666; font-style: italic; }

.threat-card { display: flex; gap: 0; margin-bottom: 14px; border-radius: 4px; overflow: hidden; }
.threat-num { background: #c0616b; color: #fff; font-size: 28px; font-weight: 900; display: flex; align-items: center; justify-content: center; min-width: 70px; padding: 20px 0; }
.threat-body { background: #2a2a2a; flex: 1; padding: 16px 20px; }
.threat-body input { background: transparent; border: none; color: #ccc; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; width: 100%; margin-bottom: 6px; padding: 0; }
.threat-body input:focus { outline: none; color: #fff; }
.threat-body textarea { background: transparent; border: none; color: #bbb; font-size: 13px; width: 100%; min-height: 50px; line-height: 1.7; font-style: italic; padding: 0; resize: vertical; }
.threat-body textarea:focus { outline: none; color: #fff; font-style: normal; }

.sv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

.log-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
.log-table th { background: #8faab8; color: #1a1a2e; padding: 10px 12px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; text-align: left; }
.log-table td { padding: 8px 12px; background: #2a2a2a; border-bottom: 2px solid #1a1a2e; vertical-align: top; }
.log-table td input, .log-table td textarea { background: transparent; border: none; color: #ccc; font-size: 12px; width: 100%; padding: 0; resize: none; min-height: 36px; }
.log-table td input:focus, .log-table td textarea:focus { outline: none; color: #fff; }

.section-tabs { display: flex; gap: 0; margin-bottom: 20px; background: #1e1e1e; border-radius: 4px; overflow: hidden; border: 1px solid #333; }
.section-tab { flex: 1; padding: 10px 6px; text-align: center; font-size: 11px; font-weight: 700; cursor: pointer; border: none; background: transparent; color: #667; transition: all .2s; letter-spacing: .5px; text-transform: uppercase; }
.section-tab:hover { color: #ccc; background: #2a2a2a; }
.section-tab.active { background: #2a2a2a; color: #d4a843; border-bottom: 2px solid #d4a843; }
.section-tab + .section-tab { border-left: 1px solid #333; }
.sec { display: none; }
.sec.active { display: block; }

.doc-footer { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; margin-top: 24px; border-top: 1px solid #333; }
.doc-footer .page-num { font-size: 11px; color: #555; }
.doc-footer .brand { font-size: 11px; color: #555; letter-spacing: 2px; text-transform: uppercase; }

.section { background: #16213e; border: 1px solid #334; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
.section h3 { color: #d4a843; margin-bottom: 12px; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }

@media print {
  body { background: #1e1e1e !important; }
  nav, .team-tabs, .section-tabs, .toolbar, .doc-footer .page-num, .view:not(.print-active), .no-print { display: none !important; }
  .view.print-active { display: block !important; padding: 0 16px; }
  .sec { display: block !important; page-break-inside: avoid; margin-bottom: 24px; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  @page { size: landscape; margin: 10mm; }
  textarea, input { border: none !important; }
}

@media (max-width: 768px) {
  nav { padding: 0 10px; }
  nav .logo { font-size: 14px; margin-right: 10px; }
  nav button { font-size: 12px; padding: 10px 8px; }
  .view { padding: 12px; }
  .sv-grid { grid-template-columns: 1fr; }
  .info-grid { grid-template-columns: 1fr 1fr; }
  .threat-num { min-width: 50px; font-size: 22px; }
  .section-tabs { flex-wrap: wrap; }
  .section-tab { min-width: 0; font-size: 10px; letter-spacing: 0; }
  .team-tab { font-size: 11px; letter-spacing: 0; padding: 10px 4px; }
}
</style>
</head>
<body>

<nav>
  <span class="logo">OPPOSITION SCOUT</span>
  <button class="active" onclick="showView('scout')">Scouting</button>
  <button onclick="showView('live')">Live Mode</button>
  <button onclick="showView('data')">Data</button>
</nav>

<div id="view-scout" class="view active"></div>
<div id="view-live" class="view"></div>
<div id="view-data" class="view"></div>

<script>
const STORE = 'hockeyOppoScoutV2';

function blankTeam(name, country, competition) {
  return {
    id: uid(), name, country, competition: competition || 'Hockey World Cup',
    worldRanking: '', headCoach: '', keyPlayersOverview: '', lastResultVsNZ: '',
    playingIdentity: '', strengthsTop3: '', vulnerabilitiesTop3: '',
    defensiveFormation: '', pressTriggers: '', defensiveBlock: '',
    setPieceDefence: '', transitionLosingPossession: '',
    buildUpPattern: '', attackTransition: '', dangerousZones: '',
    setPieceAttack: '', keyAttackingPlayers: '',
    threats: [{ title: '', description: '' },{ title: '', description: '' },{ title: '', description: '' }],
    ourAttackingPriority: '', ourDefensivePriority: '',
    setPieceStrategy: '', psychologicalEdge: '',
    log: []
  };
}

let data = { teams: [], currentTeamIdx: 0, currentSection: 0 };

function save() { localStorage.setItem(STORE, JSON.stringify(data)); }
function load() {
  try {
    const r = localStorage.getItem(STORE);
    if (r) data = JSON.parse(r);
    if (!data.teams) data.teams = [];
    if (data.currentTeamIdx === undefined) data.currentTeamIdx = 0;
    if (data.currentSection === undefined) data.currentSection = 0;
  } catch(e) { data = { teams: [], currentTeamIdx: 0, currentSection: 0 }; }
  if (data.teams.length === 0) {
    data.teams.push(blankTeam('Netherlands', 'Netherlands', 'Hockey World Cup'));
    data.teams.push(blankTeam('Argentina', 'Argentina', 'Hockey World Cup'));
    data.teams.push(blankTeam('Japan', 'Japan', 'Hockey World Cup'));
    save();
  }
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,6); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ct() { return data.teams[data.currentTeamIdx]; }

function showView(name) {
  document.querySelectorAll('.view').forEach(v => { v.classList.remove('active'); v.classList.remove('print-active'); });
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => {
    if ((name === 'scout' && b.textContent === 'Scouting') ||
        (name === 'live' && b.textContent === 'Live Mode') ||
        (name === 'data' && b.textContent === 'Data')) b.classList.add('active');
  });
  if (name === 'scout') renderScout();
  if (name === 'live') renderLive();
  if (name === 'data') renderData();
}

const SECTIONS = [
  { key: 'overview', label: 'Team Overview' },
  { key: 'defend', label: 'How They Defend' },
  { key: 'attack', label: 'How They Attack' },
  { key: 'threats', label: 'Key Threats' },
  { key: 'gameplan', label: 'Our Game Plan' },
  { key: 'log', label: 'Scouting Log' }
];

function renderScout() {
  const el = document.getElementById('view-scout');
  const t = ct();
  if (!t) return;

  el.innerHTML = `
    <div class="toolbar no-print" style="justify-content:space-between;">
      <h2 style="margin:0;">Opponent Scouting Report</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" onclick="addNewTeam()">+ Add Team</button>
        <button class="btn btn-secondary" onclick="printScout()">Print Report</button>
      </div>
    </div>

    <div class="team-tabs no-print">
      ${data.teams.map((tm,i) => `<button class="team-tab ${i===data.currentTeamIdx?'active':''}" onclick="switchTeam(${i})">${esc(tm.name)}</button>`).join('')}
    </div>

    <div class="section-tabs no-print">
      ${SECTIONS.map((s,i) => `<button class="section-tab ${i===data.currentSection?'active':''}" onclick="switchSection(${i})">${s.label}</button>`).join('')}
    </div>

    ${renderOverview(t)}
    ${renderDefend(t)}
    ${renderAttack(t)}
    ${renderThreats(t)}
    ${renderGameplan(t)}
    ${renderLog(t)}

    <div class="doc-footer">
      <span class="page-num">${data.currentSection + 2} / 7</span>
      <span class="brand">HNZ | BLACK STICKS MEN</span>
    </div>`;
}

function switchTeam(idx) { autoSave(); data.currentTeamIdx = idx; save(); renderScout(); }
function switchSection(idx) { autoSave(); data.currentSection = idx; save(); renderScout(); }

function renderOverview(t) {
  return `<div class="sec ${data.currentSection===0?'active':''}" id="sec-overview">
    <div class="page-bar"><span class="page-bar-left">${esc(t.name)} | Team Overview</span><span class="page-bar-right">${esc(t.competition)}</span></div>
    <div class="doc-title">Team Overview</div>
    <div class="info-grid">
      <div class="info-box"><div class="info-box-label">World Ranking</div><input type="text" data-field="worldRanking" value="${esc(t.worldRanking)}" placeholder="e.g. #3" onchange="fieldChange(this)"></div>
      <div class="info-box"><div class="info-box-label">Head Coach</div><input type="text" data-field="headCoach" value="${esc(t.headCoach)}" placeholder="Name" onchange="fieldChange(this)"></div>
      <div class="info-box"><div class="info-box-label">Key Players</div><textarea data-field="keyPlayersOverview" placeholder="Top names to watch" onchange="fieldChange(this)">${esc(t.keyPlayersOverview)}</textarea></div>
      <div class="info-box"><div class="info-box-label">Last Result vs NZ</div><input type="text" data-field="lastResultVsNZ" value="${esc(t.lastResultVsNZ)}" placeholder="e.g. NZ 2-3 NED" onchange="fieldChange(this)"></div>
    </div>
    <div class="scout-panel"><div class="scout-panel-label">Playing Identity / Style</div><textarea data-field="playingIdentity" placeholder="How do they play? High press, possession-based, direct, physical, technical? What's their identity?" onchange="fieldChange(this)">${esc(t.playingIdentity)}</textarea></div>
    <div class="sv-grid">
      <div><div style="font-size:12px;font-weight:700;letter-spacing:2px;color:#ccc;text-transform:uppercase;margin-bottom:8px;">Strengths (Top 3)</div><div class="scout-panel accent-green" style="margin-bottom:0;"><textarea data-field="strengthsTop3" placeholder="Their three biggest weapons. Be specific \u2014 positions, patterns, set plays." onchange="fieldChange(this)">${esc(t.strengthsTop3)}</textarea></div></div>
      <div><div style="font-size:12px;font-weight:700;letter-spacing:2px;color:#ccc;text-transform:uppercase;margin-bottom:8px;">Vulnerabilities (Top 3)</div><div class="scout-panel accent-red" style="margin-bottom:0;"><textarea data-field="vulnerabilitiesTop3" placeholder="Where can we hurt them? Defensive transitions, aerial balls, press structure, set piece defending?" onchange="fieldChange(this)">${esc(t.vulnerabilitiesTop3)}</textarea></div></div>
    </div>
  </div>`;
}

function renderDefend(t) {
  const fields = [
    { key:'defensiveFormation', label:'Defensive Formation', ph:'4-4-2? 5-3-2? Back line structure when defending.' },
    { key:'pressTriggers', label:'Press Triggers', ph:'When do they press? What triggers their press? Long balls, keeper possession, wide play?' },
    { key:'defensiveBlock', label:'Defensive Block', ph:'How do they sit in a mid-block? Where is space available?' },
    { key:'setPieceDefence', label:'Set Piece Defence', ph:'How do they defend corners and short corners? Marking scheme, positioning, sweeper.' },
    { key:'transitionLosingPossession', label:'Transition \u2014 Losing Possession', ph:'What do they do immediately after losing the ball?' }
  ];
  return `<div class="sec ${data.currentSection===1?'active':''}" id="sec-defend">
    <div class="page-bar"><span class="page-bar-left">${esc(t.name)} | Defensive Structure</span><span class="page-bar-right">${esc(t.competition)}</span></div>
    <div class="doc-title">How They Defend</div>
    ${fields.map(f=>`<div class="scout-panel"><div class="scout-panel-label">${f.label}</div><textarea data-field="${f.key}" placeholder="${esc(f.ph)}" onchange="fieldChange(this)">${esc(t[f.key])}</textarea></div>`).join('')}
  </div>`;
}

function renderAttack(t) {
  const fields = [
    { key:'buildUpPattern', label:'Build-Up Pattern', ph:'How do they build from the back? GK distribution, wide or central build, overloads?' },
    { key:'attackTransition', label:'Attack Transition', ph:'How fast do they transition? Counter-attack patterns, runners, key threats in transition.' },
    { key:'dangerousZones', label:'Dangerous Zones', ph:'Where do most of their attacks come from? Left side, right side, central, high balls?' },
    { key:'setPieceAttack', label:'Set Piece Attack', ph:'Corner and short corner structures. PC routine. Free hit patterns.' },
    { key:'keyAttackingPlayers', label:'Key Attacking Player(s)', ph:'Who is the danger man? Number, name, their role and tendency.' }
  ];
  return `<div class="sec ${data.currentSection===2?'active':''}" id="sec-attack">
    <div class="page-bar"><span class="page-bar-left">${esc(t.name)} | Attacking Structure</span><span class="page-bar-right">${esc(t.competition)}</span></div>
    <div class="doc-title">How They Attack</div>
    ${fields.map(f=>`<div class="scout-panel"><div class="scout-panel-label">${f.label}</div><textarea data-field="${f.key}" placeholder="${esc(f.ph)}" onchange="fieldChange(this)">${esc(t[f.key])}</textarea></div>`).join('')}
  </div>`;
}

function renderThreats(t) {
  if (!t.threats || t.threats.length < 3) t.threats = [{title:'',description:''},{title:'',description:''},{title:'',description:''}];
  return `<div class="sec ${data.currentSection===3?'active':''}" id="sec-threats">
    <div class="page-bar"><span class="page-bar-left">${esc(t.name)} | Key Threats</span><span class="page-bar-right">${esc(t.competition)}</span></div>
    <div class="doc-title">The Three Biggest Threats</div>
    <div class="doc-subtitle">These are the patterns we must have a plan for. Brief the team specifically.</div>
    ${t.threats.map((th,i)=>`<div class="threat-card"><div class="threat-num">0${i+1}</div><div class="threat-body"><input type="text" data-threat="${i}" data-tfield="title" value="${esc(th.title)}" placeholder="THREAT TITLE" onchange="threatChange(this)"><textarea data-threat="${i}" data-tfield="description" placeholder="Description of the threat \u2014 who, where, how it develops, and our planned response" onchange="threatChange(this)">${esc(th.description)}</textarea></div></div>`).join('')}
  </div>`;
}

function renderGameplan(t) {
  const fields = [
    { key:'ourAttackingPriority', label:'Our Attacking Priority', ph:'Where and how will we create? What spaces will we target?' },
    { key:'ourDefensivePriority', label:'Our Defensive Priority', ph:'How will we neutralise their biggest threat? Our structure / press plan.' },
    { key:'setPieceStrategy', label:'Set Piece Strategy', ph:'PC routine selected. Corner and free hit plan.' },
    { key:'psychologicalEdge', label:'The Psychological Edge', ph:'What is our mental / cultural advantage in this match?' }
  ];
  return `<div class="sec ${data.currentSection===4?'active':''}" id="sec-gameplan">
    <div class="page-bar"><span class="page-bar-left">${esc(t.name)} | Our Game Plan</span><span class="page-bar-right">${esc(t.competition)}</span></div>
    <div class="doc-title">How We Will Approach This Game</div>
    ${fields.map(f=>`<div class="scout-panel accent-gold"><div class="scout-panel-label">${f.label}</div><textarea data-field="${f.key}" placeholder="${esc(f.ph)}" onchange="fieldChange(this)">${esc(t[f.key])}</textarea></div>`).join('')}
  </div>`;
}

function renderLog(t) {
  if (!t.log) t.log = [];
  let rows = t.log.map((e,i)=>`<tr>
    <td><input type="text" data-log="${i}" data-lfield="dateTournament" value="${esc(e.dateTournament)}" placeholder="Date / Tournament" onchange="logChange(this)"></td>
    <td><input type="text" data-log="${i}" data-lfield="result" value="${esc(e.result)}" placeholder="Result" onchange="logChange(this)"></td>
    <td><textarea data-log="${i}" data-lfield="observation" placeholder="Key observation" onchange="logChange(this)">${esc(e.observation)}</textarea></td>
    <td><textarea data-log="${i}" data-lfield="action" placeholder="Action taken" onchange="logChange(this)">${esc(e.action)}</textarea></td>
    <td style="width:40px;" class="no-print"><button class="btn btn-danger btn-sm" onclick="deleteLogEntry(${i})">\u00D7</button></td>
  </tr>`).join('');

  return `<div class="sec ${data.currentSection===5?'active':''}" id="sec-log">
    <div class="page-bar"><span class="page-bar-left">${esc(t.name)} | Scouting Log</span><span class="page-bar-right">Updated Each Tournament</span></div>
    <div class="doc-title">Running Observations Log</div>
    <div class="doc-subtitle">Add a row each time you play or watch this team. This becomes your living intelligence database.</div>
    <button class="btn btn-primary btn-sm no-print" onclick="addLogEntry()" style="margin-bottom:12px;">+ Add Entry</button>
    <div style="overflow-x:auto;"><table class="log-table"><thead><tr>
      <th style="width:18%;">Date / Tournament</th><th style="width:10%;">Result</th>
      <th style="width:36%;">Key Observation</th><th style="width:30%;">Action Taken</th>
      <th class="no-print" style="width:6%;"></th>
    </tr></thead><tbody>${rows||'<tr><td colspan="5" style="text-align:center;color:#667;padding:20px;">No entries yet.</td></tr>'}</tbody></table></div>
  </div>`;
}

function fieldChange(el) { ct()[el.dataset.field] = el.value; save(); }
function threatChange(el) { ct().threats[parseInt(el.dataset.threat)][el.dataset.tfield] = el.value; save(); }
function logChange(el) { ct().log[parseInt(el.dataset.log)][el.dataset.lfield] = el.value; save(); }

function autoSave() {
  const t = ct(); if (!t) return;
  document.querySelectorAll('[data-field]').forEach(el => { t[el.dataset.field] = el.value; });
  document.querySelectorAll('[data-threat]').forEach(el => {
    const i = parseInt(el.dataset.threat);
    if (t.threats && t.threats[i]) t.threats[i][el.dataset.tfield] = el.value;
  });
  document.querySelectorAll('[data-log]').forEach(el => {
    const i = parseInt(el.dataset.log);
    if (t.log && t.log[i]) t.log[i][el.dataset.lfield] = el.value;
  });
  save();
}

function addLogEntry() { autoSave(); ct().log.push({ dateTournament:'', result:'', observation:'', action:'' }); save(); renderScout(); }
function deleteLogEntry(i) { autoSave(); ct().log.splice(i,1); save(); renderScout(); }
function addNewTeam() { const n = prompt('Team name:'); if (!n) return; autoSave(); data.teams.push(blankTeam(n.trim(),n.trim(),'Hockey World Cup')); data.currentTeamIdx = data.teams.length-1; data.currentSection = 0; save(); renderScout(); }

function printScout() {
  autoSave();
  document.getElementById('view-scout').classList.add('print-active');
  window.print();
  setTimeout(() => document.getElementById('view-scout').classList.remove('print-active'), 500);
}

// ============================================
// LIVE SCOUTING MODE
// ============================================
let liveFeed = [], liveTags = new Set();
const LIVE_TAGS = ['Attack Pattern','Defensive Shape','PC Routine','Key Player','Weakness','Formation','Press Trigger','Transition','General'];

function renderLive() {
  const el = document.getElementById('view-live');
  const opts = data.teams.map((t,i)=>`<option value="${i}">${esc(t.name)}</option>`).join('');
  el.innerHTML = `
    <h2>Live Scouting Mode</h2>
    <div class="section"><h3>Match Context</h3>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <div style="display:flex;flex-direction:column;min-width:160px;"><label>Team</label><select id="live-team">${opts}</select></div>
        <div style="display:flex;flex-direction:column;min-width:140px;"><label>Date</label><input type="date" id="live-date" value="${new Date().toISOString().split('T')[0]}"></div>
        <div style="display:flex;flex-direction:column;flex:1;min-width:160px;"><label>Competition</label><input type="text" id="live-comp" placeholder="e.g. FIH Pro League"></div>
      </div>
    </div>
    <div class="section"><h3>Quick Tags</h3>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;" id="live-tags-wrap">
        ${LIVE_TAGS.map(t=>`<div style="padding:6px 12px;border:1px solid #334;border-radius:4px;background:#0d1b2a;color:#889;font-size:12px;font-weight:600;cursor:pointer;" data-ltag="${t}" onclick="toggleLiveTag(this)">${t}</div>`).join('')}
      </div>
      <div style="display:flex;gap:8px;align-items:flex-end;margin-bottom:12px;">
        <div style="display:flex;flex-direction:column;width:80px;"><label>Min</label><input type="number" id="live-min" placeholder="15" min="0" max="120"></div>
        <button class="btn btn-secondary btn-sm" onclick="insertLiveMin()">Insert</button>
      </div>
      <div style="display:flex;flex-direction:column;"><label>Observation</label><textarea id="live-notes" placeholder="Write your observation..." style="min-height:60px;"></textarea></div>
      <button class="btn btn-primary" onclick="addLiveEntry()" style="margin-top:8px;">+ Add to Feed</button>
    </div>
    <div class="section"><h3>Feed</h3><div id="live-feed"></div>
      <div style="margin-top:12px;display:flex;gap:8px;">
        <button class="btn btn-primary" onclick="processLiveFeed()">Process & Add to Log</button>
        <button class="btn btn-secondary" onclick="liveFeed=[];liveTags.clear();renderLiveFeed();">Clear</button>
      </div>
    </div>`;
  renderLiveFeed();
}

function toggleLiveTag(el) {
  const tag = el.dataset.ltag;
  if (liveTags.has(tag)) { liveTags.delete(tag); el.style.background='#0d1b2a'; el.style.color='#889'; el.style.borderColor='#334'; }
  else { liveTags.add(tag); el.style.background='#d4a843'; el.style.color='#000'; el.style.borderColor='#d4a843'; }
}
function insertLiveMin() { const m=document.getElementById('live-min').value; if(!m)return; const ta=document.getElementById('live-notes'); ta.value+=`[${m}'] `; ta.focus(); }

function addLiveEntry() {
  const text = document.getElementById('live-notes').value.trim();
  if (!text) return alert('Write an observation.');
  const tags = Array.from(liveTags); if (tags.length===0) tags.push('General');
  liveFeed.push({ id:uid(), tags, text, time:new Date().toLocaleTimeString() });
  document.getElementById('live-notes').value = '';
  renderLiveFeed();
}

function renderLiveFeed() {
  const el = document.getElementById('live-feed'); if(!el)return;
  if (liveFeed.length===0) { el.innerHTML='<div style="color:#667;font-size:12px;">No observations yet.</div>'; return; }
  el.innerHTML = liveFeed.map(e=>`<div style="background:#0d1b2a;border-left:3px solid #d4a843;padding:10px 14px;border-radius:0 4px 4px 0;margin-bottom:8px;">
    <div>${e.tags.map(t=>`<span style="display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;background:#d4a843;color:#000;margin-right:4px;">${esc(t)}</span>`).join('')}</div>
    <div style="font-size:11px;color:#667;margin:4px 0;">${e.time}</div>
    <div style="font-size:13px;color:#ccc;line-height:1.5;">${esc(e.text)}</div>
  </div>`).join('');
}

function processLiveFeed() {
  const idx = parseInt(document.getElementById('live-team').value);
  if (liveFeed.length===0) return alert('No entries.');
  const t = data.teams[idx]; if(!t.log) t.log=[];
  const d = document.getElementById('live-date').value, c = document.getElementById('live-comp').value;
  liveFeed.forEach(e => { t.log.push({ dateTournament:`${d} ${c}`.trim(), result:'', observation:`[${e.tags.join(', ')}] ${e.text}`, action:'' }); });
  save();
  alert(`${liveFeed.length} entries added to ${t.name}'s scouting log.`);
  liveFeed=[]; liveTags.clear(); renderLiveFeed();
}

// ============================================
// DATA MANAGEMENT
// ============================================
function renderData() {
  const el = document.getElementById('view-data');
  const size = (JSON.stringify(data).length/1024).toFixed(1);
  el.innerHTML = `<h2>Data Management</h2>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;">
      <div class="section"><h3>Export</h3><p style="color:#889;font-size:12px;margin-bottom:12px;">Download all scouting data as JSON.</p><button class="btn btn-primary" onclick="exportData()">Export All</button></div>
      <div class="section"><h3>Import</h3><input type="file" id="import-file" accept=".json" style="margin-bottom:8px;"><button class="btn btn-primary" onclick="importData()">Import</button></div>
      <div class="section"><h3>Storage</h3><p style="color:#ccc;margin-bottom:4px;">Teams: <strong style="color:#d4a843;">${data.teams.length}</strong></p><p style="color:#ccc;margin-bottom:12px;">Size: <strong style="color:#d4a843;">${size} KB</strong></p><button class="btn btn-danger" onclick="clearAllData()">Clear All</button></div>
      <div class="section"><h3>Manage Teams</h3>${data.teams.map((t,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #334;"><span style="font-size:13px;">${esc(t.name)}</span><button class="btn btn-danger btn-sm" onclick="deleteTeam(${i})">Delete</button></div>`).join('')}<button class="btn btn-primary btn-sm" onclick="addNewTeam()" style="margin-top:12px;">+ Add Team</button></div>
    </div>`;
}

function exportData() { autoSave(); const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`oppo-scout-${new Date().toISOString().split('T')[0]}.json`; a.click(); URL.revokeObjectURL(a.href); }
function importData() { const f=document.getElementById('import-file').files[0]; if(!f)return alert('Select a file.'); const r=new FileReader(); r.onload=function(e){try{const d=JSON.parse(e.target.result);if(d.teams){data=d;data.currentTeamIdx=0;data.currentSection=0;save();alert('Imported.');showView('scout');}else alert('Invalid.');}catch(e){alert('Error: '+e.message);}}; r.readAsText(f); }
function clearAllData() { if(!confirm('Delete ALL data?'))return; if(!confirm('Sure?'))return; localStorage.removeItem(STORE); data={teams:[],currentTeamIdx:0,currentSection:0}; load(); showView('scout'); }
function deleteTeam(i) { if(!confirm('Delete '+data.teams[i].name+'?'))return; data.teams.splice(i,1); if(data.currentTeamIdx>=data.teams.length)data.currentTeamIdx=Math.max(0,data.teams.length-1); save(); if(data.teams.length===0)load(); renderData(); }

window.addEventListener('beforeunload', autoSave);

load();
renderScout();
</script>
</body>
</html>
